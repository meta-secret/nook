version: '3'

vars:
  PLAYWRIGHT_MCP_VERSION: 0.0.78
  WEB_DEV_PORT: '{{default "5173" .WEB_DEV_PORT}}'

tasks:
  ai-debug:check:
    desc: Verify Codex/Cursor + Playwright MCP annotation pilot prerequisites.
    cmds:
      - >-
        node -e "const major=Number(process.versions.node.split('.')[0]);
        if(major<18){console.error('Playwright MCP requires Node.js 18+ (have '+process.versions.node+')');process.exit(1)}"
      - >-
        case "{{.WEB_DEV_PORT}}" in
          5173|5175) ;;
          *) echo 'AI-debug mode supports WEB_DEV_PORT=5173 or 5175 only.' >&2; exit 1 ;;
        esac
      - >-
        test "$(npx -y @playwright/mcp@{{.PLAYWRIGHT_MCP_VERSION}} --version)"
        = "Version {{.PLAYWRIGHT_MCP_VERSION}}"
      - node .codex/check-ai-debug-origins.mjs
      - >-
        printf '%s\n' \
          "AI-debug ready URL: https://localhost:{{.WEB_DEV_PORT}}/app/" \
          "Two-window handoff:" \
          "  1) Google Chrome — interact/navigate on the ready URL until the bug state is visible." \
          "  2) Playwright Dashboard (theater-mask icon) — call browser_annotate, draw feedback, click Submit, then Done." \
          "Done alone returns no annotations. Interact and annotate are separate modes."

  ai-debug:dev:
    desc: Verify the annotation pilot and start the local Nook development server.
    deps:
      - ai-debug:check
    cmds:
      - >-
        printf '%s\n' \
          "Starting Nook for AI-debug on https://localhost:{{.WEB_DEV_PORT}}/app/" \
          "After the server is up, ask the agent to browser_navigate that HTTPS URL, verify the origin, then browser_annotate." \
          "Expect two windows: managed Chrome for clicks, Playwright Dashboard for Submit→Done annotations."
      - task: web:dev:fast
        vars:
          WEB_DEV_PORT: '{{.WEB_DEV_PORT}}'
