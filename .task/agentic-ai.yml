version: '3'

vars:
  CI_AGENT_DIR: agentic-ai/ci-agent

tasks:
  ci-agent:install:
    internal: true
    dir: '{{.CI_AGENT_DIR}}'
    cmds:
      - npm ci

  ci-agent:build:
    internal: true
    dir: '{{.CI_AGENT_DIR}}'
    deps:
      - ci-agent:install
    sources:
      - src/**/*
      - tsconfig.json
    generates:
      - dist/main/main.js
    cmds:
      - npm run build

  ci-agent:prepare:
    desc: Install and build ci-agent (Node 22.13+ required).
    cmds:
      - >-
        node -e "const [maj,min]=process.versions.node.split('.').map(Number);
        if(maj<22||(maj===22&&min<13)){console.error('ci-agent requires Node.js 22.13+ (have '+process.versions.node+')');process.exit(1)}"
      - task: ci-agent:build

  ci-agent:run:
    desc: Run Cursor SDK agent only (fix and push branch).
    deps:
      - ci-agent:prepare
    env:
      REPO_ROOT:
        sh: git rev-parse --show-toplevel
      VITE_BASE: '{{default "/" .VITE_BASE}}'
      VITE_VAULT_SYNC_INTERVAL_MS: '{{default "" .VITE_VAULT_SYNC_INTERVAL_MS}}'
    cmds:
      - node {{.CI_AGENT_DIR}}/dist/main/main.js agent

  ci-agent:fix:
    desc: Full CI fix loop — agent, GitHub REST API (PR, checks, squash merge).
    deps:
      - ci-agent:prepare
      - setup
    env:
      REPO_ROOT:
        sh: git rev-parse --show-toplevel
      VITE_BASE: '{{default "/" .VITE_BASE}}'
      VITE_VAULT_SYNC_INTERVAL_MS: '{{default "" .VITE_VAULT_SYNC_INTERVAL_MS}}'
    cmds:
      - node {{.CI_AGENT_DIR}}/dist/main/main.js fix
