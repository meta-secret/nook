version: '3'

tasks:
  docker:build:
    desc: Alias for setup (build linux/amd64 toolchain image).
    cmds:
      - task: setup

  docker:push:
    desc: Push :latest via buildx registry output (dedupes with buildcache; after green CI).
    env:
      TOOLCHAIN_REGISTRY: '{{.TOOLCHAIN_REGISTRY}}'
    cmds:
      - >-
        sh -c 'test -n "${PUSH_TOOLCHAIN:-}" && test -n "${TOOLCHAIN_REGISTRY:-}" || exit 0;
        HASH="$(bash .github/scripts/toolchain-inputs-hash.sh "{{.ROOT_DIR}}")";
        TOOLCHAIN_REGISTRY="${TOOLCHAIN_REGISTRY}" TOOLCHAIN_INPUTS_HASH="$HASH"
        {{.DOCKER}} buildx bake -f docker-bake.hcl toolchain-push'

  docker:task:
    internal: true
    env:
      VITE_BASE: '{{.VITE_BASE}}'
      VITE_VAULT_SYNC_INTERVAL_MS: '{{.VITE_VAULT_SYNC_INTERVAL_MS}}'
    cmds:
      - >-
        sh -c 'IMG="${DOCKER_IMAGE:-}";
        if [ -z "$IMG" ] && [ -f .nook/docker-image ]; then IMG="$(tr -d "\n" < .nook/docker-image)"; fi;
        if [ -z "$IMG" ]; then IMG="nook-build:local"; fi;
        exec {{.DOCKER}} run --rm
        --platform linux/amd64
        --ipc=host
        -e VITE_BASE="{{.VITE_BASE}}"
        -e VITE_VAULT_SYNC_INTERVAL_MS="{{.VITE_VAULT_SYNC_INTERVAL_MS}}"
        -e NOOK_GITHUB_PAT
        -e CI=1
        -e NOOK_GITHUB_E2E_REPO
        -e NOOK_GITHUB_POLL_MS
        -e NOOK_GITHUB_SYNC_TIMEOUT_MS
        -e NOOK_GITHUB_CONNECT_TIMEOUT_MS
        -e CLOUDFLARE_API_TOKEN
        -e CLOUDFLARE_ACCOUNT_ID
        -e CF_PAGES_BRANCH
        -e GITHUB_TOKEN
        -e GITHUB_REPOSITORY
        -e PR_NUMBER
        -e PREVIEW_URL
        -v "{{.ROOT_DIR}}:/workspace"
        -v /workspace/nook-web/node_modules
        -w /workspace
        "$IMG"
        task {{.TASK}}'

  docker:e2e:run:
    desc: Run Playwright in Docker — Vite dev server stays on 127.0.0.1:5173 inside the container (no -p publish).
    internal: true
    env:
      VITE_BASE: '{{.VITE_BASE}}'
      VITE_VAULT_SYNC_INTERVAL_MS: '{{.VITE_VAULT_SYNC_INTERVAL_MS}}'
      E2E_SPEC: '{{.E2E_SPEC}}'
    cmds:
      - >-
        sh -c 'IMG="${DOCKER_IMAGE:-}";
        if [ -z "$IMG" ] && [ -f .nook/docker-image ]; then IMG="$(tr -d "\n" < .nook/docker-image)"; fi;
        if [ -z "$IMG" ]; then IMG="nook-build:local"; fi;
        exec {{.DOCKER}} run --rm
        --platform linux/amd64
        --ipc=host
        -e VITE_BASE="{{.VITE_BASE}}"
        -e VITE_VAULT_SYNC_INTERVAL_MS="{{.VITE_VAULT_SYNC_INTERVAL_MS}}"
        -e NOOK_GITHUB_PAT
        -e CI=1
        -e NOOK_GITHUB_E2E_REPO
        -e NOOK_GITHUB_POLL_MS
        -e NOOK_GITHUB_SYNC_TIMEOUT_MS
        -e NOOK_GITHUB_CONNECT_TIMEOUT_MS
        -e NOOK_E2E_SKIP_GITHUB_CLEANUP
        -e NOOK_E2E_SYNC_PROVIDER
        -e NOOK_GOOGLE_E2E_ACCESS_TOKEN
        -e E2E_SPEC
        -v "{{.ROOT_DIR}}:/workspace"
        -v /workspace/nook-web/node_modules
        -w /workspace
        "$IMG"
        task {{.TASK}}'

  docker:web:dev:
    internal: true
    cmds:
      - >-
        sh -c 'IMG="${DOCKER_IMAGE:-}";
        if [ -z "$IMG" ] && [ -f .nook/docker-image ]; then IMG="$(tr -d "\n" < .nook/docker-image)"; fi;
        if [ -z "$IMG" ]; then IMG="nook-build:local"; fi;
        exec {{.DOCKER}} run --rm
        --platform linux/amd64
        -e VITE_BASE="{{.VITE_BASE}}"
        -p 5173:5173
        -v "{{.ROOT_DIR}}:/workspace"
        -v /workspace/nook-web/node_modules
        -w /workspace
        "$IMG"
        sh -c "cd nook-web && bun install && task _web:dev"'
