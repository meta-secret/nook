version: "3"

tasks:
  extension:build:
    desc: Build the browser extension in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _extension:build }

  extension:check:
    desc: Type-check and build the browser extension in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _extension:check }

  extension:format:
    desc: Format the browser extension in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _extension:format }

  extension:format:check:
    desc: Check browser extension formatting in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _extension:format:check }

  _extension:build:
    desc: Build the browser extension.
    cmds:
      - cd nook-web-extension && bun run build

  _extension:check:
    desc: Type-check and build the browser extension.
    cmds:
      - cd nook-web-extension && bun run check
      - cd nook-web-extension && bun run build

  _extension:format:
    desc: Format the browser extension.
    cmds:
      - cd nook-web-extension && bun run format

  _extension:format:check:
    desc: Check browser extension formatting.
    cmds:
      - cd nook-web-extension && bun run format:check
