version: '3'

tasks:
  ci:pr:
    desc: PR CI — prepare, verify ‖ build, then fast Playwright e2e-pr (~1 min).
    deps:
      - setup
    cmds:
      - task: ci:pr:prepare
      - task: ci:pr:parallel
      - task: ci:pr:e2e

  ci:pr:e2e:
    desc: Fast Playwright e2e-pr for PR CI (IndexedDB specs; restores dist for Cloudflare preview).
    cmds:
      - cp -a nook-web/dist nook-web/dist-prod
      - task: web:test:e2e:pr:parallel
      - task: web:e2e:restore-prod-dist

  ci:pr:e2e:local:
    desc: Alias for ci:pr:e2e.
    cmds:
      - task: ci:pr:e2e

  ci:pr:publish:
    desc: PR CI verify, then push toolchain to GHCR on success (buildx registry push).
    cmds:
      - task: ci:pr
      - task: docker:push:ci

  ci:main:prepare:
    desc: Toolchain setup, format check, and wasm build (shared artifacts for parallel tracks).
    deps:
      - setup
    cmds:
      - task: ci:pr:prepare

  ci:main:
    desc: Main branch CI — prepare once, then verify ‖ web build ‖ e2e in parallel containers.
    cmds:
      - task: ci:main:prepare
      - task: ci:main:finish

  ci:main:finish:
    desc: Verify ‖ web build ‖ stub e2e — e2e runs in one Docker container.
    deps:
      - ci:main:parallel
      - ci:main:e2e

  ci:main:e2e:
    desc: Full stub Playwright e2e in one container (no GitHub PAT).
    deps:
      - web:test:e2e:parallel

  ci:main:e2e:parallel:
    desc: Alias for ci:main:e2e.
    cmds:
      - task: ci:main:e2e

  ci:nightly:e2e:
    desc: Nightly live sync provider e2e (real APIs; requires provider credentials).
    cmds:
      - task: ci:main:prepare
      - task: ci:main:parallel
      - |
        cp -a nook-web/dist nook-web/dist-prod
        task web:test:e2e:sync-live:parallel VITE_BASE=/ VITE_VAULT_SYNC_INTERVAL_MS=1000
        task web:e2e:restore-prod-dist

  ci:main:build:
    desc: Format, wasm, and parallel verify/web build only (no e2e).
    cmds:
      - task: ci:main:prepare
      - task: ci:main:parallel

  ci:main:parallel:
    desc: Lint/test and production web build in parallel after ci:pr:prepare.
    deps:
      - ci:verify:parallel
      - web:build:parallel

  ci:main:publish:
    desc: Main CI verify/build/e2e, then push toolchain to GHCR on success.
    cmds:
      - task: ci:main
      - task: docker:push:ci

  ci:fix:agent:
    desc: Fix failed main CI — agent opens PR, Task waits for checks and squash-merges.
    cmds:
      - task: _ci:fix:orchestrate

  _ci:fix:orchestrate:
    internal: true
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        ROOT="{{.ROOT_DIR}}";
        cd "$ROOT";
        if [ -z "${CURSOR_API_KEY:-}" ]; then
          echo "::warning::CURSOR_API_KEY is not set — skipping AI CI fix job.";
          echo "Add repository secret CURSOR_API_KEY (Cursor Dashboard → Integrations → User API Keys).";
          exit 0;
        fi;
        : "${GH_TOKEN:?GH_TOKEN is required for gh/git push and PR merge}";
        : "${GITHUB_REPOSITORY:?GITHUB_REPOSITORY is required}";
        : "${GITHUB_RUN_ID:?GITHUB_RUN_ID is required}";
        FIX_BRANCH="${FIX_BRANCH:-fix/ci-${GITHUB_RUN_ID}}";
        export FIX_BRANCH GITHUB_RUN_ID GITHUB_REPOSITORY;

        echo "==> Configuring gh and git (GH_TOKEN from environment)";
        git config --global --add safe.directory "$ROOT";
        git config --global credential.helper "!gh auth git-credential";
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com";
        git config --global user.name "github-actions[bot]";

        PR_NUM="$(gh pr list --head "$FIX_BRANCH" --state open --json number -q ".[0].number" 2>/dev/null || true)";
        if [ -n "$PR_NUM" ]; then
          echo "==> Open PR already exists for $FIX_BRANCH (#$PR_NUM) — waiting for checks";
        else
          task ci-agent:run VITE_BASE="{{.VITE_BASE}}" VITE_VAULT_SYNC_INTERVAL_MS="{{.VITE_VAULT_SYNC_INTERVAL_MS}}";
          PR_NUM="$(gh pr list --head "$FIX_BRANCH" --state open --json number -q ".[0].number" || true)";
          if [ -z "$PR_NUM" ]; then
            echo "::error::ci-agent did not open a PR for branch ${FIX_BRANCH}." >&2;
            exit 1;
          fi;
          echo "==> Agent opened PR #${PR_NUM}";
        fi;

        echo "==> Waiting for PR #${PR_NUM} checks";
        gh pr checks "$PR_NUM" --watch --fail-fast;
        echo "==> Squash merging PR #${PR_NUM}";
        gh pr merge "$PR_NUM" --squash --delete-branch;
        echo "==> Done — merged PR #${PR_NUM} (fix for main run ${GITHUB_RUN_ID})";
        '

  ci:pr:deploy-preview:
    desc: Deploy nook-web/dist to Cloudflare Pages (CI; runs on host after docker build).
    cmds:
      - task: _deploy-preview

  ci:pr:comment-preview:
    desc: Comment or update Cloudflare preview URL on the PR (CI; runs on host).
    cmds:
      - task: _comment-preview

  docker:push:ci:
    desc: Push toolchain image when TOOLCHAIN_REGISTRY is set (after green ci:pr).
    env:
      PUSH_TOOLCHAIN: "1"
    cmds:
      - task: docker:push

  ci:pr:prepare:
    desc: Format check and wasm build in one container (shared artifacts for parallel tracks).
    cmds:
      - task: docker:task
        vars: { TASK: _ci:pr:prepare }

  ci:pr:parallel:
    desc: Lint, test, and production web build in parallel after ci:pr:prepare.
    deps:
      - ci:verify:parallel
      - web:build:parallel

  ci:verify:parallel:
    desc: Lint and test in Docker without rebuilding wasm.
    cmds:
      - task: docker:task
        vars: { TASK: _verify:parallel }

  ci:verify:
    desc: Format, lint, and test in Docker (no web production build).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _verify }

  _ci:pr:prepare:
    desc: Shared PR prep — format and wasm before parallel verify/build containers.
    cmds:
      - task: _format:check
      - task: _wasm:build

  _deploy-preview:
    desc: Deploy nook-web/dist to Cloudflare Pages; writes URL to .cloudflare-preview-url.
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        test -n "${CLOUDFLARE_API_TOKEN:-}" && test -n "${CLOUDFLARE_ACCOUNT_ID:-}" && test -n "${CF_PAGES_BRANCH:-}";
        if [ ! -d nook-web/dist ]; then
          echo "error: nook-web/dist not found — run the web build before deploy" >&2;
          exit 1;
        fi;
        bunx wrangler@4 pages project create nook --production-branch=main >/dev/null 2>&1 || true;
        set +e;
        deploy_output="$(
          bunx wrangler@4 pages deploy nook-web/dist \
            --project-name=nook \
            --branch="${CF_PAGES_BRANCH}" \
            --commit-dirty=true 2>&1
        )";
        deploy_status=$?;
        set -e;
        echo "$deploy_output";
        if [ "$deploy_status" -ne 0 ]; then
          log_dir="${HOME:-/root}/.config/.wrangler/logs";
          if [ -d "$log_dir" ]; then
            latest_log="$(ls -t "$log_dir"/wrangler-*.log 2>/dev/null | head -1 || true)";
            if [ -n "$latest_log" ]; then
              echo "wrangler log ($latest_log):" >&2;
              cat "$latest_log" >&2;
            fi;
          fi;
          exit "$deploy_status";
        fi;
        deployment_url="$(
          echo "$deploy_output" \
            | grep -oE "Deployment alias URL: https://[^ ]+" \
            | sed "s/Deployment alias URL: //" \
            | tail -1
        )";
        if [ -z "$deployment_url" ]; then
          deployment_url="$(
            echo "$deploy_output" \
              | grep -oE "https://[a-zA-Z0-9.-]+\.pages\.dev[^ ]*" \
              | tail -1
          )";
        fi;
        if [ -z "$deployment_url" ]; then
          echo "Could not parse Cloudflare deployment URL from wrangler output" >&2;
          exit 1;
        fi;
        echo "$deployment_url" > .cloudflare-preview-url'

  _comment-preview:
    desc: Comment or update Cloudflare preview URL on the PR.
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        export PREVIEW_URL="${PREVIEW_URL:-$(cat .cloudflare-preview-url)}";
        bun run .github/scripts/comment-preview-url.ts'
