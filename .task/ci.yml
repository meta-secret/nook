version: '3'

tasks:
  ci:pr:
    desc: PR CI — one container for format/verify/build/e2e (source + warm target/ baked in the nook-web image).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _ci:pr }

  ci:pr:e2e:
    desc: Fast Playwright e2e-pr only (when dist/wasm already built in the same job).
    cmds:
      - cp -a nook-web/dist nook-web/dist-prod
      - task: web:e2e:build-dist
      - task: web:test:e2e:pr:parallel

  ci:pr:e2e:local:
    desc: Alias for ci:pr:e2e.
    cmds:
      - task: ci:pr:e2e

  ci:pr:publish:
    desc: PR CI verify, then publish the :buildcache layers to GHCR (no :latest overwrite).
    cmds:
      - task: ci:pr
      - task: docker:push:cache:ci

  ci:main:
    desc: Main branch CI — one container for format/verify/build/e2e (source + warm target/ baked in the nook-web image).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _ci:main }

  ci:main:prepare:
    desc: Format check and wasm build in one container (manual/debug only — prefer ci:main:build).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _ci:pr:prepare }

  ci:main:parallel:
    desc: Verify ‖ web build in one container (manual/debug — wasm must exist on bind mount).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _ci:pr:parallel }

  ci:main:finish:
    desc: Alias for ci:main (legacy parallel finish name).
    cmds:
      - task: ci:main

  ci:main:e2e:
    desc: Full stub Playwright e2e when wasm/dist already built (same job container).
    cmds:
      - task: web:test:e2e:parallel

  ci:main:e2e:parallel:
    desc: Alias for ci:main:e2e.
    cmds:
      - task: ci:main:e2e

  ci:nightly:e2e:
    desc: Nightly live sync provider e2e (real APIs; requires provider credentials).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _ci:nightly:e2e }

  ci:main:build:
    desc: Format, wasm, verify, and web build in one container (no e2e).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _ci:main:build }

  ci:main:publish:
    desc: Main CI verify/build/e2e, then push toolchain to GHCR on success.
    cmds:
      - task: ci:main
      - task: docker:push:ci

  ci:pr:deploy-preview:
    desc: Deploy nook-web/dist to Cloudflare Pages inside the app container (dist is in-image, no mount).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _deploy-preview }

  ci:pr:comment-preview:
    desc: Comment or update Cloudflare preview URL on the PR (runs on host; only needs GITHUB_TOKEN + PR number).
    cmds:
      - task: _comment-preview

  docker:push:ci:
    desc: Publish the toolchain base image + cache to GHCR (after green main CI).
    env:
      PUSH_TOOLCHAIN: "1"
    cmds:
      - task: docker:push

  docker:push:cache:ci:
    desc: Publish only the :buildcache layers to GHCR (after green PR CI — no :latest overwrite).
    env:
      PUSH_TOOLCHAIN: "1"
    cmds:
      - task: docker:push:cache

  ci:pr:prepare:
    desc: Format check and wasm build in one container (manual/debug only — prefer ci:pr).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _ci:pr:prepare }

  ci:pr:parallel:
    desc: Verify ‖ web build in one container (manual/debug — wasm must exist on bind mount).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _ci:pr:parallel }

  ci:verify:parallel:
    desc: Lint and test in Docker without rebuilding wasm.
    cmds:
      - task: docker:task
        vars: { TASK: _verify:parallel }

  ci:verify:
    desc: Format, lint, and test in Docker (no web production build).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _verify }

  _ci:pr:
    desc: PR gate — format, wasm, verify ‖ build, e2e-pr, restore prod dist (one container).
    cmds:
      - task: _format:check
      - task: _wasm:build
      - task: _ci:pr:parallel
      - cp -a nook-web/dist nook-web/dist-prod
      - task: _web:e2e:build-dist
      - task: _web:test:e2e:pr:parallel
      - task: _web:e2e:restore-prod-dist

  _ci:pr:parallel:
    desc: Lint/test ‖ production web build after wasm is ready.
    deps:
      - _verify:parallel
      - _web:build:parallel

  _ci:main:build:
    desc: Main verify/build track without e2e.
    cmds:
      - task: _format:check
      - task: _wasm:build
      - task: _ci:pr:parallel

  _ci:main:
    desc: Main gate — format, wasm, verify ‖ build, stub e2e, restore prod dist.
    cmds:
      - task: _ci:main:build
      - cp -a nook-web/dist nook-web/dist-prod
      - task: _web:e2e:build-dist
      - task: _web:test:e2e:parallel
      - task: _web:e2e:restore-prod-dist

  _ci:nightly:e2e:
    desc: Nightly live sync e2e after full main build in one container.
    cmds:
      - task: _ci:main:build
      - cp -a nook-web/dist nook-web/dist-prod
      - task: _web:test:e2e:sync-live:parallel
      - task: _web:e2e:restore-prod-dist

  _ci:pr:prepare:
    desc: Format and wasm (split-container debug only — prefer _ci:pr).
    cmds:
      - task: _format:check
      - task: _wasm:build

  _deploy-preview:
    desc: Deploy nook-web/dist to Cloudflare Pages; writes URL to .cloudflare-preview-url.
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        test -n "${CLOUDFLARE_API_TOKEN:-}" && test -n "${CLOUDFLARE_ACCOUNT_ID:-}" && test -n "${CF_PAGES_BRANCH:-}";
        if [ ! -d nook-web/dist ]; then
          echo "error: nook-web/dist not found — run the web build before deploy" >&2;
          exit 1;
        fi;
        bunx wrangler@4 pages project create nook --production-branch=main >/dev/null 2>&1 || true;
        set +e;
        deploy_output="$(
          bunx wrangler@4 pages deploy nook-web/dist \
            --project-name=nook \
            --branch="${CF_PAGES_BRANCH}" \
            --commit-dirty=true 2>&1
        )";
        deploy_status=$?;
        set -e;
        echo "$deploy_output";
        if [ "$deploy_status" -ne 0 ]; then
          log_dir="${HOME:-/root}/.config/.wrangler/logs";
          if [ -d "$log_dir" ]; then
            latest_log="$(ls -t "$log_dir"/wrangler-*.log 2>/dev/null | head -1 || true)";
            if [ -n "$latest_log" ]; then
              echo "wrangler log ($latest_log):" >&2;
              cat "$latest_log" >&2;
            fi;
          fi;
          exit "$deploy_status";
        fi;
        deployment_url="$(
          echo "$deploy_output" \
            | grep -oE "Deployment alias URL: https://[^ ]+" \
            | sed "s/Deployment alias URL: //" \
            | tail -1
        )";
        if [ -z "$deployment_url" ]; then
          deployment_url="$(
            echo "$deploy_output" \
              | grep -oE "https://[a-zA-Z0-9.-]+\.pages\.dev[^ ]*" \
              | tail -1
          )";
        fi;
        if [ -z "$deployment_url" ]; then
          echo "Could not parse Cloudflare deployment URL from wrangler output" >&2;
          exit 1;
        fi;
        echo "$deployment_url" > .cloudflare-preview-url;
        # Stable marker for the host to capture the URL from container stdout (no bind mount).
        echo "NOOK_PREVIEW_URL=$deployment_url"'

  _comment-preview:
    desc: Comment or update Cloudflare preview URL on the PR.
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        export PREVIEW_URL="${PREVIEW_URL:-$(cat .cloudflare-preview-url)}";
        bun run .github/scripts/comment-preview-url.ts'
