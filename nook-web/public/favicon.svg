<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="nook">
  <style>
    :root { color-scheme: light dark; }
    .bg  { fill: #111317; }
    .fg  { fill: none; stroke: #ffffff; }
    .dot { fill: #ffffff; }
    @media (prefers-color-scheme: light) {
      .bg  { fill: #ffffff; }
      .fg  { fill: none; stroke: #111317; }
      .dot { fill: #111317; }
    }
  </style>

  <!-- background -->
  <rect class="bg" width="100" height="100" rx="20"/>

  <!-- house outline -->
  <path class="fg" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" fill="none" d="
    M50 12
    L22 34
    C18 37 16 42 16 47
    L16 72
    C16 77 20 81 25 81
    L38 81
    L38 60
    C38 53.4 43.4 48 50 48
    C56.6 48 62 53.4 62 60
    L62 81
    L75 81
    C80 81 84 77 84 72
    L84 47
    C84 42 82 37 78 34
    Z
  "/>

  <!-- top hanging trace: vertical line down from roof peak + open circle -->
  <line class="fg" stroke-width="3" stroke-linecap="round" x1="50" y1="12" x2="50" y2="30"/>
  <circle class="fg" stroke-width="3" cx="50" cy="34" r="4"/>

  <!-- left circuit: vertical spine + 3 horizontal arms with dots -->
  <line class="fg" stroke-width="2.5" stroke-linecap="round" x1="30" y1="42" x2="30" y2="62"/>
  <!-- arm 1 -->
  <line class="fg" stroke-width="2.5" stroke-linecap="round" x1="30" y1="46" x2="20" y2="46"/>
  <circle class="dot" cx="18.5" cy="46" r="2.5"/>
  <!-- arm 2 -->
  <line class="fg" stroke-width="2.5" stroke-linecap="round" x1="30" y1="53" x2="20" y2="53"/>
  <circle class="dot" cx="18.5" cy="53" r="2.5"/>
  <!-- arm 3 -->
  <line class="fg" stroke-width="2.5" stroke-linecap="round" x1="30" y1="60" x2="20" y2="60"/>
  <circle class="dot" cx="18.5" cy="60" r="2.5"/>

  <!-- right circuit: diagonal trace from upper-right area down to a node -->
  <polyline class="fg" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" points="70,38 70,56 62,64"/>
  <circle class="dot" cx="62" cy="66" r="2.5"/>
  <!-- upper node -->
  <circle class="fg" stroke-width="2.5" cx="70" cy="35" r="3.5"/>
</svg>
