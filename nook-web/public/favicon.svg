<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="nook">
  <style>
    :root { color-scheme: light dark; }
    .bg { fill: #0a0a0a; }
    .bow { fill: #161616; stroke: #2a2a2a; }
    .chip { fill: #111111; stroke: #333333; }
    .blade { fill: #161616; }
    .infinity { fill: none; stroke: #3ee9d6; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .bow { fill: #f3f4f6; stroke: #d1d5db; }
      .chip { fill: #ffffff; stroke: #9ca3af; }
      .blade { fill: #e5e7eb; }
      .infinity { stroke: #0d9488; }
    }
  </style>

  <rect class="bg" width="100" height="100" rx="22" />

  <!-- key bow -->
  <rect
    class="bow"
    x="24"
    y="16"
    width="52"
    height="44"
    rx="10"
    stroke-width="1.5"
  />
  <circle class="bg" cx="50" cy="22" r="4.5" />

  <!-- chip -->
  <rect
    class="chip"
    x="34"
    y="28"
    width="32"
    height="28"
    rx="4"
    stroke-width="1.2"
  />

  <!-- infinity mark (the linked "oo" from the wordmark) -->
  <path
    class="infinity"
    fill="none"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    d="M 38 42
       C 38 36 44 35 50 42
       C 56 49 62 48 62 42
       C 62 36 56 35 50 42
       C 44 49 38 48 38 42 Z"
  />

  <!-- key blade -->
  <path
    class="blade"
    d="M 44 60 L 44 78 L 47 78 L 47 74 L 50 74 L 50 82 L 53 82 L 53 74 L 56 74 L 56 78 L 59 78 L 59 60 Z"
  />
</svg>
