name: nook-infra

services:
  redis:
    image: redis:8.2.2-alpine@sha256:59b6e694653476de2c992937ebe1c64182af4728e54bb49e9b7a6c26614d8933
    command:
      - redis-server
      - --bind
      - 0.0.0.0
      - --protected-mode
      - "no"
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 12gb
      - --maxmemory-policy
      - allkeys-lru
    restart: unless-stopped
    ports:
      - 127.0.0.1:6380:6379
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    mem_limit: 14g
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    logging:
      options:
        max-size: 10m
        max-file: "3"

  registry:
    image: registry:3.0.0@sha256:6c5666b861f3505b116bb9aa9b25175e71210414bd010d92035ff64018f9457e
    restart: unless-stopped
    ports:
      - 127.0.0.1:5000:5000
    environment:
      REGISTRY_HTTP_ADDR: 0.0.0.0:5000
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:5000/v2/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    mem_limit: 1g
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    logging:
      options:
        max-size: 10m
        max-file: "3"

volumes:
  redis-data:
  registry-data:
