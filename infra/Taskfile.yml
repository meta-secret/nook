version: '3'

vars:
  INFRA_SSH_TARGET: '{{default "debian@ssh-ovh-borg-1.bynull.link" .INFRA_SSH_TARGET}}'
  INFRA_REMOTE_DIR: '{{default "/home/debian/.local/share/nook-infra" .INFRA_REMOTE_DIR}}'
  INFRA_MESH_SSH_TARGET: '{{default "ssh.bynull.link" .INFRA_MESH_SSH_TARGET}}'
  INFRA_MESH_NODE_NAME: '{{default "nook-servo" .INFRA_MESH_NODE_NAME}}'
  INFRA_CLOUDFLARE_ACCOUNT_ID: '{{default "8a84df74d5bcf7b212980e6f51979731" .INFRA_CLOUDFLARE_ACCOUNT_ID}}'

tasks:
  mesh:node:add:
    desc: Idempotently add a Linux server as a distinct Cloudflare Mesh node.
    silent: true
    cmds:
      - |
        bash <<'BASH'
        set -euo pipefail

        ssh_target="{{.INFRA_MESH_SSH_TARGET}}"
        node_name="{{.INFRA_MESH_NODE_NAME}}"
        account_id="{{.INFRA_CLOUDFLARE_ACCOUNT_ID}}"

        ssh -n -o BatchMode=yes "$ssh_target" 'set -eu
          . /etc/os-release
          test "$ID" = ubuntu
          test "$VERSION_ID" = 26.04
          test "$(uname -m)" = x86_64
          for command in /usr/bin/apt-get /usr/bin/tee; do
            test -x "$command"
          done
          if ! sudo -n true >/dev/null 2>&1; then
            echo "infra mesh: $USER needs passwordless sudo" >&2
            exit 77
          fi
          if systemctl --type=service --state=running --no-pager --no-legend |
            grep -Eiq "(tailscale|wireguard|openvpn|dnsmasq|named|bind|unbound)"; then
            echo "infra mesh: refusing to install alongside another VPN or DNS service" >&2
            exit 78
          fi'

        INFRA_MESH_SSH_TARGET="$ssh_target" \
        INFRA_MESH_NODE_NAME="$node_name" \
        INFRA_CLOUDFLARE_ACCOUNT_ID="$account_id" \
          node --input-type=module <<'NODE'
        "use strict";

        import { execFileSync, spawnSync } from "node:child_process";

        const sshTarget = process.env.INFRA_MESH_SSH_TARGET;
        const nodeName = process.env.INFRA_MESH_NODE_NAME;
        const accountId = process.env.INFRA_CLOUDFLARE_ACCOUNT_ID;
        const apiRoot = `https://api.cloudflare.com/client/v4/accounts/${accountId}`;
        const auth = JSON.parse(
          execFileSync("wrangler", ["auth", "token", "--json"], { encoding: "utf8" }),
        );

        async function cloudflare(path, options = {}) {
          const response = await fetch(`${apiRoot}${path}`, {
            ...options,
            headers: {
              Authorization: `Bearer ${auth.token}`,
              "Content-Type": "application/json",
              ...options.headers,
            },
          });
          const payload = await response.json();
          if (!response.ok || !payload.success) {
            throw new Error(
              `Cloudflare Mesh API request failed (${response.status}): ${JSON.stringify(payload.errors)}`,
            );
          }
          return payload.result;
        }

        let nodes = await cloudflare("/warp_connector");
        let node = nodes.find((candidate) => candidate.name === nodeName);
        let created = false;
        if (!node) {
          node = await cloudflare("/warp_connector", {
            method: "POST",
            body: JSON.stringify({ name: nodeName, ha: false }),
          });
          created = true;
        }

        const remoteScript = `set -euo pipefail
        export DEBIAN_FRONTEND=noninteractive
        sudo -n apt-get update -qq
        sudo -n apt-get install -y -qq ca-certificates curl gpg
        curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg |
          sudo -n gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
        . /etc/os-release
        printf '%s\n' "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $VERSION_CODENAME main" |
          sudo -n tee /etc/apt/sources.list.d/cloudflare-client.list >/dev/null
        sudo -n apt-get update -qq
        sudo -n apt-get install -y -qq cloudflare-warp
        `;

        async function requireSuccess(result, operation) {
          if (!result.error && result.status === 0) return;
          if (created) {
            await cloudflare(`/warp_connector/${node.id}`, { method: "DELETE" });
          }
          throw result.error || new Error(`${operation} failed with status ${result.status}`);
        }

        const install = spawnSync(
          "ssh",
          ["-o", "BatchMode=yes", sshTarget, "bash -s"],
          { input: remoteScript, encoding: "utf8", stdio: ["pipe", "inherit", "inherit"] },
        );
        await requireSuccess(install, "Mesh node package installation");

        const registration = spawnSync(
          "ssh",
          ["-o", "BatchMode=yes", sshTarget, "sudo -n /usr/bin/warp-cli registration show"],
          { stdio: "ignore" },
        );

        if (registration.status !== 0) {
          let connectorToken = node.token;
          if (!connectorToken) {
            const tokenResult = await cloudflare(`/warp_connector/${node.id}/token`);
            connectorToken = typeof tokenResult === "string" ? tokenResult : tokenResult.token;
          }
          if (typeof connectorToken !== "string" || connectorToken.length < 20) {
            throw new Error("Cloudflare Mesh did not return a usable connector token");
          }

          const enrollmentHelper = String.raw`#!/usr/bin/env bash
        set -euo pipefail

        if systemctl is-active --quiet auditd; then
          echo "infra mesh: refusing connector enrollment while auditd is active" >&2
          exit 79
        fi
        if command -v auditctl >/dev/null 2>&1 &&
          auditctl -s 2>/dev/null | grep -Eq '^enabled[[:space:]]+[12]$'; then
          echo "infra mesh: refusing connector enrollment while kernel auditing is enabled" >&2
          exit 79
        fi

        original_hidepid="$(findmnt -n -o OPTIONS /proc | tr ',' '\n' | sed -n 's/^hidepid=//p' | tail -1)"
        if test -z "$original_hidepid"; then original_hidepid=0; fi
        restore_proc() {
          connector_token=
          mount -o remount,hidepid="$original_hidepid" /proc
        }
        trap restore_proc EXIT
        trap 'exit 130' HUP INT TERM
        mount -o remount,hidepid=2 /proc

        IFS= read -r connector_token
        token_length="$(printf '%s' "$connector_token" | wc -c)"
        test "$token_length" -ge 20
        /usr/bin/warp-cli connector new "$connector_token"
        connector_token=
        `;

          const helperInstall = spawnSync(
            "ssh",
            [
              "-o",
              "BatchMode=yes",
              sshTarget,
              "sudo -n tee /run/nook-warp-enroll >/dev/null && sudo -n chmod 0700 /run/nook-warp-enroll",
            ],
            { input: enrollmentHelper, encoding: "utf8", stdio: ["pipe", "inherit", "inherit"] },
          );
          await requireSuccess(helperInstall, "Mesh enrollment helper installation");

          const enroll = spawnSync(
            "ssh",
            ["-o", "BatchMode=yes", sshTarget, "sudo -n /run/nook-warp-enroll"],
            {
              input: `${connectorToken}\n`,
              encoding: "utf8",
              stdio: ["pipe", "inherit", "inherit"],
            },
          );
          connectorToken = "";
          spawnSync(
            "ssh",
            ["-o", "BatchMode=yes", sshTarget, "sudo -n rm -f /run/nook-warp-enroll"],
            { stdio: "ignore" },
          );
          await requireSuccess(enroll, "Mesh connector enrollment");
        }

        const connectScript = `set -euo pipefail
        sudo -n warp-cli connect
        for _ in $(seq 1 30); do
          if sudo -n warp-cli status 2>/dev/null | grep -q 'Status update: Connected'; then
            break
          fi
          sleep 1
        done
        sudo -n warp-cli status
        ip -brief address | grep CloudflareWARP
        `;

        const connect = spawnSync(
          "ssh",
          ["-o", "BatchMode=yes", sshTarget, "bash -s"],
          { input: connectScript, encoding: "utf8", stdio: ["pipe", "inherit", "inherit"] },
        );
        await requireSuccess(connect, "Mesh connection");

        const connections = await cloudflare(`/warp_connector/${node.id}/connections`);
        if (!Array.isArray(connections) || connections.length === 0) {
          throw new Error("Cloudflare Mesh node installed but has no active connection");
        }
        process.stdout.write(`Cloudflare Mesh node ${nodeName} is online\n`);
        NODE
        BASH

  mesh:status:
    desc: Show Cloudflare Mesh status and addresses on a Linux server.
    cmds:
      - >-
        ssh -o BatchMode=yes "{{.INFRA_MESH_SSH_TARGET}}"
        'sudo -n warp-cli status && ip -brief address | grep CloudflareWARP'

  deploy:
    desc: Deploy the public TLS Redis cache and loopback-only future registry.
    silent: true
    cmds:
      - |
        bash <<'BASH'
        set -euo pipefail

        repo_root="$(git rev-parse --show-toplevel)"
        ssh_target="{{.INFRA_SSH_TARGET}}"
        remote_dir="{{.INFRA_REMOTE_DIR}}"
        compose_file="$repo_root/infra/compose.yaml"
        traefik_file="$repo_root/infra/traefik-dynamic.yaml"
        remote_next="$remote_dir/compose.yaml.next"
        remote_compose="$remote_dir/compose.yaml"
        remote_traefik_next="$remote_dir/traefik-dynamic.yaml.next"
        remote_traefik="$remote_dir/traefik-dynamic.yaml"
        remote_secrets="$remote_dir/secrets"

        case "$remote_dir" in
          /home/*/.local/share/nook-infra) ;;
          *)
            echo "infra deploy: refusing unexpected remote directory: $remote_dir" >&2
            exit 2
            ;;
        esac

        docker compose -f "$compose_file" config --quiet
        ssh -n -o BatchMode=yes "$ssh_target" \
          "set -eu; \
           install -d -m 0750 '$remote_dir'; \
           install -d -m 0700 '$remote_secrets'; \
           if [ ! -s '$remote_secrets/redis-password' ]; then \
             umask 077; \
             openssl rand -hex 32 > '$remote_secrets/redis-password'; \
           fi; \
           chmod 0600 '$remote_secrets/redis-password'"
        scp -q -o BatchMode=yes "$compose_file" "$ssh_target:$remote_next"
        scp -q -o BatchMode=yes "$traefik_file" "$ssh_target:$remote_traefik_next"

        ssh -n -o BatchMode=yes "$ssh_target" \
          "set -eu; \
           docker compose -f '$remote_next' config --quiet; \
           mv '$remote_traefik_next' '$remote_traefik'; \
           mv '$remote_next' '$remote_compose'; \
           docker compose -f '$remote_compose' pull; \
           docker compose -f '$remote_compose' up -d --remove-orphans --wait"

        ssh -n -o BatchMode=yes "$ssh_target" \
          "set -eu; \
           test \"\$(docker compose -f '$remote_compose' exec -T redis sh -ec 'export REDISCLI_AUTH=\"\$(cat /run/secrets/redis-password)\"; exec redis-cli ping')\" = PONG; \
           docker compose -f '$remote_compose' ps --services --filter status=running | grep -qx traefik; \
           curl --fail --silent --show-error http://127.0.0.1:5000/v2/ >/dev/null; \
           docker compose -f '$remote_compose' ps"
        BASH

  status:
    desc: Show the remote infrastructure service state.
    cmds:
      - >-
        ssh -o BatchMode=yes "{{.INFRA_SSH_TARGET}}"
        docker compose -f "{{.INFRA_REMOTE_DIR}}/compose.yaml" ps

  logs:
    desc: Show recent remote infrastructure logs.
    cmds:
      - >-
        ssh -o BatchMode=yes "{{.INFRA_SSH_TARGET}}"
        docker compose -f "{{.INFRA_REMOTE_DIR}}/compose.yaml" logs --tail=100

  redis:ping:
    desc: Verify the remote Redis compiler-cache service.
    silent: true
    cmds:
      - >-
        ssh -o BatchMode=yes "{{.INFRA_SSH_TARGET}}"
        'docker compose -f "{{.INFRA_REMOTE_DIR}}/compose.yaml" exec -T redis
        sh -ec '\''export REDISCLI_AUTH="$(cat /run/secrets/redis-password)"; exec redis-cli ping'\'''

  redis:credential:sync:
    desc: Copy the remote Redis password into the ignored local cache credential file.
    silent: true
    cmds:
      - |
        bash <<'BASH'
        set -euo pipefail
        repo_root="$(git rev-parse --show-toplevel)"
        credential_dir="$repo_root/.nook/cache"
        credential_file="$credential_dir/redis-password"
        install -d -m 0700 "$credential_dir"
        umask 077
        ssh -n -o BatchMode=yes "{{.INFRA_SSH_TARGET}}" \
          "cat '{{.INFRA_REMOTE_DIR}}/secrets/redis-password'" > "$credential_file"
        test -s "$credential_file"
        chmod 0600 "$credential_file"
        echo "Redis credential synchronized to .nook/cache/redis-password"
        BASH

  redis:stats:
    desc: Show remote Redis cache size, memory, hits, misses, and evictions.
    silent: true
    cmds:
      - >-
        ssh -o BatchMode=yes "{{.INFRA_SSH_TARGET}}"
        'set -eu;
        compose="{{.INFRA_REMOTE_DIR}}/compose.yaml";
        docker compose -f "$compose" exec -T redis sh -ec '\''export REDISCLI_AUTH="$(cat /run/secrets/redis-password)"; redis-cli DBSIZE; redis-cli INFO memory | grep -E "^(used_memory_human|maxmemory_human|maxmemory_policy):"; redis-cli INFO stats | grep -E "^(keyspace_hits|keyspace_misses|evicted_keys):"'\'''

  registry:check:
    desc: Verify the future loopback-only Docker registry API.
    cmds:
      - >-
        ssh -o BatchMode=yes "{{.INFRA_SSH_TARGET}}"
        curl --fail --silent --show-error http://127.0.0.1:5000/v2/
