waste_assessment:
  findings:
    - Three avoidable head-push PR cycles from late UI-demo-contract, rustfmt export order, and Prettier formatting.
    - Parallel task check + task ci:pr exhausted local Docker and produced OOM/BuildKit EOF without adding signal beyond remote PR CI.
  required_actions:
    - Run ui-demo-contract.sh and host-mounted Prettier before the first push when extension or shared sources change.
    - Prefer a single local gate (task check or task ci:pr) in parallel with remote PR CI, not both heavy Docker gates at once.
