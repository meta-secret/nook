waste_assessment:
  wasteful: false
  findings:
    - The initial remote cycle found two real isolation boundaries that existing local installs did not reproduce: the research package resolved a sibling dependency locally, and updated preflight required explicit Simple and Sentinel literals.
    - The intermediate PR run was superseded by the boundary fix and cancelled rather than rerun unchanged; no manual reruns or premature merge attempts occurred.
    - Four full format gates followed distinct source or base changes, while focused checks isolated each failure before the next push.
    - One local jscpd invocation used the obsolete plural flag and failed immediately without consuming a product build.
    - The broader elapsed time reflects the requested whole-repository Rust and TypeScript clone removal rather than an actionable build or workflow regression, so no separate performance PR is warranted.
  required_actions: []
