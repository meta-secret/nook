comparison:
  baseline_prs: [580, 598]
  baseline_quality: comparable
  baseline_note: PRs 580 and 598 changed CI documentation and exercised the same format, PR, preview, and readiness gates, but they did not intentionally measure a cold promotion followed by multiple steady-state proof runs.
  elapsed_seconds_change_percent: 692.4
  local_execution_seconds_change_percent: 5836.2
  github_actions_seconds_change_percent: 411.4
  test_inventory_total_change: 72
  regression: true
  regression_reasons:
    - The proof PR intentionally ran one cold producer cycle and three trusted-handoff validation cycles, so aggregate Actions time exceeded the comparable single-run documentation baseline.
    - Two repository-wide format executions stalled in the local Docker build graph for 47 minutes and 18 minutes even though the documentation remained unchanged after formatting.
waste_assessment:
  wasteful: false
  findings:
    - Cold run 30012040776 established a fresh exact-input producer baseline; the later warm runs were required to prove the promoted handoff, rebase safety, and final reviewed head rather than repeating an unchanged validation without evidence.
    - The final exact-head required-job span was 224 seconds, inside the documented four-to-five-minute budget, and both expensive Rust and WASM producer steps skipped only after trusted artifact validation.
    - All untrusted pull-request jobs correctly used credential-free local fallback; compiler-cache misses occurred only during the intentional cold producer run and no persistent secret was exposed.
    - The long local format executions were host Docker stalls outside the hosted PR workflow. They did not alter files, and the final warm local format returned to 87 seconds without a repository change, so no product-CI correction is supported by this record.
    - The automatic skipped post-merge pull_request dispatch is recorded for completeness and consumed two seconds without executing product validation.
  required_actions: []
