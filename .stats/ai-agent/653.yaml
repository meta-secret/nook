waste_assessment:
  wasteful: false
  findings:
    - The live collector proofs exposed fully qualified Buildx history references and rawjson progress on stderr, two production interfaces that fixture-only tests did not reveal.
    - The local regression is non-actionable for product CI because it came from the one-time cold repository format graph and compatibility proofs needed to make the new collector correct; the hosted workflow itself finished 30.8 percent faster than the comparable baseline.
    - The PR completed with one successful Actions run, no reruns, no base-triggered retries, and one successful squash merge attempt.
    - All three untrusted PR jobs correctly selected the credential-free local fallback, quantifying 2554 compiler-cache misses without exposing the persistent Redis credentials.
    - BuildKit reused 115 of 510 completed target-record steps; this is step reuse rather than byte or unique-layer size because Buildx does not expose a stable portable byte-volume metric for this workflow.
