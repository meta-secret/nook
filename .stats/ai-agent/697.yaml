waste_assessment:
  wasteful: false
  findings:
    - Before the fix, wasm-pack test recompiled nook-auth2/nook-core/nook-wasm after wasm-pack build because cargo build --lib and cargo build --tests use different unit graphs.
    - After the sibling builder-wasm-tests warm-up, wasm-pack test finished both cargo invocations in 0.19s and 0.18s with no Compiling lines.
    - The one head-push retrigger was the intentional second warm for cargo test --target; both PR cycles stayed under five minutes.
    - Untrusted PR jobs correctly used credential-free direct compile; BuildKit layer reuse on the final wasm job was about 67 percent.
  required_actions: []
