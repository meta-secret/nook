waste_assessment:
  wasteful: true
  findings:
    - "#700's Main overlap script called internal task docker:e2e:run from the host CLI (task exit 202), so extension e2e never started while UI demos still passed through public ui:demo:ci."
    - The bug was not caught by PR ci:full-e2e because that path invokes docker:e2e:run as a Taskfile dependency, which is allowed for internal tasks.
    - Fix adds public extension:test:e2e:ci mirroring ui:demo:ci and updates the Main host script plus a preflight contract.
