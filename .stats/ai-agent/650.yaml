comparison:
  baseline_prs: [644]
  baseline_quality: comparable
  baseline_note: PR 644 was a recent shared web UI flow change using the same Rust, WASM, headless demo, preview, and merged-head inventory gates.
  elapsed_seconds_change_percent: 223.9
  local_execution_seconds_change_percent: 245.9
  github_actions_seconds_change_percent: 249.9
  test_inventory_total_change: 1
  regression: true
  regression_reasons:
    - End-to-end elapsed time exceeded the comparable baseline by 6233 seconds because four current-main updates required fresh exact-head validation.
    - Actions time exceeded the comparable baseline by 4456 seconds across superseded heads and one bounded rerun of an unchanged head after a coverage fallback failure.
    - Local validation time exceeded the baseline by 996 seconds because repository policy required format and focused browser proof after every base update.
waste_assessment:
  wasteful: false
  findings:
    - Each replacement head followed a real current-main advance; the repeated exact-head checks were required rather than speculative full-suite reruns.
    - The one unchanged-head rerun was bounded to failed jobs after the base coverage fallback failed while native Rust, WASM, web checks, demo, and preview had already passed.
    - Cache telemetry was introduced on the later base, so the first four recorded attempts have no cache artifacts; both telemetry-enabled runs are represented by all six available job artifacts.
    - Untrusted pull-request jobs correctly used credential-free local fallback and exposed no persistent Redis credentials.
    - The final head improved BuildKit target-step reuse to 392 of 739 steps, allowing native verification to fall from 19m23s on the prior head to 5m58s.
    - The remaining 0 percent compiler-cache hit rate is expected for credential-free PR jobs; supplying trusted remote cache credentials to untrusted pull requests would violate the repository security boundary.
  required_actions: []
