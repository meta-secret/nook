  regression: true
  regression_reasons:
    - Multiple Verify-and-preview failures on jscpd threshold, missing UI demo contract, prettier, and demo strict-mode locators before the first green run
    - Repeated main merges for login-save and credit-card landings forced conflict resolution and extra full PR cycles after the feature was already green
waste_assessment:
  wasteful: true
  findings:
    - First green PR check arrived only after seven failed/cancelled Verify-and-preview cycles for formatting, jscpd, and demo contract issues that could have been caught with focused local gates before push
    - Parallel local Docker check/ci:pr runs repeatedly hit BuildKit EOF and were cancelled without contributing a merge signal once remote PR CI was green
    - Merging main twice late (login-save, credit-card) was necessary for readiness, but each merge re-paid a full ~12m PR cycle
  required_actions:
    - Run extension unit tests, prettier --check, jscpd, and ui-demo-contract.sh before the first push for Pilot/extension UI work
    - Prefer one local Docker gate in parallel with remote PR CI; stop stacking check + ci:pr when BuildKit is flaky
    - Keep Pilot demo chrome stubs in the shared helper so new demos from main do not re-trip the 1.7% jscpd threshold
