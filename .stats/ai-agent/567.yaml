waste_assessment:
  wasteful: true
  findings:
    - First three PR runs failed on clippy, missing UI demo contract, and rustfmt after the initial push
    - Parallel task check, task ci:pr, and e2e against flaky local BuildKit burned over three hours without a green local gate while remote PR CI was already the merge signal
    - Final rebase onto updated main was necessary and healthy; the skipped post-merge PR run is noise
  required_actions:
    - Run cargo fmt --check, wasm/native clippy -D warnings, and ui-demo-contract.sh before the first push for new vault item types
    - Prefer one local Docker gate in parallel with remote PR CI instead of check + ci:pr + e2e together
