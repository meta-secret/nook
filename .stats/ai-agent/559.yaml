waste_assessment:
  wasteful: true
  findings:
    - task format prints a sealed-image diff without writing the host tree; discovering that after a failed task check cost one full local gate and a cancelled PR run.
    - Shared vault-app edits require an e2e/demos/*.demo.spec.ts update; learning that from CI cost a failed Verify and preview cycle.
    - Self-posted PR status comments are counted as substantive and blocked pr:ready until deleted.
  required_actions:
    - Prefer host-applied Prettier via the sealed image before the first push when web files change.
    - Run .github/scripts/ui-demo-contract.sh against origin/main before opening PRs that touch nook-web-shared/src.
