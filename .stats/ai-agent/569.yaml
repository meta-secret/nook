waste_assessment:
  wasteful: true
  findings:
    - First three PR heads failed on missing UI demo contract, Sentinel stub export for a new extension-connect helper, and Prettier on new TS files
    - Parallel local task check and task ci:pr repeatedly hit BuildKit EOF/docker socket flaps; one healthy task ci:pr plus remote PR CI would have been enough
    - Main moved several times; merge updates were necessary, but early formatting/contract misses added avoidable cycles before those merges
  required_actions:
    - Before first push of shared vault UI changes, run ui-demo-contract.sh and project Prettier on touched TS/Svelte
    - When exporting new symbols from extension-connect, update nook-vault-sentinel extension-connect-disabled.ts in the same commit
    - Prefer a single local task ci:pr in parallel with remote PR checks; avoid concurrent full check + ci:pr on unstable BuildKit
