comparison:
  baseline_prs: [510, 513]
  baseline_quality: comparable
  baseline_note: Both recent records exercised browser flows plus the Rust WASM web and PR workflow gates
  elapsed_seconds_change_percent: 100.4
  local_execution_seconds_change_percent: 22.4
  github_actions_seconds_change_percent: 123.1
  regression: true
  regression_reasons:
    - The new CI integration required ten changed-head cycles while container recording, FFmpeg, preview metadata, and UI path coverage were hardened
    - Three exact-head successes were followed by newly submitted path-coverage review findings, so each required a complete repository-owned validation cycle
    - The final exact-head run spent 20 minutes in the existing native Rust gate and then exported base coverage because no successful Main artifact existed for the current base
waste_assessment:
  wasteful: false
  findings:
    - The final demo itself was an 8 to 11 second WebM; its CI step took 126 seconds including the isolated container setup, so recording did not dominate the 1466 second exact-head run
    - Cancelled runs were superseded by code or configuration changes; there were no manual reruns and local full validation ran in parallel with repository checks
    - Repeated exact-head runs followed concrete review fixes or the required base update rather than flaky retries
    - The missing base coverage artifact and native gate duration predated this feature and were not changed in PR 514, so this task found no separate persistent build regression to fix
  required_actions: []
