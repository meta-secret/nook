comparison:
  baseline_prs: [638, 640]
  baseline_quality: comparable
  baseline_note: PRs 638 and 640 changed browser-extension authentication UI and exercised the same Rust, WASM, extension, demo, preview, and readiness gates.
  elapsed_seconds_change_percent: 837.0
  local_execution_seconds_change_percent: -38.1
  github_actions_seconds_change_percent: 732.6
  test_inventory_total_change: 5
  regression: true
  regression_reasons:
    - Elapsed time and aggregate Actions time exceeded the comparable baseline median by more than 20 percent and 60 seconds because ten reviewed lifecycle corrections each required a fresh exact-head validation cycle.
    - GitHub repeatedly retained superseded pull-request head metadata after force-push rebases, requiring replacement PRs 663 and 665 plus repeated unchanged product validation.
waste_assessment:
  wasteful: false
  findings:
    - The initial implementation omitted several picker lifecycle boundaries later identified by review, including expiry, service-worker restart persistence, close and dismissal cancellation, takeover cancellation, late-open cancellation, scan removal, and explicit content-script acknowledgement; each correction was made on the source PR before merge.
    - Run 29980070137 failed because the demo runtime omitted the required expiresAt field; the following head corrected the fixture rather than weakening the production request contract.
    - Run 29982248636 attempt 1 ended with a late Bun exit 130; its unchanged-head attempt 2 passed, documenting an infrastructure retry rather than a product-code change.
    - GitHub pinned PRs 645 and 663 to superseded force-pushed heads and refused to reopen them, so exact-head replacement PRs and out-of-order cancelled or skipped runs were required to preserve readiness guarantees.
