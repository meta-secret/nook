version: '3'

tasks:
  preflight:
    desc: Run all repository-wide invariant tests.
    cmds:
      - task: preflight:test

  preflight:test:
    desc: Run the Rust preflight test suite in Docker.
    dir: '{{.ROOT_DIR}}'
    cmds:
      - >-
        docker buildx build
        --builder "${BUILDX_BUILDER:-$(docker context show 2>/dev/null || echo default)}"
        --platform linux/amd64
        --file preflight/Dockerfile
        --target test
        --output type=cacheonly
        .

  preflight:export:
    desc: Export the static Rust preflight reporter for downstream CI jobs.
    dir: '{{.ROOT_DIR}}'
    requires:
      vars: [PREFLIGHT_OUTPUT_DIR]
    cmds:
      - >-
        docker buildx build
        --builder "${BUILDX_BUILDER:-$(docker context show 2>/dev/null || echo default)}"
        --platform linux/amd64
        --file preflight/Dockerfile
        --target cli-export
        --output type=local,dest="{{.PREFLIGHT_OUTPUT_DIR}}"
        .
