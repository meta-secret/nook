version: '3'

tasks:
  docker:build:
    desc: Alias for setup (build the linux/amd64 nook-web image).
    cmds:
      - task: setup

  docker:task:
    internal: true
    # No bind mount: the nook-web image already contains the workspace source (nook-app/nook-web/nook-web-app/Dockerfile).
    env:
      SCCACHE_REDIS_HOST_IP: '{{.SCCACHE_REDIS_HOST_IP}}'
      VITE_BASE: '{{.VITE_BASE}}'
      VITE_SITE_URL: '{{.VITE_SITE_URL}}'
      VITE_PUBLIC_APP_URL: '{{.VITE_PUBLIC_APP_URL}}'
      NOOK_SIMPLE_VAULT_URL: '{{.NOOK_SIMPLE_VAULT_URL}}'
      NOOK_EXTENSION_CHANNEL: '{{.NOOK_EXTENSION_CHANNEL}}'
      NOOK_EXTENSION_VERSION: '{{.NOOK_EXTENSION_VERSION}}'
      NOOK_EXTENSION_COMMIT: '{{.NOOK_EXTENSION_COMMIT}}'
      NOOK_EXTENSION_SITE_URL: '{{.NOOK_EXTENSION_SITE_URL}}'
      VITE_SIMPLE_APP_URL: '{{.VITE_SIMPLE_APP_URL}}'
      VITE_SENTINEL_APP_URL: '{{.VITE_SENTINEL_APP_URL}}'
      VITE_VAULT_SYNC_INTERVAL_MS: '{{.VITE_VAULT_SYNC_INTERVAL_MS}}'
      WASM_BUILD_MODE: '{{.WASM_BUILD_MODE}}'
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        -e SCCACHE_REDIS_HOST_IP="{{.SCCACHE_REDIS_HOST_IP}}"
        {{.DOCKER_RUN_LIMITS}}
        --ipc=host
        -e WASM_BUILD_MODE="{{.WASM_BUILD_MODE}}"
        -e VITE_BASE="{{.VITE_BASE}}"
        -e VITE_SITE_URL="{{.VITE_SITE_URL}}"
        -e VITE_PUBLIC_APP_URL="{{.VITE_PUBLIC_APP_URL}}"
        -e NOOK_SIMPLE_VAULT_URL="{{.NOOK_SIMPLE_VAULT_URL}}"
        -e NOOK_EXTENSION_CHANNEL="{{.NOOK_EXTENSION_CHANNEL}}"
        -e NOOK_EXTENSION_VERSION="{{.NOOK_EXTENSION_VERSION}}"
        -e NOOK_EXTENSION_COMMIT="{{.NOOK_EXTENSION_COMMIT}}"
        -e NOOK_EXTENSION_SITE_URL="{{.NOOK_EXTENSION_SITE_URL}}"
        -e VITE_SIMPLE_APP_URL="{{.VITE_SIMPLE_APP_URL}}"
        -e VITE_SENTINEL_APP_URL="{{.VITE_SENTINEL_APP_URL}}"
        -e VITE_VAULT_SYNC_INTERVAL_MS="{{.VITE_VAULT_SYNC_INTERVAL_MS}}"
        -e NOOK_GITHUB_PAT
        -e CI=1
        -e NOOK_GITHUB_E2E_REPO
        -e NOOK_GITHUB_POLL_MS
        -e NOOK_GITHUB_SYNC_TIMEOUT_MS
        -e NOOK_GITHUB_CONNECT_TIMEOUT_MS
        -e CLOUDFLARE_API_TOKEN
        -e CLOUDFLARE_ACCOUNT_ID
        -e CF_PAGES_BRANCH
        -e CF_PAGES_DIST_DIR
        -e CF_PAGES_PROJECT_NAME
        -e CF_PAGES_PRODUCTION_BRANCH
        -e GITHUB_TOKEN
        -e GITHUB_REPOSITORY
        -e PR_NUMBER
        -e PREVIEW_URL
        -w /meta-secret/nook
        {{.DOCKER_IMAGE}}
        task {{.TASK}}

  docker:rust:task:
    internal: true
    desc: Run a Task target in the on-demand source-sealed Rust/WASM image.
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        --add-host host.docker.internal:{{.SCCACHE_REDIS_HOST_IP}}
        -e SCCACHE_REDIS_HOST_IP="{{.SCCACHE_REDIS_HOST_IP}}"
        {{.DOCKER_RUN_LIMITS}}
        --ipc=host
        -e WASM_BUILD_MODE="{{.WASM_BUILD_MODE}}"
        -e CI=1
        -w /meta-secret/nook
        {{.DOCKER_RUST_IMAGE}}
        task {{.TASK}}

  docker:rust:browser:task:
    internal: true
    desc: Run a Task target in the on-demand Rust/WASM image with Chromium.
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        --add-host host.docker.internal:{{.SCCACHE_REDIS_HOST_IP}}
        -e SCCACHE_REDIS_HOST_IP="{{.SCCACHE_REDIS_HOST_IP}}"
        {{.DOCKER_RUN_LIMITS}}
        --ipc=host
        -e WASM_BUILD_MODE="{{.WASM_BUILD_MODE}}"
        -e CI=1
        -w /meta-secret/nook
        {{.DOCKER_RUST_BROWSER_IMAGE}}
        task {{.TASK}}

  docker:wasm:build:fast:
    internal: true
    # Mounted fast path uses a manifest-keyed image whose Cargo target lives outside the bind mount.
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        --add-host host.docker.internal:{{.SCCACHE_REDIS_HOST_IP}}
        -e SCCACHE_REDIS_HOST_IP="{{.SCCACHE_REDIS_HOST_IP}}"
        {{.DOCKER_RUN_LIMITS}}
        -e REPO_ROOT=/meta-secret/nook
        -e GIT_COMMIT_ID="{{.GIT_COMMIT_ID}}"
        -e CI_AGENT_IMAGE=nook-ci-agent:local
        -e WASM_BUILD_MODE=dev
        -e CARGO_TARGET_DIR=/opt/nook/cargo-target
        -v "{{.REPO_ROOT}}:/meta-secret/nook"
        -w /meta-secret/nook
        {{.DOCKER_RUST_FAST_IMAGE}}
        task _wasm:build:fast

  docker:e2e:run:
    desc: Run Playwright in Docker — Vite dev server stays on 127.0.0.1:5173 inside the container (no -p publish).
    internal: true
    # No bind mount: the nook-web image already contains the workspace source (nook-app/nook-web/nook-web-app/Dockerfile).
    env:
      SCCACHE_REDIS_HOST_IP: '{{.SCCACHE_REDIS_HOST_IP}}'
      VITE_BASE: '{{.VITE_BASE}}'
      NOOK_SIMPLE_VAULT_URL: '{{.NOOK_SIMPLE_VAULT_URL}}'
      NOOK_EXTENSION_CHANNEL: '{{.NOOK_EXTENSION_CHANNEL}}'
      NOOK_EXTENSION_VERSION: '{{.NOOK_EXTENSION_VERSION}}'
      NOOK_EXTENSION_COMMIT: '{{.NOOK_EXTENSION_COMMIT}}'
      NOOK_EXTENSION_SITE_URL: '{{.NOOK_EXTENSION_SITE_URL}}'
      VITE_SITE_URL: '{{.VITE_SITE_URL}}'
      VITE_SIMPLE_APP_URL: '{{.VITE_SIMPLE_APP_URL}}'
      VITE_SENTINEL_APP_URL: '{{.VITE_SENTINEL_APP_URL}}'
      VITE_VAULT_SYNC_INTERVAL_MS: '{{.VITE_VAULT_SYNC_INTERVAL_MS}}'
      E2E_SPEC: '{{.E2E_SPEC}}'
      WASM_BUILD_MODE: '{{.WASM_BUILD_MODE}}'
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        -e SCCACHE_REDIS_HOST_IP="{{.SCCACHE_REDIS_HOST_IP}}"
        {{.DOCKER_RUN_LIMITS}}
        --ipc=host
        -e WASM_BUILD_MODE="{{.WASM_BUILD_MODE}}"
        -e VITE_BASE="{{.VITE_BASE}}"
        -e NOOK_SIMPLE_VAULT_URL="{{.NOOK_SIMPLE_VAULT_URL}}"
        -e NOOK_EXTENSION_CHANNEL="{{.NOOK_EXTENSION_CHANNEL}}"
        -e NOOK_EXTENSION_VERSION="{{.NOOK_EXTENSION_VERSION}}"
        -e NOOK_EXTENSION_COMMIT="{{.NOOK_EXTENSION_COMMIT}}"
        -e NOOK_EXTENSION_SITE_URL="{{.NOOK_EXTENSION_SITE_URL}}"
        -e VITE_SITE_URL="{{.VITE_SITE_URL}}"
        -e VITE_SIMPLE_APP_URL="{{.VITE_SIMPLE_APP_URL}}"
        -e VITE_SENTINEL_APP_URL="{{.VITE_SENTINEL_APP_URL}}"
        -e VITE_VAULT_SYNC_INTERVAL_MS="{{.VITE_VAULT_SYNC_INTERVAL_MS}}"
        -e NOOK_GITHUB_PAT
        -e CI=1
        -e NOOK_GITHUB_E2E_REPO
        -e NOOK_GITHUB_POLL_MS
        -e NOOK_GITHUB_SYNC_TIMEOUT_MS
        -e NOOK_GITHUB_CONNECT_TIMEOUT_MS
        -e NOOK_E2E_SKIP_GITHUB_CLEANUP
        -e NOOK_E2E_SYNC_PROVIDER
        -e NOOK_GOOGLE_E2E_ACCESS_TOKEN
        -e E2E_SPEC
        -w /meta-secret/nook
        {{.DOCKER_E2E_IMAGE}}
        task {{.TASK}}

  docker:extract:dist:
    desc: Copy the landing, Simple Vault, and Sentinel Vault web artifacts to the host.
    cmds:
      - >-
        sh -c 'rm -rf "{{.WEB_ROOT}}/dist" "{{.WEB_GROUP_ROOT}}/nook-vault-simple/dist" "{{.WEB_GROUP_ROOT}}/nook-vault-sentinel/dist";
        cid="$({{.DOCKER}} create --platform linux/amd64 {{.DOCKER_IMAGE}})";
        trap "{{.DOCKER}} rm -f \"$cid\" >/dev/null 2>&1 || true" EXIT;
        {{.DOCKER}} cp "$cid:/meta-secret/nook/nook-app/nook-web/nook-web-app/dist" "{{.WEB_ROOT}}/dist";
        {{.DOCKER}} cp "$cid:/meta-secret/nook/nook-app/nook-web/nook-vault-simple/dist" "{{.WEB_GROUP_ROOT}}/nook-vault-simple/dist";
        {{.DOCKER}} cp "$cid:/meta-secret/nook/nook-app/nook-web/nook-vault-sentinel/dist" "{{.WEB_GROUP_ROOT}}/nook-vault-sentinel/dist"'

  docker:extract:extension:
    desc: Copy the nook-web image's built nook-app/nook-web/nook-web-extension/dist to the host (for manual browser loading).
    cmds:
      - >-
        sh -c 'rm -rf "{{.EXTENSION_ROOT}}/dist";
        cid="$({{.DOCKER}} create --platform linux/amd64 {{.DOCKER_IMAGE}})";
        trap "{{.DOCKER}} rm -f \"$cid\" >/dev/null 2>&1 || true" EXIT;
        {{.DOCKER}} cp "$cid:/meta-secret/nook/nook-app/nook-web/nook-web-extension/dist" "{{.EXTENSION_ROOT}}/dist"'

  docker:extract:coverage:
    desc: Copy nook-core + nook-auth2 coverage artifacts from the sealed Docker image to the host.
    vars:
      COVERAGE_OUT_DIR: '{{default (printf "%s/coverage/nook-core" .REPO_ROOT) .COVERAGE_OUT_DIR}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        out_dir="{{.COVERAGE_OUT_DIR}}";
        case "$out_dir" in
          /*) ;;
          *) out_dir="{{.REPO_ROOT}}/$out_dir" ;;
        esac;
        rm -rf "$out_dir";
        mkdir -p "$out_dir";
        cid="$({{.DOCKER}} create --platform linux/amd64 {{.DOCKER_IMAGE}})";
        cleanup() { {{.DOCKER}} rm -f "$cid" >/dev/null 2>&1 || true; };
        trap cleanup EXIT;
        {{.DOCKER}} cp "$cid:/opt/nook/coverage/nook-core/." "$out_dir/"'

  docker:coverage:export:
    desc: Run coverage-gated nook-core + nook-auth2 unit tests and export their artifacts (no app image export).
    deps:
      - sccache:ensure
    vars:
      COVERAGE_OUT_DIR: '{{default (printf "%s/coverage/nook-core" .REPO_ROOT) .COVERAGE_OUT_DIR}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        out_dir="{{.COVERAGE_OUT_DIR}}";
        case "$out_dir" in
          /*) ;;
          *) out_dir="{{.REPO_ROOT}}/$out_dir" ;;
        esac;
        rm -rf "$out_dir";
        mkdir -p "$out_dir";
        env SCCACHE_REDIS_HOST_IP="{{.SCCACHE_REDIS_HOST_IP}}" {{.DOCKER}} buildx --builder {{.BUILDX_BUILDER}} bake {{.NOOK_BAKE_FILES}} --allow="fs.write=$out_dir" --set "coverage-export.output=type=local,dest=$out_dir" coverage-export'

  docker:ci:rust:export:
    desc: Run native Rust formatting/coverage on one CI runner and export only coverage artifacts.
    deps: [sccache:ensure]
    vars:
      CI_ARTIFACT_DIR: '{{default (printf "%s/ci-artifacts/rust" .REPO_ROOT) .CI_ARTIFACT_DIR}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        out_dir="{{.CI_ARTIFACT_DIR}}";
        case "$out_dir" in /*) ;; *) out_dir="{{.REPO_ROOT}}/$out_dir" ;; esac;
        rm -rf "$out_dir"; mkdir -p "$out_dir";
        env SCCACHE_REDIS_HOST_IP="{{.SCCACHE_REDIS_HOST_IP}}" {{.DOCKER}} buildx --builder {{.BUILDX_BUILDER}} bake {{.NOOK_BAKE_FILES}} --allow="fs.write=$out_dir" --set "coverage-export.output=type=local,dest=$out_dir" --set "rust-format-check.output=type=cacheonly" ci-rust'

  docker:ci:wasm:export:
    desc: Run WASM clippy/build/tests on a separate CI runner and export only the generated package.
    deps: [sccache:ensure]
    vars:
      CI_ARTIFACT_DIR: '{{default (printf "%s/ci-artifacts/wasm" .REPO_ROOT) .CI_ARTIFACT_DIR}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        out_dir="{{.CI_ARTIFACT_DIR}}";
        case "$out_dir" in /*) ;; *) out_dir="{{.REPO_ROOT}}/$out_dir" ;; esac;
        rm -rf "$out_dir"; mkdir -p "$out_dir";
        env SCCACHE_REDIS_HOST_IP="{{.SCCACHE_REDIS_HOST_IP}}" {{.DOCKER}} buildx --builder {{.BUILDX_BUILDER}} bake {{.NOOK_BAKE_FILES}} --allow="fs.write=$out_dir" --set "wasm-export.output=type=local,dest=$out_dir" wasm-export'

  docker:ci:web:build:
    desc: Build the sealed web image from the same-runner CI WASM artifact.
    vars:
      CI_ARTIFACT_DIR: '{{default (printf "%s/ci-artifacts/joined" .REPO_ROOT) .CI_ARTIFACT_DIR}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        artifacts="{{.CI_ARTIFACT_DIR}}";
        case "$artifacts" in /*) ;; *) artifacts="{{.REPO_ROOT}}/$artifacts" ;; esac;
        test -s "$artifacts/nook-wasm/nook_wasm.js";
        mkdir -p "$artifacts/coverage/nook-core";
        : > "$artifacts/coverage/nook-core/.web-only";
        for attempt in 1 2; do
          if env SCCACHE_REDIS_HOST_IP="{{.SCCACHE_REDIS_HOST_IP}}" WEB_ARTIFACTS_CONTEXT="$artifacts" {{.DOCKER}} buildx --builder {{.BUILDX_BUILDER}} bake --allow="fs.read=$artifacts" {{.NOOK_BAKE_FILES}} nook-web; then
            exit 0;
          fi;
          if [ "$attempt" -eq 2 ]; then exit 1; fi;
          echo "task docker:ci:web:build: transient Bake failure; retrying in 2s..." >&2;
          sleep 2;
        done'

  docker:web:dev:
    internal: true
    # Mounted for Vite hot-reload. The on-demand browser/Rust image contains both toolchains;
    # node_modules is an anonymous volume and Bun installs current dependencies before startup.
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        --add-host host.docker.internal:{{.SCCACHE_REDIS_HOST_IP}}
        -e SCCACHE_REDIS_HOST_IP="{{.SCCACHE_REDIS_HOST_IP}}"
        {{.DOCKER_RUN_LIMITS}}
        -e REPO_ROOT=/meta-secret/nook
        -e GIT_COMMIT_ID="{{.GIT_COMMIT_ID}}"
        -e WASM_BUILD_MODE="{{.WASM_BUILD_MODE}}"
        -e VITE_BASE="{{.VITE_BASE}}"
        -e NOOK_LOCAL_HTTPS=1
        -e NOOK_LOCAL_HTTPS_CERT_PATH=/meta-secret/nook/.nook/https/localhost.pem
        -e NOOK_LOCAL_HTTPS_KEY_PATH=/meta-secret/nook/.nook/https/localhost-key.pem
        -p "{{.WEB_DEV_PORT}}:5173"
        -v "{{.REPO_ROOT}}:/meta-secret/nook"
        -v /meta-secret/nook/nook-app/nook-web/nook-web-app/node_modules
        -w /meta-secret/nook
        {{.DOCKER_RUST_BROWSER_IMAGE}}
        sh -c "(cd nook-app/nook-web/nook-web-app && bun install) && task _web:dev"

  docker:web:dev:fast:
    internal: true
    # Fast mounted dev path: same as docker:web:dev, but skips wasm-opt during the initial wasm build.
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        --add-host host.docker.internal:{{.SCCACHE_REDIS_HOST_IP}}
        -e SCCACHE_REDIS_HOST_IP="{{.SCCACHE_REDIS_HOST_IP}}"
        {{.DOCKER_RUN_LIMITS}}
        -e REPO_ROOT=/meta-secret/nook
        -e GIT_COMMIT_ID="{{.GIT_COMMIT_ID}}"
        -e WASM_BUILD_MODE=dev
        -e VITE_BASE="{{.VITE_BASE}}"
        -e NOOK_LOCAL_HTTPS=1
        -e NOOK_LOCAL_HTTPS_CERT_PATH=/meta-secret/nook/.nook/https/localhost.pem
        -e NOOK_LOCAL_HTTPS_KEY_PATH=/meta-secret/nook/.nook/https/localhost-key.pem
        -p "{{.WEB_DEV_PORT}}:5173"
        -v "{{.REPO_ROOT}}:/meta-secret/nook"
        -v /meta-secret/nook/nook-app/nook-web/nook-web-app/node_modules
        -w /meta-secret/nook
        {{.DOCKER_RUST_BROWSER_IMAGE}}
        sh -c "(cd nook-app/nook-web/nook-web-app && bun install) && task _web:dev:fast"
