version: '3'

tasks:
  docker:build:
    desc: Alias for setup (build the linux/amd64 nook-web image).
    cmds:
      - task: setup

  docker:push:
    desc: Publish independent Rust and web cache images to GHCR after green main CI.
    # PUSH_TOOLCHAIN is re-declared here (not just on the docker:push:ci wrapper): go-task does NOT
    # propagate a parent task's `env:` into a called subtask, so we source it from the ambient var
    # so the gate below sees it regardless of caller.
    env:
      TOOLCHAIN_REGISTRY: '{{.TOOLCHAIN_REGISTRY}}'
      GIT_COMMIT_ID: '{{.GIT_COMMIT_ID}}'
      PUSH_TOOLCHAIN: '{{.PUSH_TOOLCHAIN}}'
    cmds:
      # Gate on PUSH_TOOLCHAIN (set by CI). TOOLCHAIN_PUSH is the bake flag that enables the
      # registry tag + cache-to; local dev never sets it, so it only ever pulls the cache.
      - >-
        bash -c 'set -euo pipefail;
        test -n "${PUSH_TOOLCHAIN:-}" && test -n "${TOOLCHAIN_REGISTRY:-}" || exit 0;
        git_commit_id="${GIT_COMMIT_ID:-$(git rev-parse HEAD)}";
        test -n "$git_commit_id";
        if [ -n "${GITHUB_TOKEN:-}" ]; then
          registry="${TOOLCHAIN_REGISTRY%%/*}";
          user="${GITHUB_ACTOR:-github-actions[bot]}";
          printf "%s" "$GITHUB_TOKEN" | {{.DOCKER}} login "$registry" -u "$user" --password-stdin;
        fi;
        for attempt in 1 2 3; do
          if env TOOLCHAIN_REGISTRY="${TOOLCHAIN_REGISTRY}" GIT_COMMIT_ID="${git_commit_id}" TOOLCHAIN_PUSH=1 {{.DOCKER}} buildx --builder {{.BUILDX_BUILDER}} bake {{.NOOK_BAKE_FILES}} toolchain-push; then
            exit 0;
          fi;
          if [ "$attempt" -eq 3 ]; then exit 1; fi;
          echo "task docker:push: bake attempt $attempt failed; retrying in 5s..." >&2;
          sleep 5;
        done'

  docker:task:
    internal: true
    # No bind mount: the nook-web image already contains the workspace source (nook-app/nook-web/nook-web-app/Dockerfile).
    env:
      VITE_BASE: '{{.VITE_BASE}}'
      VITE_SITE_URL: '{{.VITE_SITE_URL}}'
      VITE_PUBLIC_APP_URL: '{{.VITE_PUBLIC_APP_URL}}'
      VITE_VAULT_SYNC_INTERVAL_MS: '{{.VITE_VAULT_SYNC_INTERVAL_MS}}'
      WASM_BUILD_MODE: '{{.WASM_BUILD_MODE}}'
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        {{.DOCKER_RUN_LIMITS}}
        --ipc=host
        -e WASM_BUILD_MODE="{{.WASM_BUILD_MODE}}"
        -e VITE_BASE="{{.VITE_BASE}}"
        -e VITE_SITE_URL="{{.VITE_SITE_URL}}"
        -e VITE_PUBLIC_APP_URL="{{.VITE_PUBLIC_APP_URL}}"
        -e VITE_VAULT_SYNC_INTERVAL_MS="{{.VITE_VAULT_SYNC_INTERVAL_MS}}"
        -e NOOK_GITHUB_PAT
        -e CI=1
        -e NOOK_GITHUB_E2E_REPO
        -e NOOK_GITHUB_POLL_MS
        -e NOOK_GITHUB_SYNC_TIMEOUT_MS
        -e NOOK_GITHUB_CONNECT_TIMEOUT_MS
        -e CLOUDFLARE_API_TOKEN
        -e CLOUDFLARE_ACCOUNT_ID
        -e CF_PAGES_BRANCH
        -e CF_PAGES_PROJECT_NAME
        -e CF_PAGES_PRODUCTION_BRANCH
        -e GITHUB_TOKEN
        -e GITHUB_REPOSITORY
        -e PR_NUMBER
        -e PREVIEW_URL
        -w /meta-secret/nook
        {{.DOCKER_IMAGE}}
        task {{.TASK}}

  docker:rust:task:
    internal: true
    desc: Run a Task target in the on-demand source-sealed Rust/WASM image.
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        {{.DOCKER_RUN_LIMITS}}
        --ipc=host
        -e WASM_BUILD_MODE="{{.WASM_BUILD_MODE}}"
        -e CI=1
        -w /meta-secret/nook
        {{.DOCKER_RUST_IMAGE}}
        task {{.TASK}}

  docker:rust:browser:task:
    internal: true
    desc: Run a Task target in the on-demand Rust/WASM image with Chromium.
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        {{.DOCKER_RUN_LIMITS}}
        --ipc=host
        -e WASM_BUILD_MODE="{{.WASM_BUILD_MODE}}"
        -e CI=1
        -w /meta-secret/nook
        {{.DOCKER_RUST_BROWSER_IMAGE}}
        task {{.TASK}}

  docker:wasm:build:fast:
    internal: true
    # Mounted fast path uses the explicit Rust image and writes the generated wasm pkg to the host.
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        {{.DOCKER_RUN_LIMITS}}
        -e REPO_ROOT=/meta-secret/nook
        -e GIT_COMMIT_ID="{{.GIT_COMMIT_ID}}"
        -e WASM_BUILD_MODE=dev
        -v "{{.REPO_ROOT}}:/meta-secret/nook"
        -w /meta-secret/nook
        {{.DOCKER_RUST_IMAGE}}
        task _wasm:build:fast

  docker:e2e:run:
    desc: Run Playwright in Docker — Vite dev server stays on 127.0.0.1:5173 inside the container (no -p publish).
    internal: true
    # No bind mount: the nook-web image already contains the workspace source (nook-app/nook-web/nook-web-app/Dockerfile).
    env:
      VITE_BASE: '{{.VITE_BASE}}'
      VITE_VAULT_SYNC_INTERVAL_MS: '{{.VITE_VAULT_SYNC_INTERVAL_MS}}'
      E2E_SPEC: '{{.E2E_SPEC}}'
      WASM_BUILD_MODE: '{{.WASM_BUILD_MODE}}'
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        {{.DOCKER_RUN_LIMITS}}
        --ipc=host
        -e WASM_BUILD_MODE="{{.WASM_BUILD_MODE}}"
        -e VITE_BASE="{{.VITE_BASE}}"
        -e VITE_VAULT_SYNC_INTERVAL_MS="{{.VITE_VAULT_SYNC_INTERVAL_MS}}"
        -e NOOK_GITHUB_PAT
        -e CI=1
        -e NOOK_GITHUB_E2E_REPO
        -e NOOK_GITHUB_POLL_MS
        -e NOOK_GITHUB_SYNC_TIMEOUT_MS
        -e NOOK_GITHUB_CONNECT_TIMEOUT_MS
        -e NOOK_E2E_SKIP_GITHUB_CLEANUP
        -e NOOK_E2E_SYNC_PROVIDER
        -e NOOK_GOOGLE_E2E_ACCESS_TOKEN
        -e E2E_SPEC
        -w /meta-secret/nook
        {{.DOCKER_E2E_IMAGE}}
        task {{.TASK}}

  docker:extract:dist:
    desc: Copy the nook-web image's built nook-app/nook-web/nook-web-app/dist to the host (for GitHub Pages upload on release branches).
    cmds:
      - >-
        sh -c 'rm -rf "{{.WEB_ROOT}}/dist";
        cid="$({{.DOCKER}} create --platform linux/amd64 {{.DOCKER_IMAGE}})";
        trap "{{.DOCKER}} rm -f \"$cid\" >/dev/null 2>&1 || true" EXIT;
        {{.DOCKER}} cp "$cid:/meta-secret/nook/nook-app/nook-web/nook-web-app/dist" "{{.WEB_ROOT}}/dist"'

  docker:extract:extension:
    desc: Copy the nook-web image's built nook-app/nook-web/nook-web-extension/dist to the host (for manual browser loading).
    cmds:
      - >-
        sh -c 'rm -rf "{{.EXTENSION_ROOT}}/dist";
        cid="$({{.DOCKER}} create --platform linux/amd64 {{.DOCKER_IMAGE}})";
        trap "{{.DOCKER}} rm -f \"$cid\" >/dev/null 2>&1 || true" EXIT;
        {{.DOCKER}} cp "$cid:/meta-secret/nook/nook-app/nook-web/nook-web-extension/dist" "{{.EXTENSION_ROOT}}/dist"'

  docker:extract:coverage:
    desc: Copy nook-core + nook-auth2 coverage artifacts from the sealed Docker image to the host.
    vars:
      COVERAGE_OUT_DIR: '{{default (printf "%s/coverage/nook-core" .REPO_ROOT) .COVERAGE_OUT_DIR}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        out_dir="{{.COVERAGE_OUT_DIR}}";
        case "$out_dir" in
          /*) ;;
          *) out_dir="{{.REPO_ROOT}}/$out_dir" ;;
        esac;
        rm -rf "$out_dir";
        mkdir -p "$out_dir";
        cid="$({{.DOCKER}} create --platform linux/amd64 {{.DOCKER_IMAGE}})";
        cleanup() { {{.DOCKER}} rm -f "$cid" >/dev/null 2>&1 || true; };
        trap cleanup EXIT;
        {{.DOCKER}} cp "$cid:/opt/nook/coverage/nook-core/." "$out_dir/"'

  docker:coverage:export:
    desc: Run coverage-gated nook-core + nook-auth2 unit tests and export their artifacts (no app image export).
    vars:
      COVERAGE_OUT_DIR: '{{default (printf "%s/coverage/nook-core" .REPO_ROOT) .COVERAGE_OUT_DIR}}'
      COVERAGE_CACHE_MODE: '{{default "registry" .COVERAGE_CACHE_MODE}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        out_dir="{{.COVERAGE_OUT_DIR}}";
        case "$out_dir" in
          /*) ;;
          *) out_dir="{{.REPO_ROOT}}/$out_dir" ;;
        esac;
        cache_args=();
        case "{{.COVERAGE_CACHE_MODE}}" in
          registry) ;;
          local) cache_args=(--set "*.cache-from=") ;;
          *) echo "Unsupported COVERAGE_CACHE_MODE={{.COVERAGE_CACHE_MODE}} (expected registry or local)" >&2; exit 2 ;;
        esac;
        rm -rf "$out_dir";
        mkdir -p "$out_dir";
        {{.DOCKER}} buildx --builder {{.BUILDX_BUILDER}} bake {{.NOOK_BAKE_FILES}} "${cache_args[@]}" --allow="fs.write=$out_dir" --set "coverage-export.output=type=local,dest=$out_dir" coverage-export'

  docker:web:dev:
    internal: true
    # Mounted for Vite hot-reload. The on-demand browser/Rust image contains both toolchains;
    # node_modules is an anonymous volume and Bun installs current dependencies before startup.
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        {{.DOCKER_RUN_LIMITS}}
        -e REPO_ROOT=/meta-secret/nook
        -e GIT_COMMIT_ID="{{.GIT_COMMIT_ID}}"
        -e WASM_BUILD_MODE="{{.WASM_BUILD_MODE}}"
        -e VITE_BASE="{{.VITE_BASE}}"
        -p "{{.WEB_DEV_PORT}}:5173"
        -v "{{.REPO_ROOT}}:/meta-secret/nook"
        -v /meta-secret/nook/nook-app/nook-web/nook-web-app/node_modules
        -w /meta-secret/nook
        {{.DOCKER_RUST_BROWSER_IMAGE}}
        sh -c "(cd nook-app/nook-web/nook-web-app && bun install) && task _web:dev"

  docker:web:dev:fast:
    internal: true
    # Fast mounted dev path: same as docker:web:dev, but skips wasm-opt during the initial wasm build.
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        {{.DOCKER_RUN_LIMITS}}
        -e REPO_ROOT=/meta-secret/nook
        -e GIT_COMMIT_ID="{{.GIT_COMMIT_ID}}"
        -e WASM_BUILD_MODE=dev
        -e VITE_BASE="{{.VITE_BASE}}"
        -p "{{.WEB_DEV_PORT}}:5173"
        -v "{{.REPO_ROOT}}:/meta-secret/nook"
        -v /meta-secret/nook/nook-app/nook-web/nook-web-app/node_modules
        -w /meta-secret/nook
        {{.DOCKER_RUST_BROWSER_IMAGE}}
        sh -c "(cd nook-app/nook-web/nook-web-app && bun install) && task _web:dev:fast"
