version: '3'

vars:
  REPO_ROOT:
    sh: 'if [ -n "${REPO_ROOT:-}" ]; then printf "%s" "$REPO_ROOT"; else git rev-parse --show-toplevel; fi'
  APP_ROOT: '{{.REPO_ROOT}}/nook-app'
  WEB_GROUP_ROOT: '{{.APP_ROOT}}/nook-web'
  WEB_ROOT: '{{.WEB_GROUP_ROOT}}/nook-web-app'
  EXTENSION_ROOT: '{{.WEB_GROUP_ROOT}}/nook-web-extension'
  WEB_SHARED_ROOT: '{{.WEB_GROUP_ROOT}}/nook-web-shared'
  DOCKER: '{{default "docker" .DOCKER}}'
  # Keep runtime containers at Docker Desktop's 1 Mi open-file baseline. Kernel-wide inotify
  # limits are host prerequisites documented in README.md; they cannot be set per container.
  DOCKER_NOFILE_LIMIT: '{{default "1048576" .DOCKER_NOFILE_LIMIT}}'
  DOCKER_RUN_LIMITS: '--ulimit nofile={{.DOCKER_NOFILE_LIMIT}}:{{.DOCKER_NOFILE_LIMIT}}'
  # buildx builder. We use the `docker` driver (BuildKit embedded in the daemon) so that the slim
  # web result is written straight into the containerd image store. Heavy Rust snapshots remain
  # in BuildKit cache unless an explicit Rust command loads one. Hosted CI intentionally overrides
  # this with a `docker-container` builder because the GHA cache exporter requires that driver.
  #
  # buildx auto-creates a docker-driver builder named after the active docker context, so
  # `docker context show` yields the right builder everywhere: `desktop-linux` on Docker Desktop,
  # `default` on plain Linux/CI. Override by exporting BUILDX_BUILDER.
  BUILDX_BUILDER:
    sh: 'echo "${BUILDX_BUILDER:-$(docker context show 2>/dev/null || echo default)}"'
  # The slim sealed web image is the common runtime. Heavy Rust images are loaded only by explicit
  # rust/wasm commands (and the browser variant only by manual browser-wasm tests).
  DOCKER_IMAGE: '{{default "nook-web:local" .DOCKER_IMAGE}}'
  DOCKER_RUST_IMAGE: '{{default "nook-rust:local" .DOCKER_RUST_IMAGE}}'
  DOCKER_RUST_FAST_IMAGE: '{{default "nook-rust-fast:local" .DOCKER_RUST_FAST_IMAGE}}'
  DOCKER_RUST_BROWSER_IMAGE: '{{default "nook-rust-browser:local" .DOCKER_RUST_BROWSER_IMAGE}}'
  DOCKER_E2E_IMAGE: '{{default "nook-web-e2e:local" .DOCKER_E2E_IMAGE}}'
  DOCKER_MKCERT_IMAGE: '{{default "nook-mkcert:local" .DOCKER_MKCERT_IMAGE}}'
  # One persistent Redis cache per Docker host. BuildKit compilation steps reach it through a
  # resolved numeric host address; their short-lived local sccache daemons remain isolated by Unix sockets.
  SCCACHE_REDIS_IMAGE: '{{default "redis:8.2.2-alpine" .SCCACHE_REDIS_IMAGE}}'
  SCCACHE_REDIS_CONTAINER: '{{default "nook-sccache-redis" .SCCACHE_REDIS_CONTAINER}}'
  SCCACHE_REDIS_VOLUME: '{{default "nook-sccache-redis" .SCCACHE_REDIS_VOLUME}}'
  SCCACHE_REDIS_PORT: '{{default "6380" .SCCACHE_REDIS_PORT}}'
  SCCACHE_REDIS_MAXMEMORY: '{{default "8gb" .SCCACHE_REDIS_MAXMEMORY}}'
  # "local" owns a Redis container on this Docker host. CI selects "external" for the
  # password-protected persistent server cache.
  SCCACHE_REDIS_MODE: '{{default "local" .SCCACHE_REDIS_MODE}}'
  SCCACHE_REDIS_PASSWORD_FILE: '{{default "" .SCCACHE_REDIS_PASSWORD_FILE}}'
  SCCACHE_REDIS_PASSWORD_MOUNT:
    sh: >-
      if [ -n "${SCCACHE_REDIS_PASSWORD_FILE:-}" ]; then
        printf '%s' '--mount type=bind,src='"$SCCACHE_REDIS_PASSWORD_FILE"',dst=/run/secrets/sccache_redis_password,readonly';
      fi
  SCCACHE_REDIS_BAKE_ALLOW:
    sh: >-
      if [ -n "${SCCACHE_REDIS_PASSWORD_FILE:-}" ]; then
        printf '%s' '--allow=fs.read='"$SCCACHE_REDIS_PASSWORD_FILE";
      fi
  SCCACHE_REDIS_HOST_IP:
    sh: 'DOCKER="{{.DOCKER}}" SCCACHE_REDIS_IMAGE="{{.SCCACHE_REDIS_IMAGE}}" "{{.APP_ROOT}}/docker/resolve-docker-host-ip.sh"'
  GIT_COMMIT_ID:
    sh: 'if [ -n "${GIT_COMMIT_ID:-}" ]; then printf "%s" "$GIT_COMMIT_ID"; else repo="${REPO_ROOT:-$(git rev-parse --show-toplevel)}"; cd "$repo" && git rev-parse HEAD; fi'
  WASM_BUILD_MODE: '{{default "dev" .WASM_BUILD_MODE}}'
  PREPARE_GROUP: '{{default "prepare" .PREPARE_GROUP}}'
  SETUP_TARGET: '{{default "nook-web" .SETUP_TARGET}}'
  # buildx bake `-f` flags: app orchestration + one file per package (single source of truth).
  NOOK_BAKE_FILES: >-
    --allow=fs.read={{.REPO_ROOT}}
    {{.SCCACHE_REDIS_BAKE_ALLOW}}
    -f {{.REPO_ROOT}}/nook-app/docker-bake.hcl
    -f {{.REPO_ROOT}}/nook-app/docker/base.docker-bake.hcl
    -f {{.REPO_ROOT}}/nook-app/nook-core/docker-bake.hcl
    -f {{.REPO_ROOT}}/nook-app/nook-wasm/docker-bake.hcl
    -f {{.REPO_ROOT}}/nook-app/docker/toolchain.docker-bake.hcl
    -f {{.REPO_ROOT}}/nook-app/nook-web/nook-web-app/docker-bake.hcl
    --set '*.context={{.REPO_ROOT}}'
    --set '*.args.SCCACHE_REDIS_MODE={{.SCCACHE_REDIS_MODE}}'
    --set '*.args.SCCACHE_REDIS_PORT={{.SCCACHE_REDIS_PORT}}'
    --set 'builder-wasm.args.WASM_BUILD_MODE={{.WASM_BUILD_MODE}}'
  NOOK_ENV: '{{default "dev" .NOOK_ENV}}'
  VITE_BASE: '{{default "/" .VITE_BASE}}'
  VITE_SITE_URL: '{{default "" .VITE_SITE_URL}}'
  VITE_PUBLIC_APP_URL: '{{default "" .VITE_PUBLIC_APP_URL}}'
  NOOK_SIMPLE_VAULT_URL: '{{default "https://simple.nokey.sh/" .NOOK_SIMPLE_VAULT_URL}}'
  NOOK_EXTENSION_CHANNEL: '{{default "production" .NOOK_EXTENSION_CHANNEL}}'
  NOOK_EXTENSION_VERSION: '{{default "1.0.0" .NOOK_EXTENSION_VERSION}}'
  NOOK_EXTENSION_COMMIT: '{{default .GIT_COMMIT_ID .NOOK_EXTENSION_COMMIT}}'
  NOOK_EXTENSION_SITE_URL: '{{default "https://nokey.sh/" .NOOK_EXTENSION_SITE_URL}}'
  VITE_SIMPLE_APP_URL: '{{default "" .VITE_SIMPLE_APP_URL}}'
  VITE_SENTINEL_APP_URL: '{{default "" .VITE_SENTINEL_APP_URL}}'
  VITE_VAULT_SYNC_INTERVAL_MS: '{{default "" .VITE_VAULT_SYNC_INTERVAL_MS}}'
  WEB_DEV_PORT: '{{default "5173" .WEB_DEV_PORT}}'

includes:
  docker:
    taskfile: docker/Taskfile.yml
    dir: '{{.REPO_ROOT}}'
    flatten: true
  ci:
    taskfile: .task/ci.yml
    dir: '{{.REPO_ROOT}}'
    flatten: true
  core:
    taskfile: .task/core.yml
    dir: '{{.REPO_ROOT}}'
    flatten: true
  web:
    taskfile: nook-web/Taskfile.yml
    dir: '{{.REPO_ROOT}}'
    flatten: true

tasks:
  default:
    desc: Build every project.
    cmds:
      - task: build

  sccache:ensure:
    desc: Ensure the selected Redis backend for Rust sccache is healthy.
    dir: '{{.REPO_ROOT}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        mode="{{.SCCACHE_REDIS_MODE}}";
        name="{{.SCCACHE_REDIS_CONTAINER}}";
        image="{{.SCCACHE_REDIS_IMAGE}}";
        volume="{{.SCCACHE_REDIS_VOLUME}}";
        port="{{.SCCACHE_REDIS_PORT}}";
        maxmemory="{{.SCCACHE_REDIS_MAXMEMORY}}";
        if [ "$mode" = external ]; then
          password_file="{{.SCCACHE_REDIS_PASSWORD_FILE}}";
          if [ -z "$password_file" ] || [ ! -r "$password_file" ]; then
            echo "task sccache:ensure: external Redis requires a readable SCCACHE_REDIS_PASSWORD_FILE" >&2;
            exit 1;
          fi;
          if [ "$({{.DOCKER}} run --rm --add-host host.docker.internal:{{.SCCACHE_REDIS_HOST_IP}} --mount "type=bind,src=$password_file,dst=/run/secrets/redis-password,readonly" "$image" sh -ec '\''export REDISCLI_AUTH="$(cat /run/secrets/redis-password)"; exec redis-cli -h host.docker.internal -p "$1" ping'\'' -- "$port" 2>/dev/null || true)" != PONG ]; then
            echo "task sccache:ensure: external Redis is not reachable through host.docker.internal:$port" >&2;
            exit 1;
          fi;
          echo "task sccache:ensure: external Redis is healthy through host.docker.internal:$port";
          exit 0;
        fi;
        if [ "$mode" != local ]; then
          echo "task sccache:ensure: unsupported SCCACHE_REDIS_MODE=$mode" >&2;
          exit 2;
        fi;
        if [ "$(uname -s)" = Darwin ]; then
          bind_ip=127.0.0.1;
        else
          bind_ip="$({{.DOCKER}} network inspect bridge | awk -F\" '\''/\"Gateway\":/ { print $4; exit }'\'')";
        fi;
        test -n "$bind_ip" && [ "$bind_ip" != null ];
        config="image=$image;volume=$volume;bind=$bind_ip;port=$port;maxmemory=$maxmemory";
        if {{.DOCKER}} container inspect "$name" >/dev/null 2>&1; then
          existing="$({{.DOCKER}} container inspect "$name" | awk -F\" '\''/\"org.meta-secret.nook.sccache-redis.config\":/ { print $4; exit }'\'')";
          if [ "$existing" != "$config" ]; then
            echo "task sccache:ensure: replacing stale $name configuration";
            {{.DOCKER}} rm -f "$name" >/dev/null;
          elif [ "$({{.DOCKER}} container inspect "$name" | awk '\''/\"Running\":/ { gsub(/,/, "", $2); print $2; exit }'\'')" != true ]; then
            {{.DOCKER}} start "$name" >/dev/null;
          fi;
        fi;
        if ! {{.DOCKER}} container inspect "$name" >/dev/null 2>&1; then
          if ! {{.DOCKER}} run --detach \
            --name "$name" \
            --restart unless-stopped \
            --publish "$bind_ip:$port:6379" \
            --label "org.meta-secret.nook.sccache-redis.config=$config" \
            --volume "$volume:/data" \
            "$image" \
            redis-server \
            --bind 0.0.0.0 \
            --protected-mode no \
            --appendonly yes \
            --appendfsync everysec \
            --maxmemory "$maxmemory" \
            --maxmemory-policy allkeys-lru >/dev/null; then
            {{.DOCKER}} container inspect "$name" >/dev/null 2>&1 || exit 1;
          fi;
        fi;
        healthy=false;
        for attempt in $(seq 1 30); do
          if [ "$({{.DOCKER}} exec "$name" redis-cli ping 2>/dev/null || true)" = PONG ]; then
            healthy=true;
            break;
          fi;
          sleep 1;
        done;
        if [ "$healthy" != true ]; then
          {{.DOCKER}} logs "$name";
          echo "task sccache:ensure: Redis did not become healthy" >&2;
          exit 1;
        fi;
        if [ "$({{.DOCKER}} run --rm --add-host host.docker.internal:{{.SCCACHE_REDIS_HOST_IP}} "$image" redis-cli -h host.docker.internal -p "$port" ping 2>/dev/null || true)" != PONG ]; then
          echo "task sccache:ensure: build-container routing cannot reach Redis through host.docker.internal:$port" >&2;
          exit 1;
        fi;
        echo "task sccache:ensure: $name is healthy on Docker-host address $bind_ip:$port"'

  sccache:stats:
    desc: Show shared Rust compiler-cache key and memory statistics.
    deps:
      - sccache:ensure
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        image="{{.SCCACHE_REDIS_IMAGE}}";
        password_file="{{.SCCACHE_REDIS_PASSWORD_FILE}}";
        mount_args="";
        if [ -n "$password_file" ]; then mount_args="--mount type=bind,src=$password_file,dst=/run/secrets/redis-password,readonly"; fi;
        redis_cli="redis-cli -h host.docker.internal -p {{.SCCACHE_REDIS_PORT}}";
        redis_command="if [ -r /run/secrets/redis-password ]; then export REDISCLI_AUTH=\"\$(cat /run/secrets/redis-password)\"; fi; exec $redis_cli";
        {{.DOCKER}} run --rm --add-host host.docker.internal:{{.SCCACHE_REDIS_HOST_IP}} $mount_args "$image" sh -ec "$redis_command DBSIZE";
        {{.DOCKER}} run --rm --add-host host.docker.internal:{{.SCCACHE_REDIS_HOST_IP}} $mount_args "$image" sh -ec "$redis_command INFO memory" | grep -E "^(used_memory_human|maxmemory_human|maxmemory_policy):";
        {{.DOCKER}} run --rm --add-host host.docker.internal:{{.SCCACHE_REDIS_HOST_IP}} $mount_args "$image" sh -ec "$redis_command INFO stats" | grep -E "^(keyspace_hits|keyspace_misses|evicted_keys):"'

  setup:
    desc: Build the slim linux/amd64 nook-web image via parallel Rust/WASM + web preparation.
    dir: '{{.REPO_ROOT}}'
    deps:
      - sccache:ensure
    # Phase one builds Rust/WASM validation and web dependencies concurrently, exporting only the
    # generated WASM package + coverage files to a commit-scoped, invocation-isolated host directory.
    # Phase two consumes that tiny directory to build the web image; builder-wasm is never a
    # parent/context of nook-web. Retry only that immediate final solve once for the known BuildKit
    # frontend flake; never repeat the multi-minute preparation graph.
    env:
      GIT_COMMIT_ID: '{{.GIT_COMMIT_ID}}'
      WASM_BUILD_MODE: '{{.WASM_BUILD_MODE}}'
      VITE_BASE: '{{.VITE_BASE}}'
      VITE_SITE_URL: '{{.VITE_SITE_URL}}'
      VITE_PUBLIC_APP_URL: '{{.VITE_PUBLIC_APP_URL}}'
      NOOK_SIMPLE_VAULT_URL: '{{.NOOK_SIMPLE_VAULT_URL}}'
      NOOK_EXTENSION_CHANNEL: '{{.NOOK_EXTENSION_CHANNEL}}'
      NOOK_EXTENSION_VERSION: '{{.NOOK_EXTENSION_VERSION}}'
      NOOK_EXTENSION_COMMIT: '{{.NOOK_EXTENSION_COMMIT}}'
      NOOK_EXTENSION_SITE_URL: '{{.NOOK_EXTENSION_SITE_URL}}'
      VITE_SIMPLE_APP_URL: '{{.VITE_SIMPLE_APP_URL}}'
      VITE_SENTINEL_APP_URL: '{{.VITE_SENTINEL_APP_URL}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        commit_id="${GIT_COMMIT_ID:?task setup requires GIT_COMMIT_ID}";
        setup_target="{{.SETUP_TARGET}}";
        case "$setup_target" in nook-web|nook-web-e2e) ;; *) echo "Unsupported SETUP_TARGET=$setup_target" >&2; exit 2 ;; esac;
        if [ "${#commit_id}" -ne 40 ] || [[ "$commit_id" == *[!0-9a-f]* ]]; then
          echo "task setup: GIT_COMMIT_ID must be a full lowercase git SHA" >&2;
          exit 1;
        fi;
        artifacts_parent="${TMPDIR:-/tmp}/nook-web-artifacts";
        artifacts_root="$artifacts_parent/$commit_id";
        mkdir -p "$artifacts_root";
        artifacts_dir="$(mktemp -d "$artifacts_root/invocation.XXXXXX")";
        cleanup() {
          rm -rf "$artifacts_dir";
          rmdir "$artifacts_root" 2>/dev/null || true;
          rmdir "$artifacts_parent" 2>/dev/null || true;
        };
        trap cleanup EXIT;
        rm -rf "$artifacts_dir";
        mkdir -p "$artifacts_dir";
        env SCCACHE_REDIS_HOST_IP="{{.SCCACHE_REDIS_HOST_IP}}" {{.DOCKER}} buildx --builder {{.BUILDX_BUILDER}} bake --allow=fs.write="$artifacts_dir" {{.NOOK_BAKE_FILES}} --set "web-artifacts.output=type=local,dest=$artifacts_dir" --set "web-deps.output=type=cacheonly" --set "rust-format-check.output=type=cacheonly" {{.PREPARE_GROUP}};
        artifact_kib="$(du -sk "$artifacts_dir" | cut -f1)";
        echo "task setup: commit-scoped host WASM/coverage handoff is ${artifact_kib} KiB";
        test "$artifact_kib" -le 262144 || { echo "task setup: refusing oversized Rust/web handoff (${artifact_kib} KiB)" >&2; exit 1; };
        for attempt in 1 2; do
          if env SCCACHE_REDIS_HOST_IP="{{.SCCACHE_REDIS_HOST_IP}}" WEB_ARTIFACTS_CONTEXT="$artifacts_dir" {{.DOCKER}} buildx --builder {{.BUILDX_BUILDER}} bake --allow=fs.read="$artifacts_dir" {{.NOOK_BAKE_FILES}} "$setup_target"; then
            exit 0;
          fi;
          if [ "$attempt" -eq 2 ]; then exit 1; fi;
          echo "task setup: transient $setup_target Bake failure; retrying final web solve in 2s..." >&2;
          sleep 2;
        done'

  setup:rust:
    desc: Build and load the source-sealed Rust/WASM image for explicit rust/wasm commands.
    dir: '{{.REPO_ROOT}}'
    deps:
      - sccache:ensure
    env:
      GIT_COMMIT_ID: '{{.GIT_COMMIT_ID}}'
      WASM_BUILD_MODE: '{{.WASM_BUILD_MODE}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        for attempt in 1 2 3; do
          if env SCCACHE_REDIS_HOST_IP="{{.SCCACHE_REDIS_HOST_IP}}" {{.DOCKER}} buildx --builder {{.BUILDX_BUILDER}} bake {{.NOOK_BAKE_FILES}} nook-rust; then
            exit 0;
          fi;
          if [ "$attempt" -eq 3 ]; then exit 1; fi;
          echo "task setup:rust: bake attempt $attempt failed; retrying in 5s..." >&2;
          sleep 5;
        done'

  setup:rust:fast:
    desc: Build the manifest-keyed Rust/WASM development image for mounted source builds.
    dir: '{{.REPO_ROOT}}'
    deps:
      - sccache:ensure
    cmds:
      - >-
        env SCCACHE_REDIS_HOST_IP="{{.SCCACHE_REDIS_HOST_IP}}"
        {{.DOCKER}} buildx --builder {{.BUILDX_BUILDER}} bake
        {{.NOOK_BAKE_FILES}} nook-rust-fast

  setup:rust:browser:
    desc: Build and load the on-demand Rust image with Chromium for browser-wasm tests.
    dir: '{{.REPO_ROOT}}'
    deps:
      - sccache:ensure
    env:
      GIT_COMMIT_ID: '{{.GIT_COMMIT_ID}}'
      WASM_BUILD_MODE: '{{.WASM_BUILD_MODE}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        for attempt in 1 2 3; do
          if env SCCACHE_REDIS_HOST_IP="{{.SCCACHE_REDIS_HOST_IP}}" {{.DOCKER}} buildx --builder {{.BUILDX_BUILDER}} bake {{.NOOK_BAKE_FILES}} nook-rust-browser; then
            exit 0;
          fi;
          if [ "$attempt" -eq 3 ]; then exit 1; fi;
          echo "task setup:rust:browser: bake attempt $attempt failed; retrying in 5s..." >&2;
          sleep 5;
        done'
