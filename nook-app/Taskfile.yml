version: '3'

vars:
  REPO_ROOT:
    sh: 'if [ -n "${REPO_ROOT:-}" ]; then printf "%s" "$REPO_ROOT"; else git rev-parse --show-toplevel; fi'
  APP_ROOT: '{{.REPO_ROOT}}/nook-app'
  WEB_GROUP_ROOT: '{{.APP_ROOT}}/nook-web'
  WEB_ROOT: '{{.WEB_GROUP_ROOT}}/nook-web-app'
  EXTENSION_ROOT: '{{.WEB_GROUP_ROOT}}/nook-web-extension'
  WEB_SHARED_ROOT: '{{.WEB_GROUP_ROOT}}/nook-web-shared'
  DOCKER: '{{default "docker" .DOCKER}}'
  # Keep runtime containers at Docker Desktop's 1 Mi open-file baseline. Kernel-wide inotify
  # limits are host prerequisites documented in README.md; they cannot be set per container.
  DOCKER_NOFILE_LIMIT: '{{default "1048576" .DOCKER_NOFILE_LIMIT}}'
  DOCKER_RUN_LIMITS: '--ulimit nofile={{.DOCKER_NOFILE_LIMIT}}:{{.DOCKER_NOFILE_LIMIT}}'
  # buildx builder. We use the `docker` driver (BuildKit embedded in the daemon) so that the slim
  # web result is written straight into the containerd image store. Heavy Rust snapshots remain
  # only in BuildKit/GHCR cache unless an explicit Rust command loads one. Do NOT point this at a
  # `docker-container` builder: that driver forces a full-image re-export on every build.
  #
  # buildx auto-creates a docker-driver builder named after the active docker context, so
  # `docker context show` yields the right builder everywhere: `desktop-linux` on Docker Desktop,
  # `default` on plain Linux/CI. Override by exporting BUILDX_BUILDER.
  BUILDX_BUILDER:
    sh: 'echo "${BUILDX_BUILDER:-$(docker context show 2>/dev/null || echo default)}"'
  # The slim sealed web image is the common runtime. Heavy Rust images are loaded only by explicit
  # rust/wasm commands (and the browser variant only by manual browser-wasm tests).
  DOCKER_IMAGE: '{{default "nook-web:local" .DOCKER_IMAGE}}'
  DOCKER_RUST_IMAGE: '{{default "nook-rust:local" .DOCKER_RUST_IMAGE}}'
  DOCKER_RUST_BROWSER_IMAGE: '{{default "nook-rust-browser:local" .DOCKER_RUST_BROWSER_IMAGE}}'
  DOCKER_E2E_IMAGE: '{{default "nook-web-e2e:local" .DOCKER_E2E_IMAGE}}'
  TOOLCHAIN_REGISTRY: '{{default "ghcr.io/meta-secret/nook/toolchain" .TOOLCHAIN_REGISTRY}}'
  GIT_COMMIT_ID:
    sh: 'if [ -n "${GIT_COMMIT_ID:-}" ]; then printf "%s" "$GIT_COMMIT_ID"; else repo="${REPO_ROOT:-$(git rev-parse --show-toplevel)}"; cd "$repo" && git rev-parse HEAD; fi'
  WASM_BUILD_MODE: '{{default "dev" .WASM_BUILD_MODE}}'
  PREPARE_GROUP: '{{default "prepare" .PREPARE_GROUP}}'
  SETUP_TARGET: '{{default "nook-web" .SETUP_TARGET}}'
  # buildx bake `-f` flags: app orchestration + one file per package (single source of truth).
  NOOK_BAKE_FILES: >-
    --allow=fs.read={{.REPO_ROOT}}
    -f {{.REPO_ROOT}}/nook-app/docker-bake.hcl
    -f {{.REPO_ROOT}}/nook-app/docker/base.docker-bake.hcl
    -f {{.REPO_ROOT}}/nook-app/nook-core/docker-bake.hcl
    -f {{.REPO_ROOT}}/nook-app/nook-wasm/docker-bake.hcl
    -f {{.REPO_ROOT}}/nook-app/docker/toolchain.docker-bake.hcl
    -f {{.REPO_ROOT}}/nook-app/nook-web/nook-web-app/docker-bake.hcl
    --set '*.context={{.REPO_ROOT}}'
    --set 'builder-wasm.args.WASM_BUILD_MODE={{.WASM_BUILD_MODE}}'
  # CI sets TOOLCHAIN_REGISTRY so bake reuses the split GHCR rust/web caches; dev builds locally.
  NOOK_ENV: '{{default "dev" .NOOK_ENV}}'
  VITE_BASE: '{{default "/" .VITE_BASE}}'
  VITE_SITE_URL: '{{default "" .VITE_SITE_URL}}'
  VITE_PUBLIC_APP_URL: '{{default "" .VITE_PUBLIC_APP_URL}}'
  VITE_VAULT_SYNC_INTERVAL_MS: '{{default "" .VITE_VAULT_SYNC_INTERVAL_MS}}'
  WEB_DEV_PORT: '{{default "5173" .WEB_DEV_PORT}}'

includes:
  docker:
    taskfile: docker/Taskfile.yml
    dir: '{{.REPO_ROOT}}'
    flatten: true
  ci:
    taskfile: .task/ci.yml
    dir: '{{.REPO_ROOT}}'
    flatten: true
  core:
    taskfile: .task/core.yml
    dir: '{{.REPO_ROOT}}'
    flatten: true
  web:
    taskfile: nook-web/Taskfile.yml
    dir: '{{.REPO_ROOT}}'
    flatten: true

tasks:
  default:
    desc: Build every project.
    cmds:
      - task: build

  setup:
    desc: Build the slim linux/amd64 nook-web image via parallel Rust/WASM + web preparation.
    dir: '{{.REPO_ROOT}}'
    # Phase one builds Rust/WASM validation and web dependencies concurrently, exporting only the
    # generated WASM package + coverage files to a commit-scoped, invocation-isolated host directory.
    # Phase two consumes that tiny directory to build the web image; builder-wasm is never a
    # parent/context of nook-web. Do not retry the whole solve here: registry/session failures can
    # take minutes to surface, so a retry loop makes a failed PR occupy the runner indefinitely.
    env:
      TOOLCHAIN_REGISTRY: '{{.TOOLCHAIN_REGISTRY}}'
      GIT_COMMIT_ID: '{{.GIT_COMMIT_ID}}'
      WASM_BUILD_MODE: '{{.WASM_BUILD_MODE}}'
      VITE_BASE: '{{.VITE_BASE}}'
      VITE_SITE_URL: '{{.VITE_SITE_URL}}'
      VITE_PUBLIC_APP_URL: '{{.VITE_PUBLIC_APP_URL}}'
    cmds:
      # buildx bake can flake when parallel targets load the same Dockerfile (e.g. builder-deps +
      # builder-debug both use nook-app/nook-core/Dockerfile) — retry before failing CI on a transient parse error.
      - >-
        bash -c 'set -euo pipefail;
        commit_id="${GIT_COMMIT_ID:?task setup requires GIT_COMMIT_ID}";
        setup_target="{{.SETUP_TARGET}}";
        case "$setup_target" in nook-web|nook-web-e2e) ;; *) echo "Unsupported SETUP_TARGET=$setup_target" >&2; exit 2 ;; esac;
        if [ "${#commit_id}" -ne 40 ] || [[ "$commit_id" == *[!0-9a-f]* ]]; then
          echo "task setup: GIT_COMMIT_ID must be a full lowercase git SHA" >&2;
          exit 1;
        fi;
        artifacts_parent="${TMPDIR:-/tmp}/nook-web-artifacts";
        artifacts_root="$artifacts_parent/$commit_id";
        mkdir -p "$artifacts_root";
        artifacts_dir="$(mktemp -d "$artifacts_root/invocation.XXXXXX")";
        cleanup() {
          rm -rf "$artifacts_dir";
          rmdir "$artifacts_root" 2>/dev/null || true;
          rmdir "$artifacts_parent" 2>/dev/null || true;
        };
        trap cleanup EXIT;
        rm -rf "$artifacts_dir";
        mkdir -p "$artifacts_dir";
        {{.DOCKER}} buildx --builder {{.BUILDX_BUILDER}} bake --allow=fs.write="$artifacts_dir" {{.NOOK_BAKE_FILES}} --set "web-artifacts.output=type=local,dest=$artifacts_dir" --set "web-deps.output=type=cacheonly" --set "rust-format-check.output=type=cacheonly" {{.PREPARE_GROUP}};
        artifact_kib="$(du -sk "$artifacts_dir" | cut -f1)";
        echo "task setup: commit-scoped host WASM/coverage handoff is ${artifact_kib} KiB";
        test "$artifact_kib" -le 262144 || { echo "task setup: refusing oversized Rust/web handoff (${artifact_kib} KiB)" >&2; exit 1; };
        env WEB_ARTIFACTS_CONTEXT="$artifacts_dir" {{.DOCKER}} buildx --builder {{.BUILDX_BUILDER}} bake --allow=fs.read="$artifacts_dir" {{.NOOK_BAKE_FILES}} "$setup_target"'

  setup:rust:
    desc: Build and load the source-sealed Rust/WASM image for explicit rust/wasm commands.
    dir: '{{.REPO_ROOT}}'
    env:
      TOOLCHAIN_REGISTRY: '{{.TOOLCHAIN_REGISTRY}}'
      GIT_COMMIT_ID: '{{.GIT_COMMIT_ID}}'
      WASM_BUILD_MODE: '{{.WASM_BUILD_MODE}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        for attempt in 1 2 3; do
          if {{.DOCKER}} buildx --builder {{.BUILDX_BUILDER}} bake {{.NOOK_BAKE_FILES}} nook-rust; then
            exit 0;
          fi;
          if [ "$attempt" -eq 3 ]; then exit 1; fi;
          echo "task setup:rust: bake attempt $attempt failed; retrying in 5s..." >&2;
          sleep 5;
        done'

  setup:rust:browser:
    desc: Build and load the on-demand Rust image with Chromium for browser-wasm tests.
    dir: '{{.REPO_ROOT}}'
    env:
      TOOLCHAIN_REGISTRY: '{{.TOOLCHAIN_REGISTRY}}'
      GIT_COMMIT_ID: '{{.GIT_COMMIT_ID}}'
      WASM_BUILD_MODE: '{{.WASM_BUILD_MODE}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        for attempt in 1 2 3; do
          if {{.DOCKER}} buildx --builder {{.BUILDX_BUILDER}} bake {{.NOOK_BAKE_FILES}} nook-rust-browser; then
            exit 0;
          fi;
          if [ "$attempt" -eq 3 ]; then exit 1; fi;
          echo "task setup:rust:browser: bake attempt $attempt failed; retrying in 5s..." >&2;
          sleep 5;
        done'
