version: '3'

tasks:
  build:
    desc: Build Rust crates, wasm package, and web app in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _build }

  test:
    desc: Run all test suites in Docker.
    cmds:
      - task: preflight
      - task: setup
      - task: docker:task
        vars: { TASK: _test }

  lint:
    desc: Run all linters in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _lint }

  check:
    desc: Run formatting, linting, tests, and builds in Docker.
    cmds:
      - task: preflight
      - task: setup
      - task: docker:task
        vars: { TASK: _check }

  format:
    desc: >-
      Format all projects in sealed Docker images and apply the diff to the host
      working tree. Always run before every commit/push — formatting is cheap and
      unconditional.
    cmds:
      - bash "{{.REPO_ROOT}}/.github/scripts/format-host-apply.sh"

  format:diff:
    desc: >-
      Format in sealed Docker images and print the unified diff without applying
      it to the host (debug only). Agents should use `task format` instead.
    cmds:
      - task: setup:rust
      - task: docker:rust:task
        vars: { TASK: _rust:format }
      - task: setup
        vars: { PREPARE_GROUP: prepare-with-unformatted-rust }
      - task: docker:task
        vars: { TASK: _format }

  format:check:
    desc: Check formatting for all projects in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _format:check }

  rust:build:
    desc: Build the Rust workspace in Docker.
    deps:
      - setup:rust
    cmds:
      - task: docker:rust:task
        vars: { TASK: _rust:build }

  rust:test:
    desc: Test the Rust workspace in Docker.
    deps:
      - setup:rust
    cmds:
      - task: docker:rust:task
        vars: { TASK: _rust:test }

  rust:coverage:
    desc: Report nook-core + nook-auth2 line coverage (cargo llvm-cov + nextest).
    deps:
      - setup:rust
    cmds:
      - task: docker:rust:task
        vars: { TASK: _rust:coverage }

  rust:coverage:check:
    desc: Enforce nook-core + nook-auth2 90% line coverage threshold.
    deps:
      - setup:rust
    cmds:
      - task: docker:rust:task
        vars: { TASK: _rust:coverage:check }

  rust:coverage:update:
    desc: Rewrite coverage-floor.json to measured % (user approval only).
    deps:
      - setup:rust
    cmds:
      - task: docker:rust:task
        vars: { TASK: _rust:coverage:update }

  rust:coverage:export:
    desc: Export nook-core + nook-auth2 coverage summary, JSON, and LCOV artifacts from Docker.
    deps:
      - setup
    cmds:
      - task: docker:extract:coverage
        vars: { COVERAGE_OUT_DIR: '{{default (printf "%s/coverage/nook-core" .REPO_ROOT) .COVERAGE_OUT_DIR}}' }

  rust:lint:
    desc: Lint the Rust workspace in Docker.
    deps:
      - setup:rust
    cmds:
      - task: docker:rust:task
        vars: { TASK: _rust:lint }

  _build:
    desc: Build web app and browser extension after Rust/WASM succeeded in the image build.
    cmds:
      - task: _web:build:parallel
      - task: _extension:build

  _test:
    desc: Run all test suites.
    cmds:
      # Native Rust coverage/tests and wasm-bindgen Node tests run in the Rust image-build branch.
      - task: _web:check
      - task: _web:test
      - task: _extension:check

  _lint:
    desc: Run web linters after Rust/WASM clippy succeeded in the image build.
    cmds:
      - task: _web:lint
      - task: _extension:format:check

  _check:
    desc: Run formatting, linting, tests, and builds.
    cmds:
      - task: _format:check
      - task: _lint
      - task: _test
      - task: _build

  _verify:
    desc: Format, lint, and test without production web build.
    cmds:
      - task: _format:check
      - task: _lint
      - task: _test

  _verify:parallel:
    desc: Lint ‖ tests when wasm is already built (ci:pr parallel track).
    deps:
      - _lint:parallel
      - _test:parallel

  _lint:parallel:
    desc: Web and extension linters only — Rust clippy already runs in the Rust image branch.
    cmds:
      - task: _web:lint:parallel
      - task: _extension:format:check

  _test:parallel:
    desc: Svelte check, Vitest, and extension type-check after Rust/WASM and web builds ran at image build.
    deps:
      - _web:check:parallel
      - _web:test:parallel
      - _extension:check

  _rust:test:parallel:
    desc: Run nook-core + nook-auth2 tests when deps are already built (ci:pr parallel track).
    cmds:
      - task: _rust:test:run

  _rust:test:run:
    internal: true
    desc: Run nook-core + nook-auth2 tests via cargo-nextest (ci profile, no coverage gate).
    cmds:
      - cd "{{.APP_ROOT}}" && cargo nextest run -p nook-core -p nook-auth2 --profile ci

  _rust:coverage:
    desc: Print nook-core + nook-auth2 line coverage summary (no floor enforcement).
    cmds:
      - cd "{{.APP_ROOT}}" && cargo llvm-cov nextest --no-clean --profile ci -p nook-core -p nook-auth2 --summary-only

  _rust:coverage:check:
    desc: Run nook-core + nook-auth2 coverage in Docker and let cargo-llvm-cov enforce the line floor.
    vars:
      FLOOR:
        sh: jq -r '.lines_percent' {{.APP_ROOT}}/nook-core/coverage-floor.json
    cmds:
      # Same cargo-llvm-cov subcommand warmed in nook-app/nook-core/Dockerfile (builder-debug), so the coverage
      # build is a cache hit — no dep recompile at runtime. cargo-llvm-cov enforces the threshold
      # itself via --fail-under-lines (non-zero exit if below); no output parsing.
      - cd "{{.APP_ROOT}}" && cargo llvm-cov nextest --no-clean --profile ci -p nook-core -p nook-auth2 --summary-only --fail-under-lines {{.FLOOR}}

  _rust:coverage:update:
    desc: Print measured nook-core + nook-auth2 line coverage as JSON so the floor can be bumped (apply on host).
    cmds:
      # Emit machine-readable coverage; --fail-under-lines with the current floor still gates, while
      # the JSON summary gives the exact measured line% to copy into {{.APP_ROOT}}/nook-core/coverage-floor.json.
      - cd "{{.APP_ROOT}}" && cargo llvm-cov nextest --no-clean --profile ci -p nook-core -p nook-auth2 --json --summary-only

  _format:
    desc: Format web projects, then print a host-applicable git diff (sealed image).
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run format
      - cd "{{.EXTENSION_ROOT}}" && bun run format
      - >-
        sh -c 'if git diff --quiet; then
          echo "==> Web/extension already formatted; no changes." >&2;
        else
          echo "==> Web/extension formatting changes (host apply via task format):" >&2;
          git --no-pager diff;
        fi'

  _format:check:
    desc: Check web formatting after Rust fmt succeeded in the image-build branch.
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run format:check
      - cd "{{.EXTENSION_ROOT}}" && bun run format:check

  _rust:format:
    desc: Format Rust projects, then print a host-applicable git diff (sealed image).
    cmds:
      - bash -c 'cd "{{.APP_ROOT}}" && cargo fmt --all'
      - >-
        sh -c 'if git diff --quiet; then
          echo "==> Rust already formatted; no changes." >&2;
        else
          echo "==> Rust formatting changes (host apply via task format):" >&2;
          git --no-pager diff;
        fi'

  _rust:build:
    desc: Build the native Rust crates (wasm is built via _wasm:build).
    cmds:
      - cd "{{.APP_ROOT}}" && cargo build -p nook-core -p nook-auth2

  _rust:test:
    desc: Test nook-core + nook-auth2 (wasm is covered by web e2e).
    cmds:
      - task: _rust:test:run

  _rust:lint:
    desc: Lint nook-core + nook-auth2 on host and nook-wasm for wasm32.
    cmds:
      - cd "{{.APP_ROOT}}" && cargo clippy -p nook-core -p nook-auth2 --all-targets -- -D warnings
      - cd "{{.APP_ROOT}}" && cargo clippy --release --target wasm32-unknown-unknown -p nook-wasm -- -D warnings
