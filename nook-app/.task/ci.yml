version: "3"

tasks:
  ci:pr:
    desc: PR CI on a health-checked persistent BuildKit daemon — Rust/WASM validation, then one slim web container for format/verify/build.
    cmds:
      - task: _buildx:healthy
        vars: { BUILD_TASK: _ci:pr:host }

  ci:pr:rust:
    desc: Native Rust format, clippy, tests, and coverage for the split hosted PR pipeline.
    cmds:
      - task: _buildx:healthy
        vars: { BUILD_TASK: _ci:pr:rust:host }

  _ci:pr:rust:host:
    # These builds have independent Dockerfiles and can share the hosted BuildKit daemon safely.
    # Running them as dependencies hides repository-invariant validation under Rust compilation.
    deps:
      - preflight
      - docker:ci:rust:export

  ci:pr:wasm:
    desc: WASM clippy, build, and Node tests for the split hosted PR pipeline.
    cmds:
      - task: _buildx:healthy
        vars: { BUILD_TASK: _ci:pr:wasm:host }

  _ci:pr:wasm:host:
    cmds:
      - task: docker:ci:wasm:export

  ci:pr:web:
    desc: Build and verify web/extension code from downloaded split-CI artifacts.
    cmds:
      - task: _buildx:healthy
        vars: { BUILD_TASK: _ci:pr:web:host }

  _ci:pr:web:host:
    cmds:
      - task: docker:ci:web:build
      - task: docker:task
        vars: { TASK: _ci:pr }

  ci:pr:ui-demo:
    desc: Build the PR Chromium image and record selected UI demo videos.
    cmds:
      - task: _buildx:healthy
        vars: { BUILD_TASK: _ci:pr:ui-demo:host }

  _ci:pr:ui-demo:host:
    cmds:
      - task: docker:ci:web:e2e:build
      - task: ui:demo:ci

  _ci:pr:host:
    cmds:
      - task: preflight
      - task: setup
      - task: docker:task
        vars: { TASK: _ci:pr }

  _buildx:healthy:
    internal: true
    requires:
      vars: [BUILD_TASK]
    env:
      CI: '{{.CI}}'
      CI_ARTIFACT_DIR: '{{.CI_ARTIFACT_DIR}}'
      DOCKER_IMAGE: '{{.DOCKER_IMAGE}}'
      DOCKER_E2E_IMAGE: '{{.DOCKER_E2E_IMAGE}}'
      DOCKER_NOFILE_LIMIT: '{{.DOCKER_NOFILE_LIMIT}}'
      GIT_COMMIT_ID: '{{.GIT_COMMIT_ID}}'
      NOOK_ENV: '{{.NOOK_ENV}}'
      NOOK_EXTENSION_CHANNEL: '{{.NOOK_EXTENSION_CHANNEL}}'
      NOOK_EXTENSION_COMMIT: '{{.NOOK_EXTENSION_COMMIT}}'
      NOOK_EXTENSION_SITE_URL: '{{.NOOK_EXTENSION_SITE_URL}}'
      NOOK_EXTENSION_VERSION: '{{.NOOK_EXTENSION_VERSION}}'
      NOOK_SIMPLE_VAULT_URL: '{{.NOOK_SIMPLE_VAULT_URL}}'
      UI_DEMO_OUTPUT_DIR: '{{.UI_DEMO_OUTPUT_DIR}}'
      UI_DEMO_SPECS: '{{.UI_DEMO_SPECS}}'
      PREPARE_GROUP: '{{.PREPARE_GROUP}}'
      SCCACHE_REDIS_CONTAINER: '{{.SCCACHE_REDIS_CONTAINER}}'
      SCCACHE_REDIS_IMAGE: '{{.SCCACHE_REDIS_IMAGE}}'
      SCCACHE_REDIS_HOST_IP: '{{.SCCACHE_REDIS_HOST_IP}}'
      SCCACHE_REDIS_MAXMEMORY: '{{.SCCACHE_REDIS_MAXMEMORY}}'
      SCCACHE_REDIS_PORT: '{{.SCCACHE_REDIS_PORT}}'
      SCCACHE_REDIS_VOLUME: '{{.SCCACHE_REDIS_VOLUME}}'
      SETUP_TARGET: '{{.SETUP_TARGET}}'
      VITE_BASE: '{{.VITE_BASE}}'
      VITE_PUBLIC_APP_URL: '{{.VITE_PUBLIC_APP_URL}}'
      VITE_SENTINEL_APP_URL: '{{.VITE_SENTINEL_APP_URL}}'
      VITE_SIMPLE_APP_URL: '{{.VITE_SIMPLE_APP_URL}}'
      VITE_SITE_URL: '{{.VITE_SITE_URL}}'
      VITE_VAULT_SYNC_INTERVAL_MS: '{{.VITE_VAULT_SYNC_INTERVAL_MS}}'
      WASM_BUILD_MODE: '{{.WASM_BUILD_MODE}}'
    cmds:
      - bash "{{.REPO_ROOT}}/.github/scripts/with-healthy-buildkit.sh" task --dir "{{.REPO_ROOT}}" {{.BUILD_TASK}}

  ci:pr:e2e:
    desc: Full stub web Playwright e2e plus extension e2e on a health-checked persistent BuildKit daemon.
    cmds:
      - task: _buildx:healthy
        vars: { BUILD_TASK: _ci:pr:e2e:host }

  _ci:pr:e2e:host:
    cmds:
      - task: preflight
      - task: setup
        vars: { SETUP_TARGET: nook-web-e2e }
      - task: docker:e2e:run
        vars: { TASK: _ci:main }

  ci:pr:e2e:web:artifacts:
    desc: Hosted web e2e from the verified split-CI WASM artifact.
    cmds:
      - task: _buildx:healthy
        vars: { BUILD_TASK: _ci:pr:e2e:web:artifacts:host }

  _ci:pr:e2e:web:artifacts:host:
    cmds:
      - task: docker:ci:web:e2e:build
      - task: docker:e2e:run
        vars: { TASK: _ci:main:web:e2e-only }

  ci:pr:e2e:extension:artifacts:
    desc: Hosted extension e2e from the verified split-CI WASM artifact.
    cmds:
      - task: _buildx:healthy
        vars: { BUILD_TASK: _ci:pr:e2e:extension:artifacts:host }

  _ci:pr:e2e:extension:artifacts:host:
    cmds:
      - task: docker:ci:web:e2e:build
      - task: docker:e2e:run
        vars: { TASK: _extension:test:e2e }

  ci:pr:e2e:local:
    desc: Alias for ci:pr:e2e.
    cmds:
      - task: ci:pr:e2e

  ci:main:
    desc: Main/release CI on the health-checked persistent BuildKit daemon — Rust/WASM validation, then verify/build/e2e.
    cmds:
      - task: _buildx:healthy
        vars: { BUILD_TASK: _ci:main:host }

  _ci:main:host:
    cmds:
      - task: preflight
      - task: setup
        vars: { SETUP_TARGET: nook-web-e2e }
      - task: docker:e2e:run
        vars: { TASK: _ci:main }

  ci:main:prepare:
    desc: Format check and wasm build in one container (manual/debug only — prefer ci:main:build).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _ci:pr:prepare }

  ci:main:parallel:
    desc: Verify ‖ web build in one container (manual/debug — wasm must exist on bind mount).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _ci:pr:parallel }

  ci:main:finish:
    desc: Alias for ci:main (legacy parallel finish name).
    cmds:
      - task: ci:main

  ci:main:e2e:
    desc: Full stub web Playwright e2e plus extension e2e when wasm/dist already built.
    cmds:
      - task: web:test:e2e:parallel
      - task: extension:test:e2e

  ci:main:e2e:parallel:
    desc: Alias for ci:main:e2e.
    cmds:
      - task: ci:main:e2e

  ci:nightly:e2e:
    desc: Nightly live sync provider e2e (real APIs; requires provider credentials).
    cmds:
      - task: preflight
      - task: setup
        vars: { SETUP_TARGET: nook-web-e2e }
      - task: docker:e2e:run
        vars: { TASK: _ci:nightly:e2e }

  ci:main:build:
    desc: Format, wasm, verify, and web build in one container (no e2e).
    cmds:
      - task: preflight
      - task: setup
      - task: docker:task
        vars: { TASK: _ci:main:build }

  ci:pr:deploy-preview:
    desc: Deploy the prepared PR image's dist to Cloudflare Pages (CI only; ci:pr must run first).
    cmds:
      - task: docker:task
        vars: { TASK: _deploy-preview }

  ci:cloudflare:deploy:
    desc: Deploy the prepared main image's dist to Cloudflare Pages (CI only; ci:main must run first).
    cmds:
      - task: docker:task
        vars: { TASK: _deploy-cloudflare }

  ci:pr:comment-preview:
    desc: Comment or update Cloudflare preview URL on the PR (runs in container; needs GITHUB_TOKEN + PR number).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _comment-preview }

  ci:pr:prepare:
    desc: Format check and wasm build in one container (manual/debug only — prefer ci:pr).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _ci:pr:prepare }

  ci:pr:parallel:
    desc: Verify ‖ web build in one container (manual/debug — wasm must exist on bind mount).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _ci:pr:parallel }

  ci:verify:parallel:
    desc: Lint and test in Docker without rebuilding wasm.
    cmds:
      - task: docker:task
        vars: { TASK: _verify:parallel }

  ci:verify:
    desc: Format, lint, and test in Docker (no web production build).
    cmds:
      - task: preflight
      - task: setup
      - task: docker:task
        vars: { TASK: _verify }

  _ci:pr:
    desc: PR gate — format and verify the production dist already built into the sealed image.
    cmds:
      - task: _format:check
      - task: _ci:pr:parallel

  _ci:pr:parallel:
    desc: Lint/test the production web build already validated while sealing the image.
    deps:
      - _verify:parallel

  _ci:main:build:
    desc: Main verify/build track without e2e.
    cmds:
      - task: _format:check
      - task: _ci:pr:parallel

  _ci:main:
    desc: Main gate — verify the sealed production build, create one e2e build, test, and restore prod dist.
    cmds:
      - task: _ci:main:build
      - cp -a "{{.WEB_ROOT}}/dist" "{{.WEB_ROOT}}/dist-prod"
      - task: _web:test:e2e:parallel
      - task: _web:test:e2e:isolation
      - task: _web:e2e:restore-prod-dist
      - task: _extension:test:e2e

  _ci:main:web:e2e-only:
    cmds:
      - task: _web:test:e2e:parallel
      - task: _web:test:e2e:isolation

  _ci:nightly:e2e:
    desc: Nightly live sync e2e after full main build in one container.
    cmds:
      - task: _ci:main:build
      - cp -a "{{.WEB_ROOT}}/dist" "{{.WEB_ROOT}}/dist-prod"
      - task: _web:test:e2e:sync-live:parallel
      - task: _web:e2e:restore-prod-dist

  _ci:pr:prepare:
    desc: Format check only (split-container debug — prefer _ci:pr).
    cmds:
      - task: _format:check

  _deploy-preview:
    desc: Deploy nook-app/nook-web/dist to Cloudflare Pages; writes URL to .cloudflare-preview-url.
    cmds:
      - task: _deploy-cloudflare

  _deploy-cloudflare:
    desc: Deploy nook-app/nook-web/dist to Cloudflare Pages; writes URL to .cloudflare-deploy-url and .cloudflare-preview-url.
    cmds:
      # Cloudflare does NOT support running Wrangler under the Bun runtime: `bunx wrangler` crashes
      # (e.g. TypeError from node:timers/promises) and propagates an opaque non-zero exit (201 in CI).
      # The image has no npm/npx, so we install wrangler with bun (package manager only) into a temp
      # dir and then invoke it with `node` — the Node runtime Cloudflare officially supports.
      #
      # NOTE: this is a `>-` FOLDED scalar — every newline becomes a space, so the whole block runs
      # as ONE line. Do NOT put `#` comments inside the shell body below: a folded `#` comments out
      # the rest of the line (i.e. every following command) and breaks the deploy.
      - >-
        bash -c 'set -euo pipefail;
        test -n "${CLOUDFLARE_API_TOKEN:-}" && test -n "${CLOUDFLARE_ACCOUNT_ID:-}" && test -n "${CF_PAGES_BRANCH:-}";
        project="${CF_PAGES_PROJECT_NAME:-nook}";
        production_branch="${CF_PAGES_PRODUCTION_BRANCH:-main}";
        deploy_dir="${CF_PAGES_DIST_DIR:-{{.WEB_ROOT}}/dist}";
        case "$deploy_dir" in
          /*) ;;
          *) deploy_dir="{{.REPO_ROOT}}/$deploy_dir" ;;
        esac;
        if [ ! -d "$deploy_dir" ]; then
          echo "error: Cloudflare Pages deploy directory not found: $deploy_dir" >&2;
          exit 1;
        fi;
        wr_dir="$(mktemp -d)";
        ( cd "$wr_dir" && printf "{\"name\":\"nook-wrangler\"}" > package.json && bun add wrangler@4 >/dev/null 2>&1 );
        wrangler() { node "$wr_dir/node_modules/.bin/wrangler" "$@"; };
        wrangler pages project create "$project" --production-branch="$production_branch" >/dev/null 2>&1 || true;
        set +e;
        deploy_output="$(
          wrangler pages deploy "$deploy_dir" \
            --project-name="$project" \
            --branch="${CF_PAGES_BRANCH}" \
            --commit-dirty=true 2>&1
        )";
        deploy_status=$?;
        set -e;
        echo "$deploy_output";
        if [ "$deploy_status" -ne 0 ]; then
          log_dir="${HOME:-/root}/.config/.wrangler/logs";
          if [ -d "$log_dir" ]; then
            latest_log="$(ls -t "$log_dir"/wrangler-*.log 2>/dev/null | head -1 || true)";
            if [ -n "$latest_log" ]; then
              echo "wrangler log ($latest_log):" >&2;
              cat "$latest_log" >&2;
            fi;
          fi;
          exit "$deploy_status";
        fi;
        clean_output="$(printf "%s" "$deploy_output" | sed -E "s/\x1b\[[0-9;]*[a-zA-Z]//g")";
        deployment_url="$(
          printf "%s" "$clean_output" \
            | grep -oE "https://[a-zA-Z0-9.-]+\.pages\.dev[a-zA-Z0-9./_-]*" \
            | tail -1
        )";
        if [ -z "$deployment_url" ]; then
          echo "Could not parse Cloudflare deployment URL from wrangler output" >&2;
          exit 1;
        fi;
        echo "$deployment_url" > "{{.REPO_ROOT}}/.cloudflare-deploy-url";
        echo "$deployment_url" > "{{.REPO_ROOT}}/.cloudflare-preview-url";
        echo "NOOK_PREVIEW_URL=$deployment_url"'

  _comment-preview:
    desc: Comment or update Cloudflare preview URL on the PR.
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        export PREVIEW_URL="${PREVIEW_URL:-$(cat "{{.REPO_ROOT}}/.cloudflare-preview-url")}";
        bun run "{{.REPO_ROOT}}/.github/scripts/comment-preview-url.ts"'
