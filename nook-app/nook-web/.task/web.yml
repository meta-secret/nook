version: "3"

tasks:
  web:install:
    desc: Install web dependencies in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _web:install }

  web:build:
    desc: Build the Svelte app in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _web:build }

  web:build:parallel:
    desc: Production web build in Docker without rebuilding wasm.
    cmds:
      - task: docker:task
        vars: { TASK: _web:build:parallel }

  web:build:parallel:e2e:
    desc: E2e-optimized web build in Docker (local e2e only — PR preview uses production dist).
    cmds:
      - task: docker:task
        vars: { TASK: _web:build:parallel:e2e }

  web:check:
    desc: Run Svelte and TypeScript checks in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _web:check }

  web:test:
    desc: Run web unit tests in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _web:test }

  web:test:e2e:
    desc: Run full local-provider Playwright e2e in Docker (e2e project; no PAT).
    deps:
      - task: setup
        vars: { SETUP_TARGET: nook-web-e2e }
    cmds:
      - task: docker:e2e:run
        vars: { TASK: _web:test:e2e }

  web:test:e2e:parallel:
    desc: Full local-provider Playwright e2e in Docker when wasm/dist already built (ci:pr/main).
    deps:
      - task: setup
        vars: { SETUP_TARGET: nook-web-e2e }
    cmds:
      - task: docker:e2e:run
        vars: { TASK: _web:test:e2e:parallel }

  web:test:e2e:file:
    desc: Run specific Playwright e2e spec file(s) in Docker (E2E_SPEC env var).
    deps:
      - task: setup
        vars: { SETUP_TARGET: nook-web-e2e }
    env:
      E2E_SPEC: "{{.E2E_SPEC}}"
    cmds:
      - task: docker:e2e:run
        vars:
          TASK: _web:test:e2e:file
          E2E_SPEC: "{{.E2E_SPEC}}"

  web:test:e2e:pr:
    desc: Fast Playwright e2e-pr in Docker (IndexedDB specs only).
    deps:
      - task: setup
        vars: { SETUP_TARGET: nook-web-e2e }
    cmds:
      - task: docker:e2e:run
        vars: { TASK: _web:test:e2e:pr }

  web:test:e2e:pr:parallel:
    desc: Fast Playwright e2e-pr when wasm and e2e dist already built (manual/debug).
    cmds:
      - task: docker:e2e:run
        vars: { TASK: _web:test:e2e:pr:parallel }

  web:test:e2e:sync-stub:
    desc: Legacy alias for web:test:e2e (full local-provider suite in Docker).
    cmds:
      - task: web:test:e2e

  web:test:e2e:sync-stub:parallel:
    desc: Alias for web:test:e2e:parallel.
    cmds:
      - task: web:test:e2e:parallel

  web:test:e2e:sync-live:
    desc: Run live sync provider Playwright e2e in Docker (requires provider credentials).
    deps:
      - task: setup
        vars: { SETUP_TARGET: nook-web-e2e }
    cmds:
      - task: docker:e2e:run
        vars: { TASK: _web:test:e2e:sync-live }

  web:test:e2e:sync-live:parallel:
    desc: Live sync Playwright project in Docker when wasm/dist already built.
    deps:
      - web:e2e:build-dist
    cmds:
      - task: docker:e2e:run
        vars: { TASK: _web:test:e2e:sync-live:parallel }

  web:test:e2e:github:
    desc: Alias for web:test:e2e:sync-live (real provider API).
    cmds:
      - task: web:test:e2e:sync-live

  web:test:e2e:local:
    desc: Alias for web:test:e2e:pr (fast IndexedDB specs).
    cmds:
      - task: web:test:e2e:pr

  web:test:e2e:local:parallel:
    desc: Alias for web:test:e2e:pr:parallel.
    cmds:
      - task: web:test:e2e:pr:parallel

  web:e2e:build-dist:
    desc: Rebuild web dist with fast vault sync for CI e2e preview (runs in Docker).
    cmds:
      - task: docker:task
        vars:
          TASK: _web:e2e:build-dist
          VITE_VAULT_SYNC_INTERVAL_MS: "500"
          VITE_VAULT_IDLE_TIMEOUT_MS: "2500"
          VITE_VAULT_IDLE_WARNING_MS: "0"

  web:e2e:restore-prod-dist:
    desc: Restore production dist after e2e (Docker-owned files cannot be rm'd on the host).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _web:e2e:restore-prod-dist }

  web:test:e2e:github:parallel:
    desc: Alias for web:test:e2e:sync-live:parallel (real provider API).
    cmds:
      - task: web:test:e2e:sync-live:parallel

  web:test:e2e:multi-device:
    desc: Run multi-device Playwright e2e in Docker.
    deps:
      - task: setup
        vars: { SETUP_TARGET: nook-web-e2e }
    cmds:
      - task: docker:e2e:run
        vars: { TASK: _web:test:e2e:multi-device }

  web:lint:
    desc: Lint the web app in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _web:lint }

  web:dev:
    desc: Start the Svelte dev server in Docker.
    deps:
      - setup:rust:browser
    cmds:
      - task: docker:web:dev

  web:dev:fast:
    desc: Start the Svelte dev server in Docker with a no-opt wasm build (local iteration).
    deps:
      - setup:rust:browser
    cmds:
      - task: docker:web:dev:fast

  _web:install:
    desc: Sync web dependencies after package.json or bun.lock changes.
    cmds:
      - cd "{{.WEB_ROOT}}" && bun install --frozen-lockfile

  _web:build:
    desc: Build the Svelte app from the image-seeded WASM package.
    env:
      VITE_BASE: "{{.VITE_BASE}}"
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run build

  _web:build:parallel:
    desc: Build the Svelte app when wasm is already built (ci:pr parallel track).
    env:
      VITE_BASE: "{{.VITE_BASE}}"
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run build

  _web:build:parallel:e2e:
    desc: Build dist with fast vault sync for local e2e (PR CI rebuilds this only for Playwright).
    env:
      VITE_BASE: "{{.VITE_BASE}}"
      VITE_E2E_EXPOSE_VAULT: "true"
      VITE_VAULT_SYNC_INTERVAL_MS: "500"
      VITE_VAULT_IDLE_TIMEOUT_MS: "2500"
      VITE_VAULT_IDLE_WARNING_MS: "0"
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run build

  _web:check:parallel:
    desc: Run Svelte and TypeScript checks when wasm is already built.
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run check

  _web:test:parallel:
    desc: Run web unit tests when wasm is already built.
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run test

  _web:lint:parallel:
    desc: Lint the web app when wasm is already built.
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run lint

  _web:check:
    desc: Run Svelte and TypeScript checks against the image-seeded WASM package.
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run check

  _web:test:
    desc: Run web unit tests against the image-seeded WASM package.
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run test

  _web:test:e2e:
    desc: Run full Playwright e2e suite.
    env:
      VITE_E2E_EXPOSE_VAULT: "true"
      VITE_VAULT_SYNC_INTERVAL_MS: "500"
      VITE_VAULT_IDLE_TIMEOUT_MS: "2500"
      VITE_VAULT_IDLE_WARNING_MS: "0"
    cmds:
      - task: _web:e2e:build-if-needed
      - cd "{{.WEB_ROOT}}" && bun run test:e2e
      - defer: cd "{{.WEB_ROOT}}" && bun run test:e2e:cleanup

  _web:test:e2e:parallel:
    desc: Full stub Playwright e2e when wasm/dist already built (ci:pr/main).
    env:
      NOOK_E2E_SKIP_GITHUB_CLEANUP: "1"
      VITE_E2E_EXPOSE_VAULT: "true"
      VITE_VAULT_SYNC_INTERVAL_MS: "500"
      VITE_VAULT_IDLE_TIMEOUT_MS: "2500"
      VITE_VAULT_IDLE_WARNING_MS: "0"
    cmds:
      - echo "==> Playwright e2e project (CI=${CI:-}, provider=${NOOK_E2E_SYNC_PROVIDER:-github}, dist=$([ -d "{{.WEB_ROOT}}/dist" ] && echo yes || echo no))"
      - cd "{{.WEB_ROOT}}" && bun run build
      - cd "{{.WEB_ROOT}}" && bun run test:e2e

  _web:e2e:build-if-needed:
    internal: true
    desc: Vite build for e2e preview when dist is missing or sources/env changed.
    env:
      VITE_BASE: "{{.VITE_BASE}}"
      VITE_E2E_EXPOSE_VAULT: "true"
      VITE_VAULT_SYNC_INTERVAL_MS: "500"
      VITE_VAULT_IDLE_TIMEOUT_MS: "2500"
      VITE_VAULT_IDLE_WARNING_MS: "0"
    cmds:
      - bash "{{.REPO_ROOT}}/.github/scripts/e2e-build-if-needed.sh"

  _web:test:e2e:file:
    desc: Run one or more Playwright e2e spec files (E2E_SPEC; skips vite when dist is fresh).
    env:
      NOOK_E2E_SKIP_GITHUB_CLEANUP: "1"
      VITE_E2E_EXPOSE_VAULT: "true"
      VITE_VAULT_SYNC_INTERVAL_MS: "500"
      VITE_VAULT_IDLE_TIMEOUT_MS: "2500"
      VITE_VAULT_IDLE_WARNING_MS: "0"
    cmds:
      - test -n "${E2E_SPEC:-}" || (echo "E2E_SPEC is required (e.g. e2e/connect.spec.ts)" >&2; exit 1)
      - echo "==> Playwright e2e scoped run (${E2E_SPEC})"
      - task: _web:e2e:build-if-needed
      - cd "{{.WEB_ROOT}}" && bun run test:e2e -- --project=e2e ${E2E_SPEC}
      - defer: cd "{{.WEB_ROOT}}" && bun run test:e2e:cleanup

  _web:test:e2e:pr:parallel:
    desc: Fast Playwright e2e-pr when wasm/dist already built (manual/debug).
    env:
      NOOK_E2E_SKIP_GITHUB_CLEANUP: "1"
    cmds:
      - echo "==> Playwright e2e-pr project (CI=${CI:-}, dist=$([ -d "{{.WEB_ROOT}}/dist" ] && echo yes || echo no))"
      - cd "{{.WEB_ROOT}}" && bun run test:e2e:pr

  _web:test:e2e:pr:
    desc: Fast Playwright e2e-pr with production build.
    env:
      VITE_E2E_EXPOSE_VAULT: "true"
      VITE_VAULT_SYNC_INTERVAL_MS: "500"
      VITE_VAULT_IDLE_TIMEOUT_MS: "2500"
      VITE_VAULT_IDLE_WARNING_MS: "0"
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run build
      - cd "{{.WEB_ROOT}}" && bun run test:e2e:pr

  _web:e2e:build-dist:
    desc: Build web dist with fast vault sync for CI e2e preview (skips when already fresh).
    env:
      VITE_E2E_EXPOSE_VAULT: "true"
      VITE_VAULT_SYNC_INTERVAL_MS: "500"
      VITE_VAULT_IDLE_TIMEOUT_MS: "2500"
      VITE_VAULT_IDLE_WARNING_MS: "0"
    cmds:
      - task: _web:e2e:build-if-needed

  _web:e2e:restore-prod-dist:
    desc: Swap e2e dist back to saved production dist (ci:main after parallel e2e).
    cmds:
      - rm -rf "{{.WEB_ROOT}}/dist"
      - cp -a "{{.WEB_ROOT}}/dist-prod" "{{.WEB_ROOT}}/dist"
      - rm -rf "{{.WEB_ROOT}}/dist-prod"

  _web:test:e2e:sync-stub:parallel:
    desc: Alias for _web:test:e2e:parallel.
    cmds:
      - task: _web:test:e2e:parallel

  _web:test:e2e:sync-live:parallel:
    desc: Live sync Playwright project when wasm/dist already built (nightly).
    cmds:
      - echo "==> Playwright sync-live project (CI=${CI:-}, provider=${NOOK_E2E_SYNC_PROVIDER:-github}, repo=${NOOK_GITHUB_E2E_REPO:-unset})"
      - cd "{{.WEB_ROOT}}" && bun run test:e2e:sync-live
      - defer: cd "{{.WEB_ROOT}}" && bun run test:e2e:cleanup

  _web:test:e2e:sync-stub:
    desc: Legacy alias for _web:test:e2e (build + full local-provider project).
    env:
      VITE_E2E_EXPOSE_VAULT: "true"
      VITE_VAULT_SYNC_INTERVAL_MS: "500"
      VITE_VAULT_IDLE_TIMEOUT_MS: "2500"
      VITE_VAULT_IDLE_WARNING_MS: "0"
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run build
      - cd "{{.WEB_ROOT}}" && bun run test:e2e

  _web:test:e2e:sync-live:
    desc: Run live sync provider Playwright e2e specs.
    env:
      VITE_E2E_EXPOSE_VAULT: "true"
      VITE_VAULT_SYNC_INTERVAL_MS: "1000"
      VITE_VAULT_IDLE_TIMEOUT_MS: "2500"
      VITE_VAULT_IDLE_WARNING_MS: "0"
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run build
      - cd "{{.WEB_ROOT}}" && bun run test:e2e:sync-live
      - defer: cd "{{.WEB_ROOT}}" && bun run test:e2e:cleanup

  _web:test:e2e:local:parallel:
    desc: Alias for _web:test:e2e:pr:parallel.
    cmds:
      - task: _web:test:e2e:pr:parallel

  _web:test:e2e:local:
    desc: Alias for _web:test:e2e:pr.
    cmds:
      - task: _web:test:e2e:pr

  _web:test:e2e:github:
    desc: Alias for _web:test:e2e:sync-live.
    cmds:
      - task: _web:test:e2e:sync-live

  _web:test:e2e:github:parallel:
    desc: Alias for _web:test:e2e:sync-live:parallel.
    cmds:
      - task: _web:test:e2e:sync-live:parallel

  _web:test:e2e:multi-device:
    desc: Run multi-device Playwright e2e specs.
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run test:e2e:multi-device
      - defer: cd "{{.WEB_ROOT}}" && bun run test:e2e:cleanup

  _web:lint:
    desc: Lint the web app against the image-seeded WASM package.
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run lint

  _web:dev:
    desc: Start the Svelte dev server.
    deps:
      - _wasm:build
    env:
      VITE_BASE: "{{.VITE_BASE}}"
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run dev -- --host 0.0.0.0

  _web:dev:fast:
    desc: Start the Svelte dev server after a no-opt wasm build.
    deps:
      - _wasm:build:fast
    env:
      VITE_BASE: "{{.VITE_BASE}}"
    cmds:
      - cd "{{.WEB_ROOT}}" && bun run dev -- --host 0.0.0.0
