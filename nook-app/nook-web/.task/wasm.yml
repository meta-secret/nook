version: '3'

tasks:
  wasm:test:
    desc: Run nook-wasm wasm-bindgen tests in Node.
    deps:
      - setup:rust
    cmds:
      - task: docker:rust:task
        vars: { TASK: _wasm:test }

  wasm:build:
    desc: Build nook-wasm for the web app in Docker.
    deps:
      - setup:rust
    cmds:
      - task: docker:rust:task
        vars: { TASK: _wasm:build }

  wasm:build:fast:
    desc: Build nook-wasm for the mounted web app without wasm-opt (local iteration).
    deps:
      - setup:rust
    cmds:
      - task: docker:wasm:build:fast

  wasm:build:prod:
    desc: Build nook-wasm for the web app with optimized production wasm.
    cmds:
      - task setup:rust WASM_BUILD_MODE=prod
      - task: docker:rust:task
        vars:
          TASK: _wasm:build
          WASM_BUILD_MODE: prod

  _wasm:build:
    desc: Build nook-wasm for the web app when sources changed (skips if image-seeded pkg is current).
    cmds:
      - task: _wasm:build:run

  _wasm:build:fast:
    desc: Alias for _wasm:build (default dev mode skips wasm-opt).
    cmds:
      - task: _wasm:build

  _wasm:build:run:
    internal: true
    cmds:
      - >-
        sh -c '
        current="$(cd "{{.APP_ROOT}}" && find "nook-wasm/src" "nook-core/src" "nook-core/locales" "nook-auth2/src" \
          \( -name "*.rs" -o -name "*.json" -o -name "Cargo.toml" \) -print0 \
          | LC_ALL=C sort -z \
          | xargs -0 sha256sum \
          | sha256sum \
          | cut -d" " -f1)";
        case "${WASM_BUILD_MODE:-{{.WASM_BUILD_MODE}}}" in
          prod) wasm_opt_flag="" ; stamp_mode="optimized" ;;
          dev) wasm_opt_flag="--no-opt" ; stamp_mode="no-opt" ;;
          *) echo "Unsupported WASM_BUILD_MODE=${WASM_BUILD_MODE:-{{.WASM_BUILD_MODE}}} (expected dev or prod)" >&2; exit 1 ;;
        esac;
        for spec in \
          "nook-wasm:default" \
          "nook-wasm-simple:app-simple" \
          "nook-wasm-sentinel:app-sentinel" \
          "nook-wasm-extension:app-extension" \
          "nook-wasm-migration:app-legacy-migration"; do
          out_dir="${spec%%:*}";
          feature="${spec#*:}";
          output="{{.WEB_SHARED_ROOT}}/src/vault-app/lib/$out_dir/nook_wasm_bg.wasm";
          stamp="{{.WEB_SHARED_ROOT}}/src/vault-app/lib/$out_dir/.wasm-source-sha256";
          desired="$current $stamp_mode $feature";
          stored="";
          if [ -f "$stamp" ]; then stored="$(cat "$stamp")"; fi;
          if [ ! -f "$output" ] || [ "$desired" != "$stored" ]; then
            if [ "$feature" = default ]; then
              cargo_args="";
            else
              cargo_args="-- --no-default-features --features $feature";
            fi;
            cd "{{.APP_ROOT}}" && wasm-pack build nook-wasm --target web --out-dir "../nook-web/nook-web-shared/src/vault-app/lib/$out_dir" --out-name nook_wasm $wasm_opt_flag $cargo_args;
            echo "$desired" > "$stamp";
          fi;
        done'

  _wasm:test:
    desc: Run nook-wasm wasm-bindgen tests in Node.
    cmds:
      - cd "{{.APP_ROOT}}" && wasm-pack test --node nook-wasm

  wasm:test:browser:
    desc: Run nook-wasm wasm-bindgen tests in headless Chrome (manual/debug).
    deps:
      - setup:rust:browser
    cmds:
      - task: docker:rust:browser:task
        vars: { TASK: _wasm:test:browser }

  _wasm:test:browser:
    desc: Run nook-wasm wasm-bindgen tests in headless Chrome (manual/debug).
    cmds:
      - cd "{{.APP_ROOT}}" && wasm-pack test --chrome --headless nook-wasm --features browser-wasm-tests
