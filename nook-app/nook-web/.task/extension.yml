version: "3"

tasks:
  extension:build:
    desc: Build the browser extension in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _extension:build }

  extension:build:localhost:
    desc: Build the browser extension for the trusted local Simple Vault server.
    cmds:
      # Start a fresh Task invocation so the root Taskfile resolves its environment-backed
      # NOOK_SIMPLE_VAULT_URL before setup seals the Docker image.
      - >-
        NOOK_SIMPLE_VAULT_URL=https://localhost:5173/
        NOOK_EXTENSION_CHANNEL=local
        task --taskfile "{{.REPO_ROOT}}/Taskfile.yml" extension:build

  extension:check:
    desc: Type-check the browser extension and verify the build sealed by setup.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _extension:check }

  extension:test:e2e:
    desc: Run browser extension Playwright e2e in Docker.
    deps:
      - task: setup
        vars: { SETUP_TARGET: nook-web-e2e }
    cmds:
      - task: docker:e2e:run
        vars: { TASK: _extension:test:e2e }

  extension:format:
    desc: Format the browser extension in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _extension:format }

  extension:format:check:
    desc: Check browser extension formatting in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _extension:format:check }

  extension:package:
    desc: Build and zip the browser extension for distribution.
    cmds:
      - task: extension:build
      - task: docker:extract:extension
      - >-
        bash -c 'set -euo pipefail;
        version="$(jq -r ".version" "{{.EXTENSION_ROOT}}/package.json")";
        zip_name="nook-web-extension-${version}.zip";
        zip_path="{{.EXTENSION_ROOT}}/dist/${zip_name}";
        rm -f "$zip_path";
        cd "{{.EXTENSION_ROOT}}/dist";
        zip -r "$zip_name" . -x "$zip_name" >/dev/null;
        test "$(unzip -Z1 "$zip_name" | grep -c "^manifest.json$")" -eq 1;
        printf "Packaged %s\n" "$zip_path";'

  extension:install:local:
    desc: Copy the packaged extension to a stable local Nook install directory.
    cmds:
      - task: extension:package
      - >-
        bash -c 'set -euo pipefail;
        version="$(jq -r ".version" "{{.EXTENSION_ROOT}}/package.json")";
        zip_name="nook-web-extension-${version}.zip";
        release_root="${NOOK_EXTENSION_RELEASE_DIR:-$HOME/Library/Application Support/Nook/browser-extensions/nook-web-extension}";
        unpacked_dir="$release_root/current";
        releases_dir="$release_root/releases";
        rm -rf "$unpacked_dir";
        mkdir -p "$unpacked_dir" "$releases_dir";
        cp -R "{{.EXTENSION_ROOT}}/dist/." "$unpacked_dir/";
        rm -f "$unpacked_dir"/nook-web-extension-*.zip;
        cp "{{.EXTENSION_ROOT}}/dist/$zip_name" "$releases_dir/$zip_name";
        printf "Copied unpacked extension to %s\n" "$unpacked_dir";
        printf "Copied release zip to %s\n" "$releases_dir/$zip_name";'

  extension:install:localhost:
    desc: Install a local extension build targeting https://localhost:5173.
    cmds:
      # See extension:build:localhost: this must be present when the nested setup task starts.
      - >-
        NOOK_SIMPLE_VAULT_URL=https://localhost:5173/
        NOOK_EXTENSION_CHANNEL=local
        task --taskfile "{{.REPO_ROOT}}/Taskfile.yml" extension:install:local

  extension:install:hosted:
    desc: Download, verify, and atomically install a hosted extension (CHANNEL=dev|prod or PR=<number>).
    env:
      CHANNEL: '{{default "" .CHANNEL}}'
      PR: '{{default "" .PR}}'
    cmds:
      - bash "{{.EXTENSION_ROOT}}/scripts/hosted-extension.sh" install

  extension:test:hosted-launcher:
    desc: Test hosted extension resolution, validation, and atomic installation without launching a browser.
    cmds:
      - bash "{{.EXTENSION_ROOT}}/scripts/hosted-extension.test.sh"

  extension:run:chrome:
    desc: Launch Chrome with localhost by default, or a hosted build selected by CHANNEL=dev|prod or PR=<number>.
    env:
      CHANNEL: '{{default "" .CHANNEL}}'
      PR: '{{default "" .PR}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        if [ -n "${CHANNEL:-}" ] || [ -n "${PR:-}" ]; then
          exec bash "{{.EXTENSION_ROOT}}/scripts/hosted-extension.sh" run chrome;
        fi;
        task --taskfile "{{.REPO_ROOT}}/Taskfile.yml" extension:install:localhost;
        extension_dir="${NOOK_EXTENSION_RELEASE_DIR:-$HOME/Library/Application Support/Nook/browser-extensions/nook-web-extension}/current";
        profile_dir="${NOOK_CHROME_EXTENSION_PROFILE_DIR:-$HOME/Library/Application Support/Nook/browser-profiles/chrome-extension-dev}";
        mkdir -p "$profile_dir";
        if [ -n "${CHROME_BIN:-}" ]; then
          test -x "$CHROME_BIN" || { echo "Google Chrome binary not found at $CHROME_BIN" >&2; exit 1; };
          nohup "$CHROME_BIN" --user-data-dir="$profile_dir" --load-extension="$extension_dir" about:blank >/dev/null 2>&1 </dev/null &
        else
          test -d "/Applications/Google Chrome.app" || { echo "Google Chrome application not found" >&2; exit 1; };
          open -na "Google Chrome" --args --user-data-dir="$profile_dir" --load-extension="$extension_dir" about:blank;
        fi;
        printf "Launched Chrome with %s\n" "$extension_dir";'

  extension:run:brave:
    desc: Launch Brave with localhost by default, or a hosted build selected by CHANNEL=dev|prod or PR=<number>.
    env:
      CHANNEL: '{{default "" .CHANNEL}}'
      PR: '{{default "" .PR}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        if [ -n "${CHANNEL:-}" ] || [ -n "${PR:-}" ]; then
          exec bash "{{.EXTENSION_ROOT}}/scripts/hosted-extension.sh" run brave;
        fi;
        task --taskfile "{{.REPO_ROOT}}/Taskfile.yml" extension:install:localhost;
        extension_dir="${NOOK_EXTENSION_RELEASE_DIR:-$HOME/Library/Application Support/Nook/browser-extensions/nook-web-extension}/current";
        profile_dir="${NOOK_BRAVE_EXTENSION_PROFILE_DIR:-$HOME/Library/Application Support/Nook/browser-profiles/brave-extension-dev}";
        mkdir -p "$profile_dir";
        if [ -n "${BRAVE_BIN:-}" ]; then
          test -x "$BRAVE_BIN" || { echo "Brave binary not found at $BRAVE_BIN" >&2; exit 1; };
          nohup "$BRAVE_BIN" --user-data-dir="$profile_dir" --load-extension="$extension_dir" about:blank >/dev/null 2>&1 </dev/null &
        else
          test -d "/Applications/Brave Browser.app" || { echo "Brave Browser application not found" >&2; exit 1; };
          open -na "Brave Browser" --args --user-data-dir="$profile_dir" --load-extension="$extension_dir" about:blank;
        fi;
        printf "Launched Brave with %s\n" "$extension_dir";'

  _extension:build:
    desc: Build the browser extension.
    cmds:
      - cd "{{.EXTENSION_ROOT}}" && bun run build

  _extension:check:
    desc: Type-check the browser extension; setup already validated and sealed its build.
    cmds:
      - cd "{{.EXTENSION_ROOT}}" && bun run check
      - bash "{{.EXTENSION_ROOT}}/scripts/hosted-extension.test.sh"

  _extension:test:e2e:
    desc: Run browser extension Playwright e2e.
    cmds:
      - cd "{{.EXTENSION_ROOT}}" && bun run test:e2e

  _extension:format:
    desc: Format the browser extension.
    cmds:
      - cd "{{.EXTENSION_ROOT}}" && bun run format

  _extension:format:check:
    desc: Check browser extension formatting.
    cmds:
      - cd "{{.EXTENSION_ROOT}}" && bun run format:check
