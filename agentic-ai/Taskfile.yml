version: '3'

vars:
  CI_AGENT_DIR: agentic-ai/ci-agent
  CI_AGENT_IMAGE: '{{default "nook-ci-agent:local" .CI_AGENT_IMAGE}}'
  META_AGENT_DIR: agentic-ai/meta-agent
  # Host Docker socket (sibling containers via sock — not DinD). Override on unusual setups.
  DOCKER_SOCK: '{{default "/var/run/docker.sock" .DOCKER_SOCK}}'
  DOCKER: '{{default "docker" .DOCKER}}'
  DOCKER_NOFILE_LIMIT: '{{default "1048576" .DOCKER_NOFILE_LIMIT}}'

tasks:
  meta-agent:check:
    desc: Run meta-agent Rust format, Clippy, and unit tests on the host.
    dir: '{{.ROOT_DIR}}'
    cmds:
      - cargo fmt --manifest-path {{.META_AGENT_DIR}}/Cargo.toml --all -- --check
      - cargo clippy --manifest-path {{.META_AGENT_DIR}}/Cargo.toml --locked --all-targets -- -D warnings
      - cargo test --manifest-path {{.META_AGENT_DIR}}/Cargo.toml --locked

  meta-agent:build:
    desc: Build the meta-agent host CLI in release mode.
    dir: '{{.ROOT_DIR}}'
    sources:
      - agentic-ai/meta-agent/Cargo.toml
      - agentic-ai/meta-agent/Cargo.lock
      - agentic-ai/meta-agent/src/**/*
    generates:
      - agentic-ai/meta-agent/target/release/meta-agent
    cmds:
      - cargo build --manifest-path {{.META_AGENT_DIR}}/Cargo.toml --locked --release

  meta-agent:plan:
    desc: Convert PROMPT into a validated local feature DAG using embedded Codex crates.
    requires:
      vars:
        - PROMPT
    vars:
      REPO_ROOT:
        sh: 'git rev-parse --show-toplevel'
      FEATURE_OUTPUT_ROOT: '{{default "agentic-ai/features" .FEATURE_OUTPUT_ROOT}}'
      META_AGENT_MODEL: '{{default "gpt-5.6-luna" .META_AGENT_MODEL}}'
      META_AGENT_REASONING_EFFORT: '{{default "low" .META_AGENT_REASONING_EFFORT}}'
    env:
      META_AGENT_PROMPT: '{{.PROMPT}}'
      META_AGENT_OUTPUT_ROOT: '{{.FEATURE_OUTPUT_ROOT}}'
      META_AGENT_SELECTED_MODEL: '{{.META_AGENT_MODEL}}'
      META_AGENT_SELECTED_REASONING_EFFORT: '{{.META_AGENT_REASONING_EFFORT}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        repo_root="{{.REPO_ROOT}}";
        args=(plan --repo-root "$repo_root" --output-root "$META_AGENT_OUTPUT_ROOT");
        args+=(--model "$META_AGENT_SELECTED_MODEL" --reasoning-effort "$META_AGENT_SELECTED_REASONING_EFFORT");
        printf "%s\n" "$META_AGENT_PROMPT" | cargo run --manifest-path "$repo_root/agentic-ai/meta-agent/Cargo.toml" --locked -- "${args[@]}"'

  meta-agent:validate:
    desc: Validate FEATURE and print its dependency/resource-safe execution batches.
    requires:
      vars:
        - FEATURE
    vars:
      REPO_ROOT:
        sh: 'git rev-parse --show-toplevel'
    env:
      META_AGENT_FEATURE: '{{.FEATURE}}'
    cmds:
      - >-
        cargo run --manifest-path "{{.REPO_ROOT}}/agentic-ai/meta-agent/Cargo.toml" --locked -- validate "$META_AGENT_FEATURE"

  ci-agent:install:
    internal: true
    dir: '{{.CI_AGENT_DIR}}'
    cmds:
      - npm ci

  ci-agent:build:
    internal: true
    dir: '{{.CI_AGENT_DIR}}'
    deps:
      - ci-agent:install
    sources:
      - src/**/*
      - tsconfig.json
      - package.json
      - package-lock.json
    generates:
      - dist/main/main.js
    cmds:
      - npm run build

  ci-agent:prepare:
    desc: Install and build ci-agent on the host (Node 22.13+). Prefer Docker tasks for CI.
    cmds:
      - >-
        node -e "const [maj,min]=process.versions.node.split('.').map(Number);
        if(maj<22||(maj===22&&min<13)){console.error('ci-agent requires Node.js 22.13+ (have '+process.versions.node+')');process.exit(1)}"
      - task: ci-agent:build

  ci-agent:docker:build:
    desc: Build the nook-ci-agent image (Node + Docker CLI + task; no daemon).
    sources:
      - agentic-ai/ci-agent/Dockerfile
      - agentic-ai/ci-agent/.dockerignore
      - agentic-ai/ci-agent/package.json
      - agentic-ai/ci-agent/package-lock.json
      - agentic-ai/ci-agent/tsconfig.json
      - agentic-ai/ci-agent/src/**/*
    cmds:
      - >-
        {{.DOCKER}} build
        --platform linux/amd64
        -t {{.CI_AGENT_IMAGE}}
        -f {{.CI_AGENT_DIR}}/Dockerfile
        {{.CI_AGENT_DIR}}

  ci-agent:docker:run:
    desc: Run a ci-agent command in Docker with repo bind-mount and docker.sock.
    deps:
      - ci-agent:docker:build
    vars:
      REPO_ROOT:
        sh: 'echo "${REPO_ROOT:-$(git rev-parse --show-toplevel)}"'
      CI_AGENT_CMD: '{{.CI_AGENT_CMD}}'
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        repo_root="{{.REPO_ROOT}}";
        if [ ! -e "$repo_root/.git" ]; then
          echo "ci-agent:docker:run: missing $repo_root/.git — refuse to start agent without a checkout" >&2;
          ls -la "$repo_root" >&2 || true;
          exit 1;
        fi;
        mounts=(-v "$repo_root:$repo_root");
        if [ -n "${RUNNER_WORKSPACE:-}" ]; then mounts+=(-v "$RUNNER_WORKSPACE:$RUNNER_WORKSPACE"); fi;
        if [ -n "${RUNNER_TEMP:-}" ]; then mounts+=(-v "$RUNNER_TEMP:$RUNNER_TEMP"); fi;
        {{.DOCKER}} run --rm
        --init
        --platform linux/amd64
        --ulimit nofile={{.DOCKER_NOFILE_LIMIT}}:{{.DOCKER_NOFILE_LIMIT}}
        "${mounts[@]}"
        -w "$repo_root"
        -v {{.DOCKER_SOCK}}:/var/run/docker.sock
        -e REPO_ROOT="$repo_root"
        -e CURSOR_API_KEY
        -e CURSOR_AGENT_MODEL
        -e NOOK_GITHUB_PAT
        -e GITHUB_TOKEN
        -e GH_TOKEN
        -e GITHUB_REPOSITORY
        -e GITHUB_RUN_ID
        -e FIX_BRANCH
        -e AGENT_BRANCH
        -e CI_AGENT_PROMPT_FILE
        -e CI_FIX_LABEL
        -e CI_FIX_POLL_MS
        -e CI_AGENT_TIMEOUT_MS
        -e CI_AGENT_HEARTBEAT_MS
        -e CI_AGENT_LOG_LEVEL
        -e AGENT_PROMPT
        -e AGENT_ISSUE_NUMBER
        -e AGENT_ISSUE_TITLE
        -e AGENT_ISSUE_BODY
        -e AGENT_ISSUE_URL
        -e AGENT_PR_TITLE
        -e AGENT_PR_BODY
        -e AGENT_COMMIT_MESSAGE
        -e VITE_BASE
        -e VITE_VAULT_SYNC_INTERVAL_MS
        -e WASM_BUILD_MODE
        -e NOOK_GITHUB_E2E_REPO
        -e NOOK_GITHUB_POLL_MS
        -e NOOK_GITHUB_SYNC_TIMEOUT_MS
        -e NOOK_GITHUB_CONNECT_TIMEOUT_MS
        -e DOCKER={{.DOCKER}}
        -e DOCKER_IMAGE
        -e TOOLCHAIN_REGISTRY
        -e NOOK_ENV
        -e CI=1
        {{.CI_AGENT_IMAGE}}
        {{.CI_AGENT_CMD}}'

  ci-agent:run:
    desc: Run Cursor SDK agent only (in Docker; host docker.sock).
    deps:
      - setup
    cmds:
      - task: ci-agent:docker:run
        vars:
          CI_AGENT_CMD: agent

  ci-agent:fix:
    desc: Full CI fix loop in Docker — agent, GitHub REST API (PR, checks, squash merge).
    deps:
      - setup
    cmds:
      - task: ci-agent:docker:run
        vars:
          CI_AGENT_CMD: fix

  ci-agent:implement:
    desc: Implement issue/prompt via Cursor agent in Docker, open PR, squash-merge.
    deps:
      - setup
    cmds:
      - task: ci-agent:docker:run
        vars:
          CI_AGENT_CMD: implement
