name: Nook Docker pull
description: Log in to GHCR and pull the shared linux/amd64 toolchain image (no build).

inputs:
  github-token:
    description: Token with packages:read for GHCR pull.
    required: true

runs:
  using: composite
  steps:
    - name: Setup Task
      uses: go-task/setup-task@v2

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Set toolchain registry
      shell: bash
      run: |
        echo "TOOLCHAIN_REGISTRY=$(echo "ghcr.io/${{ github.repository }}/toolchain" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Pull toolchain image
      shell: bash
      run: task setup:pull
      env:
        TOOLCHAIN_REGISTRY: ${{ env.TOOLCHAIN_REGISTRY }}
