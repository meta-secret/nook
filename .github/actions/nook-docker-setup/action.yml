name: Nook Docker setup
description: Pull GHCR toolchain image, Buildx login, build linux/amd64 image, push, and cache for sibling jobs.

inputs:
  github-token:
    description: Token with packages:write for GHCR login and image push.
    required: true

runs:
  using: composite
  steps:
    - name: Setup Task
      uses: go-task/setup-task@v2

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Set toolchain registry
      shell: bash
      run: |
        echo "TOOLCHAIN_REGISTRY=$(echo "ghcr.io/${{ github.repository }}/toolchain" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Build toolchain image
      shell: bash
      run: task setup
      env:
        TOOLCHAIN_REGISTRY: ${{ env.TOOLCHAIN_REGISTRY }}

    - name: Push toolchain image
      shell: bash
      run: task docker:push
      env:
        PUSH_TOOLCHAIN: "1"
        TOOLCHAIN_REGISTRY: ${{ env.TOOLCHAIN_REGISTRY }}

    - name: Save image for parallel jobs
      shell: bash
      run: docker save nook-build:local -o "${RUNNER_TEMP}/nook-toolchain.tar"

    - name: Cache toolchain image
      uses: actions/cache/save@v4
      with:
        path: ${{ runner.temp }}/nook-toolchain.tar
        key: nook-toolchain-${{ github.run_id }}
