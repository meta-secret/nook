name: Nook Docker setup
description: Checkout, Buildx, GHCR login, and task setup (toolchain image + web deps).

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Setup Task
      uses: go-task/setup-task@v2

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Set Cache Env
      shell: bash
      run: |
        echo "CACHE_REGISTRY=$(echo "ghcr.io/${{ github.repository }}-cache" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Build toolchain image and install dependencies
      shell: bash
      run: task setup
      env:
        CACHE_REGISTRY: ${{ env.CACHE_REGISTRY }}
        PUSH_CACHE: "1"
        CACHE_FROM: type=registry,ref=${{ env.CACHE_REGISTRY }}:latest
        CACHE_TO: type=registry,ref=${{ env.CACHE_REGISTRY }}:latest,mode=max
