name: Nook Docker setup
description: Task, Buildx, and GitHub-hosted BuildKit cache setup.

inputs:
  cache-write:
    description: Allow this workflow source to update the shared hosted BuildKit cache scopes.
    required: false
    default: "true"
  cache-redis-password:
    description: Password for the persistent remote Rust compiler cache.
    required: false
    default: ""
  cache-cloudflare-client-id:
    description: Cloudflare Access service-token client ID for the persistent cache.
    required: false
    default: ""
  cache-cloudflare-client-secret:
    description: Cloudflare Access service-token secret for the persistent cache.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup Task
      uses: go-task/setup-task@v2

    - name: Raise Linux filesystem watcher limits
      shell: bash
      run: |
        ensure_minimum() {
          local key="$1"
          local minimum="$2"
          local current
          current="$(sysctl -n "$key")"
          if (( current < minimum )); then
            if sudo -n true 2>/dev/null; then
              sudo sysctl -w "$key=$minimum"
            else
              echo "::warning::$key = $current (< $minimum); runner cannot raise it without interactive sudo"
            fi
          else
            echo "$key = $current (already >= $minimum)"
          fi
        }
        ensure_minimum fs.inotify.max_user_instances 2500
        ensure_minimum fs.inotify.max_user_watches 10485760

    # The GHA cache exporter requires the docker-container driver. setup-buildx owns this ephemeral
    # builder on GitHub-hosted VMs; all Task/Bake callers use it, so delivery does not depend on or
    # mutate the Docker daemon's default image store.
    - name: Setup Buildx
      id: buildx
      uses: docker/setup-buildx-action@v3

    - name: Configure persistent Rust compiler cache
      uses: ./.github/actions/nook-cache-connect
      with:
        cache-redis-password: ${{ inputs.cache-redis-password }}
        cache-cloudflare-client-id: ${{ inputs.cache-cloudflare-client-id }}
        cache-cloudflare-client-secret: ${{ inputs.cache-cloudflare-client-secret }}

    # Inline `task`/Bake calls do not receive GitHub's cache-service token automatically. This
    # helper exposes ACTIONS_RUNTIME_TOKEN/ACTIONS_RESULTS_URL as documented by Docker for `type=gha`.
    - name: Expose GitHub Actions cache runtime
      uses: crazy-max/ghaction-github-runtime@v3

    - name: Select hosted BuildKit cache
      shell: bash
      run: |
        echo "NOOK_PR_BUILDX_BUILDER=${{ steps.buildx.outputs.name }}" >> "$GITHUB_ENV"
        echo "BUILDX_BUILDER=${{ steps.buildx.outputs.name }}" >> "$GITHUB_ENV"
        echo "GHA_CACHE_ENABLED=1" >> "$GITHUB_ENV"
        if [ "${{ inputs.cache-write }}" = "true" ]; then
          echo "GHA_CACHE_WRITE_ENABLED=1" >> "$GITHUB_ENV"
        else
          echo "GHA_CACHE_WRITE_ENABLED=" >> "$GITHUB_ENV"
        fi

    - name: Set CI environment
      shell: bash
      run: |
        echo "NOOK_ENV=ci" >> "$GITHUB_ENV"
