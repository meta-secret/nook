name: Nook Docker setup
description: Pull GHCR cache (if available), Buildx login, and build toolchain image once per workflow run.

inputs:
  github-token:
    description: Token with packages:write for GHCR login and cache push.
    required: true

runs:
  using: composite
  steps:
    - name: Setup Task
      uses: go-task/setup-task@v2

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Set Cache Env
      shell: bash
      run: |
        echo "CACHE_REGISTRY=$(echo "ghcr.io/${{ github.repository }}-cache" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Build toolchain image and install dependencies
      shell: bash
      run: task setup
      env:
        CACHE_REGISTRY: ${{ env.CACHE_REGISTRY }}
        PUSH_CACHE: "1"
        CACHE_FROM: type=registry,ref=${{ env.CACHE_REGISTRY }}:latest
        CACHE_TO: type=registry,ref=${{ env.CACHE_REGISTRY }}:latest,mode=max
