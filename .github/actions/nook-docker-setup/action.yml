name: Nook Docker setup
description: Task, containerd image store, and GHCR login (toolchain resolve/pull/bake runs via task setup).

inputs:
  github-token:
    description: Token with packages:read/write for GHCR login and build cache.
    required: true

runs:
  using: composite
  steps:
    - name: Setup Task
      uses: go-task/setup-task@v2

    # Enable the containerd image store so the `docker` driver builder (the daemon's built-in
    # BuildKit, which `task setup` selects via `docker context show` -> "default") writes build
    # results STRAIGHT into the image store — no full-image tarball export + load. This is what
    # makes warm builds re-export only the small changed source/dist layers (~seconds) instead of
    # re-tarballing the whole ~9 GB image. We do NOT use docker/setup-buildx-action: that creates a
    # `docker-container` builder which forces a full-image re-export on every build.
    # Recent ubuntu-latest (Docker 29+) enables this by default, but we set it explicitly so the
    # fast path is guaranteed regardless of runner image drift.
    - name: Enable containerd image store
      shell: bash
      run: |
        daemon_json="/etc/docker/daemon.json"
        sudo mkdir -p /etc/docker
        if [ -f "$daemon_json" ]; then
          sudo jq '. + {"features": (.features // {} | . + {"containerd-snapshotter": true})}' "$daemon_json" \
            | sudo tee "${daemon_json}.tmp" >/dev/null
          sudo mv "${daemon_json}.tmp" "$daemon_json"
        else
          echo '{"features": {"containerd-snapshotter": true}}' | sudo tee "$daemon_json" >/dev/null
        fi
        sudo systemctl restart docker
        # Fail fast if the store did not switch — otherwise the docker driver falls back to the
        # slow classic export and we would silently lose the speedup.
        docker info -f '{{ .DriverStatus }}' | grep -q 'io.containerd.snapshotter.v1'

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Set toolchain registry
      shell: bash
      run: |
        echo "TOOLCHAIN_REGISTRY=$(echo "ghcr.io/${{ github.repository }}/toolchain" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
        echo "NOOK_ENV=ci" >> $GITHUB_ENV
