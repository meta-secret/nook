name: Nook Docker setup
description: Pull GHCR toolchain image, Buildx login, and build linux/amd64 image.

inputs:
  github-token:
    description: Token with packages:read/write for GHCR login and build cache.
    required: true

runs:
  using: composite
  steps:
    - name: Setup Task
      uses: go-task/setup-task@v2

    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github-token }}

    - name: Set toolchain registry
      shell: bash
      run: |
        echo "TOOLCHAIN_REGISTRY=$(echo "ghcr.io/${{ github.repository }}/toolchain" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

    - name: Build toolchain image
      shell: bash
      run: task setup
      env:
        TOOLCHAIN_REGISTRY: ${{ env.TOOLCHAIN_REGISTRY }}
