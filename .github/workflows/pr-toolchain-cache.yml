# Best-effort GHCR :buildcache publish after PR verify. Triggered asynchronously from pr.yml so
# preview deploy is not blocked and the PR check completes when deploy finishes.
# Not required for merge — failures are non-blocking for the PR gate.

name: PR toolchain cache

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number (concurrency grouping)
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: pr-cache-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish toolchain buildcache
    runs-on: nook
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish toolchain buildcache
        run: task docker:push:cache:ci
        env:
          CI: true
          TOOLCHAIN_REGISTRY: ${{ env.TOOLCHAIN_REGISTRY }}
