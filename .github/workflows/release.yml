# Deploy an immutable semantic-version tag to the stable production site.

name: Release production

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release (for example 1.2.0 or v1.2.0-rc.1)"
        required: true
        type: string
      ref:
        description: "Branch, tag, or commit to release"
        required: true
        default: main
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: production-release
  # Production publication is stateful; serialize releases without interrupting one mid-deploy.
  cancel-in-progress: false

env:
  DOCKER_IMAGE: nook-web:run-${{ github.run_id }}-${{ github.run_attempt }}
  DOCKER_E2E_IMAGE: nook-web-e2e:run-${{ github.run_id }}-${{ github.run_attempt }}
  CI_RELEASE_URL: https://nokey.sh
  CI_RELEASE_VITE_BASE: /
  CI_RELEASE_VITE_VAULT_SYNC_INTERVAL_MS: "500"

jobs:
  deploy:
    name: Verify and deploy production
    # Release restores the main-seeded BuildKit cache on elastic GitHub-hosted capacity.
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Load the local composite action from the workflow ref before a manual release replaces the
      # workspace with an older source ref that may still contain the retired daemon-restart setup.
      - name: Checkout release workflow tooling
        uses: actions/checkout@v7

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup

      - name: Checkout release source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
          fetch-depth: 0

      - name: Resolve and validate release
        id: release
        shell: bash
        env:
          REQUESTED_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          RELEASE_EVENT: ${{ github.event_name }}
          SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
        run: |
          set -euo pipefail

          version="${REQUESTED_VERSION#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?(\+[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "Expected a semantic version such as 1.2.0 or 1.2.0-rc.1; received: $REQUESTED_VERSION" >&2
            exit 1
          fi

          tag="v$version"
          sha="$(git rev-parse HEAD)"
          git fetch --force --tags origin

          tag_exists=false
          if git show-ref --verify --quiet "refs/tags/$tag"; then
            tagged_sha="$(git rev-parse "refs/tags/$tag^{commit}")"
            if [[ "$tagged_sha" != "$sha" ]]; then
              echo "$tag already points to $tagged_sha and cannot be moved to $sha" >&2
              exit 1
            fi
            tag_exists=true
          elif [[ "$RELEASE_EVENT" != "workflow_dispatch" ]]; then
            echo "Tag-triggered release could not resolve refs/tags/$tag" >&2
            exit 1
          fi

          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "sha=$sha"
            echo "prerelease=$prerelease"
            echo "tag_exists=$tag_exists"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Production release"
            echo
            echo "- Version: \`$version\`"
            echo "- Tag: \`$tag\`"
            echo "- Commit: \`$sha\`"
            echo "- Source: \`$SOURCE_REF\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Preflight, check, build once, and e2e
        run: >-
          task ci:main
          VITE_BASE=${{ env.CI_RELEASE_VITE_BASE }}
          VITE_SITE_URL=${{ env.CI_RELEASE_URL }}
          VITE_PUBLIC_APP_URL=${{ env.CI_RELEASE_URL }}
          VITE_SIMPLE_APP_URL=https://simple.nokey.sh
          VITE_SENTINEL_APP_URL=https://sentinel.nokey.sh
          VITE_VAULT_SYNC_INTERVAL_MS=${{ env.CI_RELEASE_VITE_VAULT_SYNC_INTERVAL_MS }}
          WASM_BUILD_MODE=prod
        env:
          CI: true
          GIT_COMMIT_ID: ${{ steps.release.outputs.sha }}
          NOOK_SIMPLE_VAULT_URL: https://simple.nokey.sh/
          NOOK_EXTENSION_CHANNEL: production
          NOOK_EXTENSION_VERSION: ${{ steps.release.outputs.version }}
          NOOK_EXTENSION_COMMIT: ${{ steps.release.outputs.sha }}
          NOOK_EXTENSION_SITE_URL: https://nokey.sh/

      - name: Create immutable release tag
        if: steps.release.outputs.tag_exists != 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "$RELEASE_TAG" "$RELEASE_SHA" --message "Nook $RELEASE_TAG"
          git push origin "refs/tags/$RELEASE_TAG"

      - name: Extract dist from nook-web image
        run: task docker:extract:dist

      - name: Add release metadata
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
        run: |
          metadata="$(jq --null-input \
            --arg version "$RELEASE_VERSION" \
            --arg tag "$RELEASE_TAG" \
            --arg commit "$RELEASE_SHA" \
            --arg released_at "$(date --utc +%Y-%m-%dT%H:%M:%SZ)" \
            '{version: $version, tag: $tag, commit: $commit, released_at: $released_at}')"
          printf '%s\n' "$metadata" > nook-app/nook-web/nook-web-app/dist/site/release.json
          printf '%s\n' "$metadata" > nook-app/nook-web/nook-vault-simple/dist/release.json
          printf '%s\n' "$metadata" > nook-app/nook-web/nook-vault-sentinel/dist/release.json

      - name: Deploy isolated Simple and Sentinel applications
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # The delivery runner guarantees Docker, not a pinned host Node/npm. Use the Node
          # image already consumed by the web build so release deployment has an explicit CLI
          # runtime without adding npm or Wrangler to every PR image.
          docker run --rm \
            --env CLOUDFLARE_API_TOKEN \
            --env CLOUDFLARE_ACCOUNT_ID \
            --env HOME=/tmp \
            --user "$(id -u):$(id -g)" \
            --volume "$PWD:/workspace" \
            --workdir /workspace \
            node:24-trixie-slim \
            sh -euc '
              for spec in "simple:nokey-simple" "sentinel:nokey-sentinel"; do
                artifact="${spec%%:*}"
                project="${spec#*:}"
                dist_dir="nook-app/nook-web/nook-vault-$artifact/dist"
                npx --yes wrangler@4 pages project create "$project" --production-branch=main >/dev/null 2>&1 || true
                npx --yes wrangler@4 pages deploy \
                  "$dist_dir" \
                  --project-name="$project" \
                  --branch=main \
                  --commit-dirty=true
              done
            '

      - name: Attach and verify isolated production domains
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          api() {
            curl -fsS \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              "$@"
          }
          api_json() {
            response="$(api "$@")"
            printf '%s' "$response" | jq -e '.success == true' >/dev/null
            printf '%s' "$response"
          }
          zone_id="$(api_json 'https://api.cloudflare.com/client/v4/zones?name=nokey.sh' | jq -er '.result[0].id')"
          for spec in "simple.nokey.sh:nokey-simple" "sentinel.nokey.sh:nokey-sentinel"; do
            domain="${spec%%:*}"
            project="${spec#*:}"
            app_kind="${domain%%.*}"
            pages_host="$project.pages.dev"
            domains="$(api_json "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$project/domains")"
            if [ "$(printf '%s' "$domains" | jq -r --arg domain "$domain" '[.result[]? | select(.name == $domain)] | length')" = 0 ]; then
              api_json -X POST \
                --data "$(jq -nc --arg name "$domain" '{name: $name}')" \
                "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$project/domains" >/dev/null
            fi
            records="$(api_json "https://api.cloudflare.com/client/v4/zones/$zone_id/dns_records?name=$domain")"
            record_id="$(printf '%s' "$records" | jq -r '.result[0].id // empty')"
            payload="$(jq -nc --arg name "$domain" --arg content "$pages_host" '{type:"CNAME",name:$name,content:$content,ttl:1,proxied:true}')"
            if [ -z "$record_id" ]; then
              api_json -X POST --data "$payload" "https://api.cloudflare.com/client/v4/zones/$zone_id/dns_records" >/dev/null
            elif [ "$(printf '%s' "$records" | jq -r --arg content "$pages_host" '.result[0].type == "CNAME" and .result[0].content == $content and .result[0].proxied == true')" != true ]; then
              api_json -X PUT --data "$payload" "https://api.cloudflare.com/client/v4/zones/$zone_id/dns_records/$record_id" >/dev/null
            fi
            verified=false
            for attempt in $(seq 1 30); do
              headers="$(mktemp)"
              body="$(mktemp)"
              if curl -fsSL -D "$headers" -o "$body" "https://$domain/" &&
                grep -Fq "name=\"nook-app-kind\" content=\"$app_kind\"" "$body" &&
                grep -Fiq 'content-security-policy:' "$headers" &&
                grep -Fiq 'x-content-type-options: nosniff' "$headers"; then
                release_commit="$(curl -fsSL "https://$domain/release.json" | jq -er '.commit')"
                if [ "$release_commit" = "${{ steps.release.outputs.sha }}" ]; then
                  verified=true
                  rm -f "$headers" "$body"
                  break
                fi
              fi
              rm -f "$headers" "$body"
              sleep 10
            done
            if [ "$verified" != true ]; then
              echo "$domain did not serve the expected $app_kind artifact, security headers, and release commit" >&2
              exit 1
            fi
            extension_status="$(curl -sS -o /dev/null -w '%{http_code}' "https://$domain/extension-connect")"
            if [ "$app_kind" = simple ] && [ "$extension_status" != 200 ]; then
              echo "Simple Vault extension route returned HTTP $extension_status" >&2
              exit 1
            fi
            if [ "$app_kind" = sentinel ] && [ "$extension_status" != 404 ]; then
              echo "Sentinel Vault extension route must return HTTP 404, received $extension_status" >&2
              exit 1
            fi
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: nook-app/nook-web/nook-web-app/dist/site

      - name: Deploy stable to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Verify production browser extension deployment
        env:
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
        run: |
          EXTENSION_METADATA_URL="https://nokey.sh/downloads/extension.json" \
          EXPECTED_EXTENSION_CHANNEL="production" \
          EXPECTED_EXTENSION_COMMIT="$RELEASE_SHA" \
          EXPECTED_EXTENSION_SITE_URL="https://nokey.sh/" \
          EXPECTED_SIMPLE_VAULT_URL="https://simple.nokey.sh/" \
          EXPECTED_SENTINEL_VAULT_URL="https://sentinel.nokey.sh/" \
            bash nook-app/nook-web/nook-web-extension/scripts/verify-deployment.sh

      - name: Publish GitHub Release
        uses: actions/github-script@v9
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_SHA: ${{ steps.release.outputs.sha }}
          IS_PRERELEASE: ${{ steps.release.outputs.prerelease }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('node:fs')
            const path = require('node:path')
            const crypto = require('node:crypto')
            const tag = process.env.RELEASE_TAG
            const sha = process.env.RELEASE_SHA
            const prerelease = process.env.IS_PRERELEASE === 'true'

            let release
            try {
              release = (await github.rest.repos.getReleaseByTag({ ...context.repo, tag })).data
              core.info(`GitHub Release ${tag} already exists; verifying immutable assets.`)
            } catch (error) {
              if (error.status !== 404) throw error
              // Fail instead of silently creating a release from a missing/movable tag.
              await github.rest.git.getRef({ ...context.repo, ref: `tags/${tag}` })
              release = (await github.rest.repos.createRelease({
                ...context.repo,
                tag_name: tag,
                target_commitish: sha,
                name: tag,
                generate_release_notes: true,
                prerelease,
                make_latest: prerelease ? 'false' : 'true',
              })).data
            }

            const downloads = path.join(
              process.cwd(),
              'nook-app/nook-web/nook-web-app/dist/site/downloads',
            )
            const metadata = JSON.parse(
              fs.readFileSync(path.join(downloads, 'extension.json'), 'utf8'),
            )
            const assetPaths = [
              path.join(downloads, metadata.archive),
              path.join(downloads, 'extension.json'),
              path.join(downloads, `${metadata.archive}.sha256`),
            ]
            const assets = (await github.rest.repos.listReleaseAssets({
              ...context.repo,
              release_id: release.id,
              per_page: 100,
            })).data

            for (const assetPath of assetPaths) {
              const name = path.basename(assetPath)
              const data = fs.readFileSync(assetPath)
              const digest = crypto.createHash('sha256').update(data).digest('hex')
              const existing = assets.find((asset) => asset.name === name)
              if (existing) {
                const response = await github.request(
                  'GET /repos/{owner}/{repo}/releases/assets/{asset_id}',
                  {
                    ...context.repo,
                    asset_id: existing.id,
                    headers: { accept: 'application/octet-stream' },
                  },
                )
                const existingDigest = crypto
                  .createHash('sha256')
                  .update(Buffer.from(response.data))
                  .digest('hex')
                if (existingDigest !== digest) {
                  throw new Error(`Immutable release asset ${name} differs from the tested build.`)
                }
                core.info(`Verified existing release asset ${name}.`)
                continue
              }
              await github.rest.repos.uploadReleaseAsset({
                ...context.repo,
                release_id: release.id,
                name,
                data,
                headers: {
                  'content-type': name.endsWith('.zip')
                    ? 'application/zip'
                    : name.endsWith('.json')
                      ? 'application/json'
                      : 'text/plain',
                  'content-length': data.length,
                },
              })
              core.info(`Uploaded release asset ${name}.`)
            }
