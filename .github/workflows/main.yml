# Main branch: prepare once, then verify ‖ web build ‖ e2e in parallel (task ci:main:publish); deploy Pages.
#
# E2e on main uses the unified stub `e2e` project (no GitHub API). Live sync provider
# tests run nightly — see e2e-nightly.yml.
#
# On CI failure: ci-agent fixes and pushes a branch; this workflow opens the PR and squash-merges.
# Requires repository secret CURSOR_API_KEY — see job ci-fix comments.
#
# Playwright browsers are pre-installed in the toolchain image.

name: Main

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: main
  cancel-in-progress: true

env:
  CI_MAIN_VITE_BASE: /
  CI_MAIN_VITE_VAULT_SYNC_INTERVAL_MS: "1000"
  CI_MAIN_GITHUB_POLL_MS: "3000"
  CI_MAIN_GITHUB_SYNC_TIMEOUT_MS: "15000"
  CI_MAIN_GITHUB_CONNECT_TIMEOUT_MS: "30000"

jobs:
  ci:
    name: Check, build, and e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare (format + wasm)
        run: task ci:main:prepare VITE_BASE=${{ env.CI_MAIN_VITE_BASE }}

      - name: Verify and build
        run: task ci:main:parallel VITE_BASE=${{ env.CI_MAIN_VITE_BASE }}
        env:
          CI: true

      - name: E2e (stub)
        run: |
          cp -a nook-web/dist nook-web/dist-prod
          task ci:main:e2e VITE_BASE=${{ env.CI_MAIN_VITE_BASE }} VITE_VAULT_SYNC_INTERVAL_MS=${{ env.CI_MAIN_VITE_VAULT_SYNC_INTERVAL_MS }}
          task web:e2e:restore-prod-dist
        env:
          CI: true

      - name: Push toolchain image
        run: task docker:push:ci
        env:
          PUSH_TOOLCHAIN: "1"
          TOOLCHAIN_REGISTRY: ${{ env.TOOLCHAIN_REGISTRY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: nook-web/dist

  ci-fix:
    name: AI fix, PR, and merge
    needs: ci
    if: failure() && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      packages: write
    env:
      GH_TOKEN: ${{ github.token }}
      FIX_BRANCH: fix/ci-${{ github.run_id }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_RUN_ID: ${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set git committer for agent commits
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Find existing fix PR
        id: find_pr
        run: |
          number="$(gh pr list --head "$FIX_BRANCH" --state open --json number -q '.[0].number' || true)"
          echo "number=${number}" >> "$GITHUB_OUTPUT"

      - name: Run ci-agent
        if: steps.find_pr.outputs.number == ''
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          REPO_ROOT: ${{ github.workspace }}
          VITE_BASE: ${{ env.CI_MAIN_VITE_BASE }}
          VITE_VAULT_SYNC_INTERVAL_MS: ${{ env.CI_MAIN_VITE_VAULT_SYNC_INTERVAL_MS }}
          NOOK_GITHUB_PAT: ${{ secrets.NOOK_GITHUB_PAT }}
          NOOK_GITHUB_E2E_REPO: nook-e2e-github-${{ github.run_id }}-fix
          NOOK_GITHUB_POLL_MS: ${{ env.CI_MAIN_GITHUB_POLL_MS }}
          NOOK_GITHUB_SYNC_TIMEOUT_MS: ${{ env.CI_MAIN_GITHUB_SYNC_TIMEOUT_MS }}
          NOOK_GITHUB_CONNECT_TIMEOUT_MS: ${{ env.CI_MAIN_GITHUB_CONNECT_TIMEOUT_MS }}
        run: |
          if [ -z "${CURSOR_API_KEY:-}" ]; then
            echo "::warning::CURSOR_API_KEY is not set — skipping AI CI fix job."
            echo "Add repository secret CURSOR_API_KEY (Cursor Dashboard → Integrations → User API Keys)."
            exit 0
          fi
          task ci-agent:run

      - name: Create fix PR
        if: steps.find_pr.outputs.number == ''
        id: create_pr
        run: |
          if ! git ls-remote --exit-code --heads origin "$FIX_BRANCH" >/dev/null 2>&1; then
            echo "::warning::Fix branch ${FIX_BRANCH} was not pushed — skipping PR creation."
            exit 0
          fi
          if [ -z "$(gh pr list --head "$FIX_BRANCH" --state open --json number -q '.[0].number' || true)" ]; then
            gh pr create \
              --base main \
              --head "$FIX_BRANCH" \
              --title "Fix main CI (run ${GITHUB_RUN_ID})" \
              --body "$(cat <<EOF
          ## Summary
          Auto-fix for failed main CI run ${GITHUB_RUN_ID}.

          ## Test plan
          - [ ] CI green on this PR
          EOF
          )"
          fi
          number="$(gh pr list --head "$FIX_BRANCH" --state open --json number -q '.[0].number')"
          echo "number=${number}" >> "$GITHUB_OUTPUT"

      - name: Resolve PR number
        id: pr
        run: |
          if [ -n "${{ steps.find_pr.outputs.number }}" ]; then
            echo "number=${{ steps.find_pr.outputs.number }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ steps.create_pr.outputs.number }}" ]; then
            echo "number=${{ steps.create_pr.outputs.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for PR checks
        if: steps.pr.outputs.number != ''
        run: gh pr checks "${{ steps.pr.outputs.number }}" --watch --fail-fast

      - name: Squash merge fix PR
        if: steps.pr.outputs.number != ''
        run: gh pr merge "${{ steps.pr.outputs.number }}" --squash --delete-branch

  deploy:
    name: Deploy GitHub Pages
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
