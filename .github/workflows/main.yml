# Main branch: one container for format/wasm/verify/build/e2e (task ci:main);
# deploy the fast, unoptimized development channel to Cloudflare Pages. Immutable releases remain
# responsible for production wasm optimization.
# Research-only changes are handled by web-research.yml. Cortex, Cursor, and
# agentic-AI-only changes do not need the product pipeline.
#
# E2e on main uses the unified stub `e2e` project (no GitHub API). Live sync provider
# tests run nightly — see e2e-nightly.yml.
#
# Playwright browsers are pre-installed in the web base image.

name: Main

on:
  push:
    branches: [main]
    paths-ignore:
      - .cortex/**
      - .cursor/**
      - .github/workflows/web-research.yml
      - agentic-ai/**
      - nook-app/nook-web/nook-web-research/**

permissions:
  contents: read

concurrency:
  group: main
  cancel-in-progress: true

env:
  CI_MAIN_DEV_DOMAIN: dev.nokey.sh
  CI_MAIN_DEV_URL: https://dev.nokey.sh
  CI_MAIN_CF_PAGES_PROJECT: nokey-sh
  CI_MAIN_VITE_BASE: /
  CI_MAIN_VITE_VAULT_SYNC_INTERVAL_MS: "500"

jobs:
  ci:
    name: Check, build, e2e, and deploy dev
    # Keep the multi-GB Rust target and browser layers on the persistent delivery runner instead of
    # downloading them into a fresh GitHub-hosted VM after every merge.
    runs-on: nook
    environment:
      name: development
      url: https://dev.nokey.sh/
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup

      - name: Preflight, check, build, and e2e
        run: task ci:main VITE_BASE=${{ env.CI_MAIN_VITE_BASE }} WASM_BUILD_MODE=dev
        env:
          CI: true
          GIT_COMMIT_ID: ${{ github.sha }}

      - name: Deploy development to Cloudflare Pages
        id: deploy-dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
          CF_PAGES_BRANCH: main
          CF_PAGES_DIST_DIR: nook-app/nook-web/nook-web-app/dist/site
          CF_PAGES_PROJECT_NAME: ${{ env.CI_MAIN_CF_PAGES_PROJECT }}
          CF_PAGES_PRODUCTION_BRANCH: main
        run: |
          # ci:main prepared the sealed image; deploy it without a second setup/bake.
          set +e
          out="$(task ci:cloudflare:deploy VITE_BASE=${{ env.CI_MAIN_VITE_BASE }} VITE_VAULT_SYNC_INTERVAL_MS=${{ env.CI_MAIN_VITE_VAULT_SYNC_INTERVAL_MS }} WASM_BUILD_MODE=dev 2>&1)"
          status=$?
          set -e
          echo "$out"
          if [ "$status" -ne 0 ]; then
            echo "::error::Cloudflare development deploy failed (exit $status)"
            exit "$status"
          fi
          clean="$(printf '%s' "$out" | sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g')"
          url="$(printf '%s' "$clean" | grep -oE 'NOOK_PREVIEW_URL=https://[^ ]+' | sed 's/NOOK_PREVIEW_URL=//' | tail -1)"
          if [ -z "$url" ]; then
            echo "::error::Cloudflare development deploy succeeded but did not emit deploy URL"
            exit 1
          fi
          echo "pages_url=$url" >> "$GITHUB_OUTPUT"

      - name: Verify dev.nokey.sh on Cloudflare Pages
        id: configure-dev-domain
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
          CF_PAGES_PROJECT_NAME: ${{ env.CI_MAIN_CF_PAGES_PROJECT }}
          DEV_DOMAIN: ${{ env.CI_MAIN_DEV_DOMAIN }}
          PAGES_URL: ${{ steps.deploy-dev.outputs.pages_url }}
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$DEV_DOMAIN"
          test -n "$PAGES_URL"

          api() {
            curl -fsS \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              "$@"
          }
          api_json() {
            response="$(api "$@")"
            if ! printf '%s' "$response" | jq -e '.success == true' >/dev/null; then
              printf '%s\n' "$response" | jq -r '.errors[]? | "Cloudflare API error: \(.code) \(.message)"' >&2 || true
              printf '%s\n' "$response" >&2
              return 1
            fi
            printf '%s' "$response"
          }

          pages_host="$(
            node -e 'const host = new URL(process.argv[1]).hostname.split("."); if (host.length > 3) host.shift(); console.log(host.join("."));' "$PAGES_URL"
          )"
          zone_name="${DEV_DOMAIN#*.}"
          echo "Cloudflare Pages host: $pages_host"
          echo "Cloudflare zone: $zone_name"

          domain_json="$(api_json "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CF_PAGES_PROJECT_NAME/domains")"
          domain_exists="$(printf '%s' "$domain_json" | jq -r --arg name "$DEV_DOMAIN" '[.result[]? | select(.name == $name)] | length')"
          if [ "$domain_exists" = "0" ]; then
            api_json -X POST \
              --data "$(jq -nc --arg name "$DEV_DOMAIN" '{name: $name}')" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CF_PAGES_PROJECT_NAME/domains" >/dev/null
          fi

          zone_id="$(
            api_json "https://api.cloudflare.com/client/v4/zones?name=$zone_name" \
              | jq -er '.result[0].id'
          )"
          records_json="$(
            api_json "https://api.cloudflare.com/client/v4/zones/$zone_id/dns_records?name=$DEV_DOMAIN"
          )"
          record_ok="$(
            printf '%s' "$records_json" \
              | jq -r --arg content "$pages_host" '[.result[]? | select(.type == "CNAME" and .content == $content)] | length'
          )"
          if [ "$record_ok" = "0" ]; then
            echo "::error::Missing Cloudflare DNS record: create proxied CNAME $DEV_DOMAIN -> $pages_host"
            exit 1
          fi

          root_body="$(mktemp)"
          trap 'rm -f "$root_body"' EXIT
          verified=false
          for attempt in $(seq 1 30); do
            root_status="$(curl -sS -o "$root_body" -w '%{http_code}' "https://$DEV_DOMAIN/" || true)"
            site_status="$(curl -sS -o /dev/null -w '%{http_code}' "https://$DEV_DOMAIN/site/" || true)"
            if [ "$root_status" = "200" ] \
              && grep -Fq '<title>Nook — Keys, not accounts</title>' "$root_body" \
              && [ "$site_status" = "404" ]; then
              verified=true
              break
            fi
            echo "Waiting for landing-only deployment (attempt $attempt/30; root=$root_status, /site/=$site_status)"
            sleep 10
          done
          if [ "$verified" != true ]; then
            echo "::error::dev.nokey.sh must serve the landing page at / and return 404 for /site/"
            exit 1
          fi
          echo "dev_url=https://$DEV_DOMAIN/" >> "$GITHUB_OUTPUT"

      - name: Record development deployment
        uses: actions/github-script@v9
        env:
          DEV_URL: ${{ steps.configure-dev-domain.outputs.dev_url }}
          PAGES_URL: ${{ steps.deploy-dev.outputs.pages_url }}
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'development',
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: false,
              description: 'Development channel',
              payload: {
                dev_url: process.env.DEV_URL,
                pages_url: process.env.PAGES_URL,
              },
            })

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment: 'development',
              environment_url: process.env.DEV_URL,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Development channel deployed to Cloudflare Pages',
              auto_inactive: false,
            })

      - name: Export commit-keyed nook-core/auth coverage
        run: |
          set -euo pipefail
          task docker:extract:coverage COVERAGE_OUT_DIR=coverage/main
          jq -n \
            --arg commit_sha "$GITHUB_SHA" \
            '{schema_version: 1, commit_sha: $commit_sha}' \
            > coverage/main/manifest.json

      - name: Upload commit-keyed nook-core/auth coverage
        uses: actions/upload-artifact@v7
        with:
          name: nook-core-auth-coverage-${{ github.sha }}
          path: coverage/main
          retention-days: 90
          if-no-files-found: error
