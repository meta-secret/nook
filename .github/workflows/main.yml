# Main branch: prepare once, then verify ‖ web build ‖ e2e in parallel (task ci:main:publish); deploy Pages.
#
# E2e on main uses local + sync-stub projects (no GitHub API). Live sync provider
# tests run nightly — see e2e-nightly.yml.

name: Main

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: main
  cancel-in-progress: true

jobs:
  ci:
    name: Check, build, and e2e
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare (format + wasm)
        run: task ci:main:prepare VITE_BASE=/

      - name: Verify and build
        run: task ci:main:parallel VITE_BASE=/
        env:
          CI: true

      - name: E2e (local ‖ sync-stub)
        run: |
          cp -a nook-web/dist nook-web/dist-prod
          task ci:main:e2e:parallel VITE_BASE=/ VITE_VAULT_SYNC_INTERVAL_MS=1000
          task web:e2e:restore-prod-dist
        env:
          CI: true

      - name: Push toolchain image
        run: task docker:push:ci
        env:
          PUSH_TOOLCHAIN: "1"
          TOOLCHAIN_REGISTRY: ${{ env.TOOLCHAIN_REGISTRY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: nook-web/dist

  deploy:
    name: Deploy GitHub Pages
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
