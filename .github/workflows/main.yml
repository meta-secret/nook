# Main branch: one container for format/wasm/verify/build/e2e (task ci:main);
# deploy the fast, unoptimized development channel to Cloudflare Pages. Immutable releases remain
# responsible for production wasm optimization.
# Research-only changes are handled by web-research.yml. Cortex, Cursor, and
# agentic-AI-only and statistics-only changes do not need the product pipeline. A trusted
# workflow_run collector records this workflow only after each attempt completes.
#
# E2e on main uses the unified stub `e2e` project (no GitHub API). Live sync provider
# tests run nightly — see e2e-nightly.yml.
#
# Playwright browsers are pre-installed in the web base image.

name: Main

on:
  push:
    branches: [main]
    paths-ignore:
      - .cortex/**
      - .cursor/**
      - .stats/**
      - .github/workflows/web-research.yml
      - agentic-ai/**
      - nook-app/nook-web/nook-web-research/**

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: main
  cancel-in-progress: true

env:
  DOCKER_IMAGE: nook-web:run-${{ github.run_id }}-${{ github.run_attempt }}
  DOCKER_E2E_IMAGE: nook-web-e2e:run-${{ github.run_id }}-${{ github.run_attempt }}
  CI_MAIN_DEV_DOMAIN: dev.nokey.sh
  CI_MAIN_DEV_URL: https://dev.nokey.sh
  CI_MAIN_SIMPLE_DOMAIN: simple.dev.nokey.sh
  CI_MAIN_SIMPLE_URL: https://simple.dev.nokey.sh
  CI_MAIN_SENTINEL_DOMAIN: sentinel.dev.nokey.sh
  CI_MAIN_SENTINEL_URL: https://sentinel.dev.nokey.sh
  CI_MAIN_VITE_BASE: /
  CI_MAIN_VITE_VAULT_SYNC_INTERVAL_MS: "500"
  LINEAR_UI_DEMO_LABEL_ID: 3d5eaced-687d-4d93-a046-92f5008f584d
  LINEAR_UI_DEMO_PROJECT_ID: 07e407b4-3dca-4caa-8c1f-479b6b065503
  LINEAR_UI_DEMO_TEAM_ID: fb81b5b7-ce24-447e-8673-63ec37c64983

jobs:
  ci:
    name: Check, build, e2e, and deploy dev
    # Main refreshes the default-branch GHA cache that new PRs are allowed to restore.
    runs-on: ubuntu-latest
    environment:
      name: development
      url: https://dev.nokey.sh/
    permissions:
      contents: read
      deployments: write
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          cache-redis-password: ${{ secrets.NOOK_CACHE_REDIS_PASSWORD }}
          cache-cloudflare-client-id: ${{ secrets.NOOK_CLOUDFLARE_ACCESS_CLIENT_ID }}
          cache-cloudflare-client-secret: ${{ secrets.NOOK_CLOUDFLARE_ACCESS_CLIENT_SECRET }}

      - name: Preflight, check, build, and e2e
        run: >-
          task ci:main
          VITE_BASE=${{ env.CI_MAIN_VITE_BASE }}
          VITE_SITE_URL=${{ env.CI_MAIN_DEV_URL }}
          VITE_PUBLIC_APP_URL=${{ env.CI_MAIN_DEV_URL }}
          VITE_SIMPLE_APP_URL=${{ env.CI_MAIN_SIMPLE_URL }}
          VITE_SENTINEL_APP_URL=${{ env.CI_MAIN_SENTINEL_URL }}
          WASM_BUILD_MODE=dev
        env:
          CI: true
          GIT_COMMIT_ID: ${{ github.sha }}
          NOOK_SIMPLE_VAULT_URL: ${{ env.CI_MAIN_SIMPLE_URL }}/
          NOOK_EXTENSION_CHANNEL: development
          NOOK_EXTENSION_COMMIT: ${{ github.sha }}
          NOOK_EXTENSION_SITE_URL: ${{ env.CI_MAIN_DEV_URL }}/

      - name: Record all headless UI demos
        id: record-ui-demo
        env:
          UI_DEMO_OUTPUT_DIR: ${{ runner.temp }}/nook-ui-demo
        run: task ui:demo:ci UI_DEMO_OUTPUT_DIR="$UI_DEMO_OUTPUT_DIR"

      - name: Upload complete Main UI demo artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-demo-main-${{ github.sha }}
          path: ${{ runner.temp }}/nook-ui-demo
          retention-days: 90
          if-no-files-found: warn
          overwrite: true

      - name: Publish largest Main UI demos to the merged PR issue
        if: steps.record-ui-demo.outcome == 'success'
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          UI_DEMO_OUTPUT_DIR: ${{ runner.temp }}/nook-ui-demo
        with:
          retries: 3
          script: |
            if (!process.env.LINEAR_API_KEY) {
              core.warning('LINEAR_API_KEY is unavailable; keeping the GitHub Actions artifact only')
              return
            }

            const pulls = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              ...context.repo,
              commit_sha: context.sha,
            })
            const pullRequest =
              pulls.data.find((candidate) => candidate.merge_commit_sha === context.sha) ??
              pulls.data.find((candidate) => candidate.merged_at)
            if (!pullRequest) {
              core.warning('No merged pull request is associated with this Main commit')
              return
            }

            const { syncUiDemoIssue, transitionUiDemoIssue } = require(
              `${process.env.GITHUB_WORKSPACE}/.github/scripts/linear-ui-demo.cjs`,
            )
            const config = {
              labelId: process.env.LINEAR_UI_DEMO_LABEL_ID,
              projectId: process.env.LINEAR_UI_DEMO_PROJECT_ID,
              repository: `${context.repo.owner}/${context.repo.repo}`,
              teamId: process.env.LINEAR_UI_DEMO_TEAM_ID,
            }
            const issue = await syncUiDemoIssue({
              apiKey: process.env.LINEAR_API_KEY,
              config,
              demoDir: process.env.UI_DEMO_OUTPUT_DIR,
              maxVideos: 10,
              pullRequest: {
                headSha: context.sha,
                number: pullRequest.number,
                runUrl: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                specs: 'all UI demo specs on Main',
                title: pullRequest.title,
                url: pullRequest.html_url,
              },
            })
            await transitionUiDemoIssue({
              apiKey: process.env.LINEAR_API_KEY,
              config,
              merged: true,
              prNumber: pullRequest.number,
            })
            core.info(`Published Main UI demos to ${issue.identifier}: ${issue.url}`)

      - name: Deploy isolated development applications to Cloudflare Pages
        id: deploy-dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          deploy() {
            project="$1"
            branch="$2"
            dist="$3"
            output="$4"
            label="$5"
            set +e
            out="$(CF_PAGES_PROJECT_NAME="$project" CF_PAGES_PRODUCTION_BRANCH=main CF_PAGES_BRANCH="$branch" CF_PAGES_DIST_DIR="$dist" task ci:cloudflare:deploy VITE_BASE=${{ env.CI_MAIN_VITE_BASE }} VITE_VAULT_SYNC_INTERVAL_MS=${{ env.CI_MAIN_VITE_VAULT_SYNC_INTERVAL_MS }} WASM_BUILD_MODE=dev 2>&1)"
            status=$?
            set -e
            echo "$out"
            if [ "$status" -ne 0 ]; then
              echo "::error::$label development deploy failed (exit $status)"
              exit "$status"
            fi
            clean="$(printf '%s' "$out" | sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g')"
            url="$(printf '%s' "$clean" | grep -oE 'NOOK_PREVIEW_URL=https://[^ ]+' | sed 's/NOOK_PREVIEW_URL=//' | tail -1)"
            if [ -z "$url" ]; then
              echo "::error::$label development deploy did not emit a URL"
              exit 1
            fi
            echo "$output=$url" >> "$GITHUB_OUTPUT"
          }

          # Every development surface uses the stable non-production branch alias so
          # the main-channel build cannot replace the public production deployment.
          deploy nokey-sh development nook-app/nook-web/nook-web-app/dist/site site_pages_url Site
          deploy nokey-simple development nook-app/nook-web/nook-vault-simple/dist simple_pages_url Simple
          deploy nokey-sentinel development nook-app/nook-web/nook-vault-sentinel/dist sentinel_pages_url Sentinel

      - name: Configure and verify isolated development domains
        id: configure-dev-domain
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
          DEV_DOMAIN: ${{ env.CI_MAIN_DEV_DOMAIN }}
          SIMPLE_DOMAIN: ${{ env.CI_MAIN_SIMPLE_DOMAIN }}
          SENTINEL_DOMAIN: ${{ env.CI_MAIN_SENTINEL_DOMAIN }}
          SITE_PAGES_URL: ${{ steps.deploy-dev.outputs.site_pages_url }}
          SIMPLE_PAGES_URL: ${{ steps.deploy-dev.outputs.simple_pages_url }}
          SENTINEL_PAGES_URL: ${{ steps.deploy-dev.outputs.sentinel_pages_url }}
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$DEV_DOMAIN"
          test -n "$SIMPLE_DOMAIN"
          test -n "$SENTINEL_DOMAIN"
          test -n "$SITE_PAGES_URL"
          test -n "$SIMPLE_PAGES_URL"
          test -n "$SENTINEL_PAGES_URL"

          api() {
            curl -sS \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              "$@"
          }
          api_json() {
            response="$(api "$@")"
            if ! printf '%s' "$response" | jq -e '.success == true' >/dev/null; then
              printf '%s\n' "$response" | jq -r '.errors[]? | "Cloudflare API error: \(.code) \(.message)"' >&2 || true
              printf '%s\n' "$response" >&2
              return 1
            fi
            printf '%s' "$response"
          }

          site_pages_host="development.nokey-sh.pages.dev"
          simple_pages_host="development.nokey-simple.pages.dev"
          sentinel_pages_host="development.nokey-sentinel.pages.dev"
          zone_name="nokey.sh"
          zone_id=""

          attach_domain() {
            project="$1"
            domain="$2"
            domains="$(api_json "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$project/domains")" || return 1
            exists="$(printf '%s' "$domains" | jq -r --arg name "$domain" '[.result[]? | select(.name == $name)] | length')"
            if [ "$exists" = "0" ]; then
              api_json -X POST \
                --data "$(jq -nc --arg name "$domain" '{name: $name}')" \
                "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$project/domains" >/dev/null || return 1
            fi
          }

          ensure_cname() {
            domain="$1"
            target="$2"
            records="$(api_json "https://api.cloudflare.com/client/v4/zones/$zone_id/dns_records?name=$domain")" || return 1
            record_id="$(printf '%s' "$records" | jq -r '.result[0].id // empty')"
            body="$(jq -nc --arg name "$domain" --arg content "$target" '{type: "CNAME", name: $name, content: $content, ttl: 1, proxied: true}')"
            if [ -n "$record_id" ]; then
              current_ok="$(printf '%s' "$records" | jq -r --arg content "$target" '.result[0] | .type == "CNAME" and .content == $content and .proxied == true')"
              if [ "$current_ok" != true ]; then
                api_json -X PUT --data "$body" "https://api.cloudflare.com/client/v4/zones/$zone_id/dns_records/$record_id" >/dev/null || return 1
              fi
            else
              api_json -X POST --data "$body" "https://api.cloudflare.com/client/v4/zones/$zone_id/dns_records" >/dev/null || return 1
            fi
          }

          # Reconcile established custom-domain infrastructure when the deployment token also has
          # zone permissions. Live boundary verification below remains authoritative for the
          # least-privilege Pages token used by CI.
          zone_response=""
          if zone_response="$(api_json "https://api.cloudflare.com/client/v4/zones?name=$zone_name")" \
            && zone_id="$(printf '%s' "$zone_response" | jq -er '.result[0].id')"; then
            if ! attach_domain nokey-sh "$DEV_DOMAIN" \
              || ! attach_domain nokey-simple "$SIMPLE_DOMAIN" \
              || ! attach_domain nokey-sentinel "$SENTINEL_DOMAIN" \
              || ! ensure_cname "$DEV_DOMAIN" "$site_pages_host" \
              || ! ensure_cname "$SIMPLE_DOMAIN" "$simple_pages_host" \
              || ! ensure_cname "$SENTINEL_DOMAIN" "$sentinel_pages_host"; then
              echo "::warning::Cloudflare custom-domain reconciliation was unavailable; verifying live domains"
              zone_id=""
            fi
          else
            echo "::warning::Cloudflare zone administration was unavailable; verifying live domains"
          fi

          purge_body="$(
            jq -nc \
              --arg root "https://$DEV_DOMAIN/" \
              --arg site "https://$DEV_DOMAIN/site/" \
              --arg simple "https://$DEV_DOMAIN/simple/" \
              --arg sentinel "https://$DEV_DOMAIN/sentinel/" \
              --arg app "https://$DEV_DOMAIN/app/" \
              --arg extension "https://$DEV_DOMAIN/extension-connect.html" \
              --arg simple_root "https://$SIMPLE_DOMAIN/" \
              --arg simple_extension "https://$SIMPLE_DOMAIN/extension-connect" \
              --arg sentinel_root "https://$SENTINEL_DOMAIN/" \
              --arg sentinel_extension "https://$SENTINEL_DOMAIN/extension-connect" \
              '{files: [$root, $site, $simple, $sentinel, $app, $extension, $simple_root, $simple_extension, $sentinel_root, $sentinel_extension]}'
          )"

          root_body="$(mktemp)"
          headers="$(mktemp)"
          trap 'rm -f "$root_body" "$headers"' EXIT
          verified=false
          for attempt in $(seq 1 30); do
            # The custom hostname can still point at the previous Pages
            # deployment briefly. Purge before every probe so an old SPA
            # fallback cannot repopulate the cache for the rest of the loop.
            if [ -n "$zone_id" ] && ! api_json -X POST \
              --data "$purge_body" \
              "https://api.cloudflare.com/client/v4/zones/$zone_id/purge_cache" >/dev/null; then
              echo "::warning::Cloudflare cache purge was unavailable; switching to cache-busted probes"
              zone_id=""
            fi
            cache_bust="nook_commit=${{ github.sha }}&attempt=$attempt"
            root_status="$(curl -sS -o "$root_body" -w '%{http_code}' "https://$DEV_DOMAIN/?$cache_bust" || true)"
            site_status="$(curl -sS -o /dev/null -w '%{http_code}' "https://$DEV_DOMAIN/site/?$cache_bust" || true)"
            simple_status="$(curl -sS -o /dev/null -w '%{http_code}' "https://$DEV_DOMAIN/simple/?$cache_bust" || true)"
            sentinel_status="$(curl -sS -o /dev/null -w '%{http_code}' "https://$DEV_DOMAIN/sentinel/?$cache_bust" || true)"
            app_status="$(curl -sS -o /dev/null -w '%{http_code}' "https://$DEV_DOMAIN/app/?$cache_bust" || true)"
            extension_status="$(curl -sS -o /dev/null -w '%{http_code}' "https://$DEV_DOMAIN/extension-connect.html?$cache_bust" || true)"
            site_ok=false
            if [ "$root_status" = "200" ] \
              && grep -Fq '<title>Nook — Keys, not accounts</title>' "$root_body" \
              && grep -Fq "https://$SIMPLE_DOMAIN/" "$root_body" \
              && grep -Fq "https://$SENTINEL_DOMAIN/" "$root_body" \
              && [ "$site_status" = "404" ] \
              && [ "$simple_status" = "404" ] \
              && [ "$sentinel_status" = "404" ] \
              && [ "$app_status" = "404" ] \
              && [ "$extension_status" = "404" ]; then
              site_ok=true
            fi

            simple_root_status="$(curl -sS -D "$headers" -o "$root_body" -w '%{http_code}' "https://$SIMPLE_DOMAIN/?$cache_bust" || true)"
            simple_extension_status="$(curl -sS -o /dev/null -w '%{http_code}' "https://$SIMPLE_DOMAIN/extension-connect?$cache_bust" || true)"
            simple_ok=false
            if [ "$simple_root_status" = "200" ] \
              && grep -Fq '<meta name="nook-app-kind" content="simple"' "$root_body" \
              && tr -d '\r' < "$headers" | grep -Eiq '^content-security-policy:' \
              && tr -d '\r' < "$headers" | grep -Eiq '^x-content-type-options:[[:space:]]*nosniff' \
              && [ "$simple_extension_status" = "200" ]; then
              simple_ok=true
            fi

            sentinel_root_status="$(curl -sS -D "$headers" -o "$root_body" -w '%{http_code}' "https://$SENTINEL_DOMAIN/?$cache_bust" || true)"
            sentinel_extension_status="$(curl -sS -o /dev/null -w '%{http_code}' "https://$SENTINEL_DOMAIN/extension-connect?$cache_bust" || true)"
            sentinel_ok=false
            if [ "$sentinel_root_status" = "200" ] \
              && grep -Fq '<meta name="nook-app-kind" content="sentinel"' "$root_body" \
              && tr -d '\r' < "$headers" | grep -Eiq '^content-security-policy:' \
              && tr -d '\r' < "$headers" | grep -Eiq '^x-content-type-options:[[:space:]]*nosniff' \
              && [ "$sentinel_extension_status" = "404" ]; then
              sentinel_ok=true
            fi

            if [ "$site_ok" = true ] && [ "$simple_ok" = true ] && [ "$sentinel_ok" = true ]; then
              verified=true
              break
            fi
            echo "Waiting for isolated development domains (attempt $attempt/30; site=$root_status/$site_status/$simple_status/$sentinel_status/$app_status/$extension_status, simple=$simple_root_status/$simple_extension_status, sentinel=$sentinel_root_status/$sentinel_extension_status)"
            sleep 10
          done
          if [ "$verified" != true ]; then
            echo "::error::Development domains must serve isolated landing, Simple, and Sentinel applications"
            exit 1
          fi
          extension_verified=false
          last_extension_output=""
          for attempt in $(seq 1 12); do
            set +e
            last_extension_output="$(
              EXTENSION_METADATA_URL="https://$DEV_DOMAIN/downloads/extension.json" \
              EXTENSION_CACHE_BUST="${{ github.sha }}-$attempt" \
              EXPECTED_EXTENSION_CHANNEL="development" \
              EXPECTED_EXTENSION_COMMIT="${{ github.sha }}" \
              EXPECTED_EXTENSION_SITE_URL="https://$DEV_DOMAIN/" \
              EXPECTED_SIMPLE_VAULT_URL="https://$SIMPLE_DOMAIN/" \
              EXPECTED_SENTINEL_VAULT_URL="https://$SENTINEL_DOMAIN/" \
                bash nook-app/nook-web/nook-web-extension/scripts/verify-deployment.sh 2>&1
            )"
            extension_status=$?
            set -e
            if [ "$extension_status" -eq 0 ]; then
              printf '%s\n' "$last_extension_output"
              extension_verified=true
              break
            fi
            echo "Waiting for exact-head development extension artifacts (attempt $attempt/12)"
            sleep 5
          done
          if [ "$extension_verified" != true ]; then
            printf '%s\n' "$last_extension_output" >&2
            echo "::error::Development extension artifacts did not converge to the exact main head"
            exit 1
          fi
          echo "dev_url=https://$DEV_DOMAIN/" >> "$GITHUB_OUTPUT"
          echo "simple_url=https://$SIMPLE_DOMAIN/" >> "$GITHUB_OUTPUT"
          echo "sentinel_url=https://$SENTINEL_DOMAIN/" >> "$GITHUB_OUTPUT"
          echo "extension_url=https://$DEV_DOMAIN/downloads/nook-passwords-dev.zip" >> "$GITHUB_OUTPUT"

      - name: Record development deployment
        uses: actions/github-script@v9
        env:
          DEV_URL: ${{ steps.configure-dev-domain.outputs.dev_url }}
          SIMPLE_URL: ${{ steps.configure-dev-domain.outputs.simple_url }}
          SENTINEL_URL: ${{ steps.configure-dev-domain.outputs.sentinel_url }}
          EXTENSION_URL: ${{ steps.configure-dev-domain.outputs.extension_url }}
          SITE_PAGES_URL: ${{ steps.deploy-dev.outputs.site_pages_url }}
          SIMPLE_PAGES_URL: ${{ steps.deploy-dev.outputs.simple_pages_url }}
          SENTINEL_PAGES_URL: ${{ steps.deploy-dev.outputs.sentinel_pages_url }}
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'development',
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: false,
              description: 'Development channel',
              payload: {
                dev_url: process.env.DEV_URL,
                simple_url: process.env.SIMPLE_URL,
                sentinel_url: process.env.SENTINEL_URL,
                extension_url: process.env.EXTENSION_URL,
                site_pages_url: process.env.SITE_PAGES_URL,
                simple_pages_url: process.env.SIMPLE_PAGES_URL,
                sentinel_pages_url: process.env.SENTINEL_PAGES_URL,
              },
            })

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment: 'development',
              environment_url: process.env.DEV_URL,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Development channel deployed to Cloudflare Pages',
              auto_inactive: false,
            })

      - name: Export commit-keyed nook-core/auth coverage
        run: |
          set -euo pipefail
          task docker:extract:coverage COVERAGE_OUT_DIR=coverage/main
          jq -n \
            --arg commit_sha "$GITHUB_SHA" \
            '{schema_version: 1, commit_sha: $commit_sha}' \
            > coverage/main/manifest.json

      - name: Upload commit-keyed nook-core/auth coverage
        uses: actions/upload-artifact@v7
        with:
          name: nook-core-auth-coverage-${{ github.sha }}
          path: coverage/main
          retention-days: 90
          if-no-files-found: error
