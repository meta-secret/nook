# Main branch: one container for format/wasm/verify/build/e2e (task ci:main:publish);
# deploy the development channel to Cloudflare Pages.
#
# E2e on main uses the unified stub `e2e` project (no GitHub API). Live sync provider
# tests run nightly — see e2e-nightly.yml.
#
# On CI failure: task ci-agent:fix (Cursor SDK + GitHub REST API) fixes, opens PR, squash-merges.
# Requires repository secrets CURSOR_API_KEY and NOOK_GITHUB_PAT (PAT opens PRs as a user so
# pr.yml runs and branch protection does not require manual bot-approval).
#
# Playwright browsers are pre-installed in the toolchain image.

name: Main

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: main
  cancel-in-progress: true

env:
  CI_MAIN_DEV_DOMAIN: dev.nokey.sh
  CI_MAIN_DEV_URL: https://dev.nokey.sh
  CI_MAIN_CF_PAGES_PROJECT: nokey-sh
  CI_MAIN_VITE_BASE: /
  CI_MAIN_VITE_VAULT_SYNC_INTERVAL_MS: "500"
  CI_MAIN_GITHUB_POLL_MS: "3000"
  CI_MAIN_GITHUB_SYNC_TIMEOUT_MS: "15000"
  CI_MAIN_GITHUB_CONNECT_TIMEOUT_MS: "30000"

jobs:
  ci:
    name: Check, build, e2e, and deploy dev
    runs-on: nook
    environment:
      name: development
      url: https://dev.nokey.sh/
    permissions:
      contents: read
      deployments: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check, build, e2e, and push toolchain
        run: task ci:main:publish VITE_BASE=${{ env.CI_MAIN_VITE_BASE }} WASM_BUILD_MODE=prod
        env:
          CI: true
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_COMMIT_ID: ${{ github.sha }}
          PUSH_TOOLCHAIN: "1"
          TOOLCHAIN_REGISTRY: ${{ env.TOOLCHAIN_REGISTRY }}

      - name: Deploy development to Cloudflare Pages
        id: deploy-dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
          CF_PAGES_BRANCH: main
          CF_PAGES_PROJECT_NAME: ${{ env.CI_MAIN_CF_PAGES_PROJECT }}
          CF_PAGES_PRODUCTION_BRANCH: main
        run: |
          set +e
          out="$(task ci:cloudflare:deploy VITE_BASE=${{ env.CI_MAIN_VITE_BASE }} VITE_SITE_URL=${{ env.CI_MAIN_DEV_URL }} VITE_PUBLIC_APP_URL=${{ env.CI_MAIN_DEV_URL }} VITE_VAULT_SYNC_INTERVAL_MS=${{ env.CI_MAIN_VITE_VAULT_SYNC_INTERVAL_MS }} WASM_BUILD_MODE=prod 2>&1)"
          status=$?
          set -e
          echo "$out"
          if [ "$status" -ne 0 ]; then
            echo "::error::Cloudflare development deploy failed (exit $status)"
            exit "$status"
          fi
          clean="$(printf '%s' "$out" | sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g')"
          url="$(printf '%s' "$clean" | grep -oE 'NOOK_PREVIEW_URL=https://[^ ]+' | sed 's/NOOK_PREVIEW_URL=//' | tail -1)"
          if [ -z "$url" ]; then
            echo "::error::Cloudflare development deploy succeeded but did not emit deploy URL"
            exit 1
          fi
          echo "pages_url=$url" >> "$GITHUB_OUTPUT"

      - name: Verify dev.nokey.sh on Cloudflare Pages
        id: configure-dev-domain
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
          CF_PAGES_PROJECT_NAME: ${{ env.CI_MAIN_CF_PAGES_PROJECT }}
          DEV_DOMAIN: ${{ env.CI_MAIN_DEV_DOMAIN }}
          PAGES_URL: ${{ steps.deploy-dev.outputs.pages_url }}
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$DEV_DOMAIN"
          test -n "$PAGES_URL"

          api() {
            curl -fsS \
              -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
              -H "Content-Type: application/json" \
              "$@"
          }
          api_json() {
            response="$(api "$@")"
            if ! printf '%s' "$response" | jq -e '.success == true' >/dev/null; then
              printf '%s\n' "$response" | jq -r '.errors[]? | "Cloudflare API error: \(.code) \(.message)"' >&2 || true
              printf '%s\n' "$response" >&2
              return 1
            fi
            printf '%s' "$response"
          }

          pages_host="$(
            node -e 'const host = new URL(process.argv[1]).hostname.split("."); if (host.length > 3) host.shift(); console.log(host.join("."));' "$PAGES_URL"
          )"
          zone_name="${DEV_DOMAIN#*.}"
          echo "Cloudflare Pages host: $pages_host"
          echo "Cloudflare zone: $zone_name"

          domain_json="$(api_json "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CF_PAGES_PROJECT_NAME/domains")"
          domain_exists="$(printf '%s' "$domain_json" | jq -r --arg name "$DEV_DOMAIN" '[.result[]? | select(.name == $name)] | length')"
          if [ "$domain_exists" = "0" ]; then
            api_json -X POST \
              --data "$(jq -nc --arg name "$DEV_DOMAIN" '{name: $name}')" \
              "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$CF_PAGES_PROJECT_NAME/domains" >/dev/null
          fi

          zone_id="$(
            api_json "https://api.cloudflare.com/client/v4/zones?name=$zone_name" \
              | jq -er '.result[0].id'
          )"
          records_json="$(
            api_json "https://api.cloudflare.com/client/v4/zones/$zone_id/dns_records?name=$DEV_DOMAIN"
          )"
          record_ok="$(
            printf '%s' "$records_json" \
              | jq -r --arg content "$pages_host" '[.result[]? | select(.type == "CNAME" and .content == $content)] | length'
          )"
          if [ "$record_ok" = "0" ]; then
            echo "::error::Missing Cloudflare DNS record: create proxied CNAME $DEV_DOMAIN -> $pages_host"
            exit 1
          fi

          curl --retry 30 --retry-all-errors --retry-delay 10 -fsSI "https://$DEV_DOMAIN/" >/dev/null
          echo "dev_url=https://$DEV_DOMAIN/" >> "$GITHUB_OUTPUT"

      - name: Record development deployment
        uses: actions/github-script@v9
        env:
          DEV_URL: ${{ steps.configure-dev-domain.outputs.dev_url }}
          PAGES_URL: ${{ steps.deploy-dev.outputs.pages_url }}
        with:
          script: |
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'development',
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: false,
              description: 'Development channel',
              payload: {
                dev_url: process.env.DEV_URL,
                pages_url: process.env.PAGES_URL,
              },
            })

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment: 'development',
              environment_url: process.env.DEV_URL,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Development channel deployed to Cloudflare Pages',
              auto_inactive: false,
            })

  ci-fix:
    name: AI fix, PR, and merge
    needs: ci
    if: failure() && github.event_name == 'push'
    runs-on: nook
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      checks: read
      packages: write
    env:
      FIX_BRANCH: fix/ci-${{ github.run_id }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_RUN_ID: ${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.NOOK_GITHUB_PAT }}

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve toolchain image
        run: task setup WASM_BUILD_MODE=prod
        env:
          TOOLCHAIN_REGISTRY: ${{ env.TOOLCHAIN_REGISTRY }}

      - name: Run ci-fix (Docker + docker.sock)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          NOOK_GITHUB_PAT: ${{ secrets.NOOK_GITHUB_PAT }}
          REPO_ROOT: ${{ github.workspace }}
          VITE_BASE: ${{ env.CI_MAIN_VITE_BASE }}
          WASM_BUILD_MODE: prod
          VITE_VAULT_SYNC_INTERVAL_MS: ${{ env.CI_MAIN_VITE_VAULT_SYNC_INTERVAL_MS }}
          NOOK_GITHUB_E2E_REPO: nook-e2e-github-${{ github.run_id }}-fix
          NOOK_GITHUB_POLL_MS: ${{ env.CI_MAIN_GITHUB_POLL_MS }}
          NOOK_GITHUB_SYNC_TIMEOUT_MS: ${{ env.CI_MAIN_GITHUB_SYNC_TIMEOUT_MS }}
          NOOK_GITHUB_CONNECT_TIMEOUT_MS: ${{ env.CI_MAIN_GITHUB_CONNECT_TIMEOUT_MS }}
        run: task ci-agent:fix
