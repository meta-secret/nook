# Manually run Playwright e2e against a pull request branch.
#
# PR CI (pr.yml) runs full local-provider e2e automatically via ci:pr:e2e. Main CI also runs full e2e
# after merge; nightly runs sync-live. Use this workflow to re-run or debug on a PR branch.
# Inputs:
#   pr_number — PR to checkout (refs/pull/<n>/head)
#   suite     — e2e-pr, e2e, sync-live, or all

name: E2E (PR)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to test
        required: true
        type: string
      suite:
        description: Playwright project(s) to run
        required: true
        type: choice
        default: all
        options:
          - all
          - e2e-pr
          - e2e
          - sync-live
          - local
          - sync-stub

permissions:
  contents: read
  packages: write
  pull-requests: read

concurrency:
  group: e2e-pr-${{ inputs.pr_number }}-${{ inputs.suite }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright (${{ inputs.suite }})
    runs-on: nook
    steps:
      - name: Resolve PR head SHA
        id: pr
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = Number('${{ inputs.pr_number }}')
            if (!Number.isFinite(prNumber) || prNumber <= 0) {
              core.setFailed(`Invalid pr_number: ${'${{ inputs.pr_number }}'}`)
              return
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            })
            core.setOutput('ref', pr.head.sha)
            core.setOutput('branch', pr.head.ref)
            core.info(`PR #${prNumber}: ${pr.head.ref} @ ${pr.head.sha}`)

      - name: Checkout PR head
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.pr.outputs.ref }}

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (format, wasm, verify, web)
        run: task ci:main:build VITE_BASE=/ VITE_VAULT_SYNC_INTERVAL_MS=500 WASM_BUILD_MODE=prod
        env:
          CI: true

      - name: E2e (e2e-pr)
        if: inputs.suite == 'e2e-pr' || inputs.suite == 'local'
        run: task web:test:e2e:pr:parallel VITE_BASE=/ VITE_VAULT_SYNC_INTERVAL_MS=500 WASM_BUILD_MODE=prod
        env:
          CI: true

      - name: E2e (e2e)
        if: >-
          inputs.suite == 'all' || inputs.suite == 'e2e' ||
          inputs.suite == 'sync-stub'
        run: task web:test:e2e:parallel VITE_BASE=/ VITE_VAULT_SYNC_INTERVAL_MS=500 WASM_BUILD_MODE=prod
        env:
          CI: true

      - name: E2e (sync-live)
        if: inputs.suite == 'all' || inputs.suite == 'sync-live'
        run: task web:test:e2e:sync-live:parallel VITE_BASE=/ VITE_VAULT_SYNC_INTERVAL_MS=1000 WASM_BUILD_MODE=prod
        env:
          CI: true
          NOOK_GITHUB_PAT: ${{ secrets.NOOK_GITHUB_PAT }}
          NOOK_GITHUB_E2E_REPO: nook-e2e-pr-${{ inputs.pr_number }}-${{ github.run_id }}
          NOOK_GITHUB_POLL_MS: "3000"
          NOOK_GITHUB_SYNC_TIMEOUT_MS: "15000"
          NOOK_GITHUB_CONNECT_TIMEOUT_MS: "30000"
