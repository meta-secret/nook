# Nook self-hosted runner maintenance.

name: Runner Cleanup

on:
  schedule:
    # GitHub cron is UTC; 13:00 UTC is 06:00 America/Los_Angeles during daylight saving time.
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runner-cleanup
  # Let an active Docker prune finish instead of interrupting runner maintenance mid-operation.
  cancel-in-progress: false

jobs:
  docker-prune:
    name: Docker system prune
    runs-on: nook
    timeout-minutes: 30
    steps:
      - name: Docker disk usage before cleanup
        run: docker system df

      - name: Prune stale Docker data
        run: |
          set -euo pipefail
          # Keep one week of recent BuildKit/image state so main and release can reuse the
          # expensive Rust and Chromium layers. PR builders remove their own state. The age
          # filter still bounds long-term disk use.
          # Docker does not support combining the age filter with --volumes.
          # Keep the age-bound cache/image cleanup, then remove unused volumes
          # separately (Docker volume prune has no supported age filter).
          system_output="$(docker system prune --all --force --filter until=168h)"
          volume_output="$(docker volume prune --force)"
          output="$(printf '%s\n\n%s' "$system_output" "$volume_output")"
          printf '%s\n' "$output"
          reclaimed="$(printf '%s\n' "$output" | awk -F': ' '/^Total reclaimed space:/ { print $2; found=1 } END { if (!found) print "unknown" }')"

          {
            echo "### Docker cleanup"
            echo
            echo "Reclaimed space: \`$reclaimed\`"
            echo
            echo "<details>"
            echo "<summary>docker system prune output</summary>"
            echo
            echo '```text'
            printf '%s\n' "$output"
            echo '```'
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Docker disk usage after cleanup
        if: always()
        run: docker system df
