name: Web research

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/web-research.yml
      - nook-app/nook-web/nook-web-research/**
  push:
    branches: [main]
    paths:
      - .github/workflows/web-research.yml
      - nook-app/nook-web/nook-web-research/**
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: web-research-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CF_PAGES_PROJECT_NAME: nook-web-research
  RESEARCH_URL: https://web-research.nkey.app
  RESEARCH_DIR: nook-app/nook-web/nook-web-research
  WRANGLER_VERSION: 4.110.0

jobs:
  deploy:
    name: Build and deploy research catalog
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: ${{ env.RESEARCH_DIR }}
        run: bun install --frozen-lockfile

      - name: Check and build
        working-directory: ${{ env.RESEARCH_DIR }}
        run: |
          bun run format:check
          bun run check
          bun run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        working-directory: ${{ env.RESEARCH_DIR }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            deploy_branch="pr-$PR_NUMBER"
          else
            deploy_branch="${GITHUB_REF_NAME//[^A-Za-z0-9_-]/-}"
          fi

          set +e
          out="$(bunx "wrangler@$WRANGLER_VERSION" pages deploy dist \
            --project-name "$CF_PAGES_PROJECT_NAME" \
            --branch "$deploy_branch" \
            --commit-hash "$GITHUB_SHA" 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$out"
          if [ "$status" -ne 0 ]; then
            exit "$status"
          fi

          clean="$(printf '%s' "$out" | sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g')"
          url="$(printf '%s' "$clean" | grep -oE 'https://[a-z0-9-]+\.nook-web-research\.pages\.dev' | tail -1)"
          if [ -z "$url" ]; then
            echo "::error::Cloudflare deploy succeeded but did not emit a deployment URL"
            exit 1
          fi

          echo "deploy_branch=$deploy_branch" >> "$GITHUB_OUTPUT"
          echo "deployment_url=$url" >> "$GITHUB_OUTPUT"

      - name: Verify production custom domain
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl --retry 30 --retry-all-errors --retry-delay 10 -fsS "$RESEARCH_URL/" \
            | grep -F '<title>Nook UI experiments</title>' >/dev/null

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment_url }}
        with:
          retries: 3
          script: |
            const marker = '### Web research preview'
            const body = `${marker}\n\n${process.env.PREVIEW_URL}`
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            })
            const existing = comments.find((comment) => comment.body?.startsWith(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              })
            }

      - name: Record GitHub deployment
        uses: actions/github-script@v9
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
          DEPLOY_BRANCH: ${{ steps.deploy.outputs.deploy_branch }}
        with:
          retries: 3
          script: |
            const isPreview = context.eventName === 'pull_request'
            const ref = isPreview ? context.payload.pull_request.head.sha : context.sha
            const environment = isPreview ? 'github-pages' : 'web-research'
            const environmentUrl = isPreview
              ? process.env.DEPLOYMENT_URL
              : process.env.RESEARCH_URL

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref,
              environment,
              auto_merge: false,
              required_contexts: [],
              transient_environment: isPreview,
              production_environment: !isPreview,
              description: isPreview
                ? `Web research preview from ${process.env.DEPLOY_BRANCH}`
                : 'Web research production deployment',
              payload: {
                pages_url: process.env.DEPLOYMENT_URL,
                custom_url: environmentUrl,
              },
            })

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment,
              environment_url: environmentUrl,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: isPreview
                ? 'Cloudflare Pages research preview deployed'
                : 'Cloudflare Pages research site deployed',
              auto_inactive: false,
            })
