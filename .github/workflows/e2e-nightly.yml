# Nightly live sync provider e2e — real provider APIs (rate-limit sensitive).
#
# Stub-backed sync coverage runs on every main merge (main.yml). This workflow
# runs the same live smoke spec once per day per provider; swap providers by
# setting NOOK_E2E_SYNC_PROVIDER on each matrix job.
#
# On failure: task ci-agent:fix (Cursor SDK + GitHub REST API) fixes, opens PR,
# squash-merges — same agent as main.yml. Requires CURSOR_API_KEY and NOOK_GITHUB_PAT.

name: E2E (nightly)

on:
  schedule:
    # 03:00 UTC daily
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  sync-live:
    name: Live sync (${{ matrix.provider }})
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-nightly-${{ matrix.provider }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        provider: [github]
        # Add google-drive when NOOK_GOOGLE_E2E_ACCESS_TOKEN secret is configured.
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare, build, and run live e2e
        run: task ci:nightly:e2e VITE_BASE=/ VITE_VAULT_SYNC_INTERVAL_MS=1000 WASM_BUILD_MODE=prod
        env:
          CI: true
          NOOK_E2E_SYNC_PROVIDER: ${{ matrix.provider }}
          NOOK_GITHUB_PAT: ${{ secrets.NOOK_GITHUB_PAT }}
          NOOK_GOOGLE_E2E_ACCESS_TOKEN: ${{ secrets.NOOK_GOOGLE_E2E_ACCESS_TOKEN }}
          NOOK_GITHUB_E2E_REPO: nook-e2e-nightly-${{ matrix.provider }}-${{ github.run_id }}
          NOOK_GITHUB_POLL_MS: '3000'
          NOOK_GITHUB_SYNC_TIMEOUT_MS: '15000'
          NOOK_GITHUB_CONNECT_TIMEOUT_MS: '30000'

  ci-fix:
    name: AI fix, PR, and merge
    needs: sync-live
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      pull-requests: write
      checks: read
      packages: write
    env:
      FIX_BRANCH: fix/nightly-e2e-${{ github.run_id }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_RUN_ID: ${{ github.run_id }}
      CI_AGENT_PROMPT_FILE: .github/prompts/ci-fix-nightly-agent.md
      CI_FIX_LABEL: nightly e2e
      # Match the 6-hour GitHub-hosted job ceiling instead of the harness's 90-minute default.
      CI_AGENT_TIMEOUT_MS: '21600000'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.NOOK_GITHUB_PAT }}

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build split Rust/WASM and web images
        run: task setup WASM_BUILD_MODE=prod
        env:
          TOOLCHAIN_REGISTRY: ${{ env.TOOLCHAIN_REGISTRY }}

      - name: Run ci-fix (Docker + docker.sock)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          NOOK_GITHUB_PAT: ${{ secrets.NOOK_GITHUB_PAT }}
          REPO_ROOT: ${{ github.workspace }}
          VITE_BASE: /
          WASM_BUILD_MODE: prod
          VITE_VAULT_SYNC_INTERVAL_MS: "1000"
          NOOK_GITHUB_E2E_REPO: nook-e2e-nightly-${{ github.run_id }}-fix
          NOOK_GITHUB_POLL_MS: "3000"
          NOOK_GITHUB_SYNC_TIMEOUT_MS: "15000"
          NOOK_GITHUB_CONNECT_TIMEOUT_MS: "30000"
        run: task ci-agent:fix
