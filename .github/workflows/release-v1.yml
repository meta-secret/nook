# Release v1: verify the pinned release branch and deploy it to GitHub Pages.

name: Release v1

on:
  push:
    branches: [release/v1]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  packages: read

concurrency:
  group: release-v1
  cancel-in-progress: true

env:
  CI_RELEASE_V1_URL: https://nokey.sh
  CI_RELEASE_V1_VITE_BASE: /
  CI_RELEASE_V1_VITE_VAULT_SYNC_INTERVAL_MS: "500"

jobs:
  deploy:
    name: Verify and deploy v1
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check, build, and e2e
        run: task ci:main VITE_BASE=${{ env.CI_RELEASE_V1_VITE_BASE }} VITE_VAULT_SYNC_INTERVAL_MS=${{ env.CI_RELEASE_V1_VITE_VAULT_SYNC_INTERVAL_MS }} WASM_BUILD_MODE=prod
        env:
          CI: true
          VITE_VAULT_SYNC_INTERVAL_MS: ${{ env.CI_RELEASE_V1_VITE_VAULT_SYNC_INTERVAL_MS }}

      - name: Build stable Pages artifact
        run: task setup VITE_BASE=${{ env.CI_RELEASE_V1_VITE_BASE }} VITE_SITE_URL=${{ env.CI_RELEASE_V1_URL }} VITE_PUBLIC_APP_URL=${{ env.CI_RELEASE_V1_URL }} VITE_VAULT_SYNC_INTERVAL_MS=${{ env.CI_RELEASE_V1_VITE_VAULT_SYNC_INTERVAL_MS }} WASM_BUILD_MODE=prod
        env:
          CI: true

      - name: Extract dist from nook-web image
        run: task docker:extract:dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: nook-app/nook-web/nook-web-app/dist

      - name: Deploy stable to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
