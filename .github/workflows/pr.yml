# Pull requests: pull toolchain cache, verify/build/e2e in one container, deploy preview.
# Toolchain :buildcache publish starts in the background on the same runner after verify (warm
# buildx cache from ci:pr) while deploy runs; best-effort wait at the end does not fail the PR.
# PRs publish only the :buildcache layers (keeps local + CI warm); the :latest base IMAGE is pushed
# on main only (ci:main:publish). PR and main CI run full stub e2e; nightly runs sync-live.
# Superseded runs (new push or PR close) are cancelled via concurrency below.

name: PR

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  packages: write
  pull-requests: write

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify and preview
    if: github.event.action != 'closed'
    runs-on: nook
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify and build preview
        run: task ci:pr VITE_BASE=/
        env:
          CI: true

      - name: Publish toolchain buildcache (background)
        id: cache_push
        run: |
          # Same runner as ci:pr — reuses warm buildx cache. Overlaps with deploy + comment.
          task docker:push:cache:ci > /tmp/nook-cache-push.log 2>&1 &
          echo $! > /tmp/nook-cache-push.pid
        env:
          CI: true
          TOOLCHAIN_REGISTRY: ${{ env.TOOLCHAIN_REGISTRY }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
          CF_PAGES_BRANCH: pr-${{ github.event.pull_request.number }}
        run: |
          # Deploy runs inside the app container (dist is in-image, no bind mount). Capture the
          # preview URL from the container's stdout marker and hand it to the comment step.
          # Do NOT let `bash -e` abort on the command substitution: on a deploy failure we must still
          # print the container output (it holds the real error) before failing the step.
          set +e
          out="$(task ci:pr:deploy-preview VITE_BASE=/ 2>&1)"
          status=$?
          set -e
          echo "$out"
          if [ "$status" -ne 0 ]; then
            echo "::error::Cloudflare preview deploy failed (exit $status)"
            exit "$status"
          fi
          # Strip ANSI codes before matching the marker (defensive; the container already sanitizes).
          clean="$(printf '%s' "$out" | sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g')"
          url="$(printf '%s' "$clean" | grep -oE 'NOOK_PREVIEW_URL=https://[^ ]+' | sed 's/NOOK_PREVIEW_URL=//' | tail -1)"
          echo "preview_url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: steps.deploy.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        run: task docker:task TASK=_comment-preview

      - name: Wait for toolchain buildcache publish
        if: steps.cache_push.outcome == 'success'
        continue-on-error: true
        run: |
          pid="$(cat /tmp/nook-cache-push.pid)"
          if wait "$pid"; then
            echo "Toolchain buildcache publish finished"
          else
            echo "::warning::Toolchain buildcache publish failed (non-blocking)"
            cat /tmp/nook-cache-push.log
          fi
