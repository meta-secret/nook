# Pull requests: run Rust/WASM/JS unit tests, Svelte/type/lint/format checks, build no-opt WASM,
# build and deploy the preview. Full browser regression e2e is opt-in through the `ci:full-e2e`
# label for PRs that repair a Main failure; UI-changing PRs otherwise run only their dedicated
# headless demo specs and retain the resulting videos on the PR workflow run. Main also runs the
# full local-provider and extension suites, and nightly runs sync-live.
# Only nightly failures invoke the ci-fix AI worker.
# Research-only changes are handled by web-research.yml. Cortex, Cursor, and
# agentic-AI-only and agent-statistics-only changes do not need the product pipeline.
# Superseded runs (new push or PR close) are cancelled via concurrency below.

name: PR

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled, closed]
    paths-ignore:
      - .cortex/**
      - .cursor/**
      - .stats/**
      - .github/workflows/web-research.yml
      - agentic-ai/**
      - nook-app/nook-web/nook-web-research/**

permissions:
  actions: read
  contents: read
  deployments: write
  pull-requests: write
  issues: write

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: nook-web:run-${{ github.run_id }}-${{ github.run_attempt }}
  DOCKER_E2E_IMAGE: nook-web-e2e:run-${{ github.run_id }}-${{ github.run_attempt }}

jobs:
  rust:
    name: Native Rust verification
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          cache-write: "false"
          main-cache-only: "true"

      - name: Derive native validation key
        id: native-key
        run: |
          echo "value=nook-trusted-native-validation-v2-${{ hashFiles('.dockerignore', '.github/workflows/pr.yml', '.github/workflows/pr-validation-handoff.yml', '.github/actions/nook-docker-setup/**', 'Taskfile.yml', 'nook-app/Taskfile.yml', 'nook-app/.task/ci.yml', 'nook-app/docker/**', 'nook-app/docker-bake.hcl', 'nook-app/nook-core/**', 'nook-app/nook-auth2/**', 'nook-app/nook-wasm/**', 'nook-app/Cargo.toml', 'nook-app/Cargo.lock', 'nook-app/.cargo/**', 'nook-app/.config/**') }}" >> "$GITHUB_OUTPUT"

      - name: Locate trusted native handoff
        id: trusted-native
        uses: actions/github-script@v9
        env:
          ARTIFACT_NAME: ${{ steps.native-key.outputs.value }}
        with:
          retries: 3
          script: |
            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              ...context.repo,
              name: process.env.ARTIFACT_NAME,
              per_page: 100,
            })
            for (const artifact of artifacts.sort((a, b) => b.id - a.id)) {
              if (artifact.expired || !artifact.workflow_run?.id) continue
              const { data: run } = await github.rest.actions.getWorkflowRun({
                ...context.repo,
                run_id: artifact.workflow_run.id,
              })
              const workflowPath = run.path?.replace(/@[^@]+$/, '')
              if (
                run.name === 'PR validation handoff' &&
                workflowPath === '.github/workflows/pr-validation-handoff.yml' &&
                run.head_branch === context.payload.repository.default_branch &&
                run.status === 'completed' &&
                run.conclusion === 'success' &&
                run.event === 'workflow_run'
              ) {
                core.setOutput('found', 'true')
                core.setOutput('artifact-id', String(artifact.id))
                core.setOutput('run-id', String(run.id))
                return
              }
            }
            core.setOutput('found', 'false')

      - name: Download trusted native handoff
        if: steps.trusted-native.outputs.found == 'true'
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ steps.trusted-native.outputs.artifact-id }}
          path: ${{ runner.temp }}/nook-ci-artifacts/rust
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.trusted-native.outputs.run-id }}

      - name: Validate trusted native handoff
        if: steps.trusted-native.outputs.found == 'true'
        env:
          EXPECTED_KEY: ${{ steps.native-key.outputs.value }}
        run: |
          set -euo pipefail
          dir="${RUNNER_TEMP}/nook-ci-artifacts/rust"
          jq -e --arg key "$EXPECTED_KEY" \
            '.schema_version == 1 and
             .kind == "native" and
             .input_key == $key and
             .source_workflow == ".github/workflows/pr.yml" and
             .producer_jobs_verified == true' \
            "$dir/nook-validation-manifest.json" >/dev/null
          for file in summary.txt summary.json lcov.info coverage-floor.json; do
            test -s "$dir/$file"
          done

      # A producer miss runs preflight inside task ci:pr:rust. Exact trusted handoffs still need
      # repository invariants checked on this PR head, but must not run the same Docker build twice.
      - name: Repository invariant preflight
        if: steps.trusted-native.outputs.found == 'true'
        run: task preflight

      - name: Rust format, clippy, tests, and coverage
        if: steps.trusted-native.outputs.found != 'true'
        run: task ci:pr:rust CI_ARTIFACT_DIR=${{ runner.temp }}/nook-ci-artifacts/rust
        env:
          CI: true

      - name: Upload Rust coverage handoff
        uses: actions/upload-artifact@v7
        with:
          name: pr-rust-${{ github.run_id }}
          path: ${{ runner.temp }}/nook-ci-artifacts/rust
          retention-days: 1
          if-no-files-found: error
          overwrite: true

      - name: Preserve cache telemetry
        if: always()
        uses: ./.github/actions/nook-cache-telemetry

  wasm:
    name: WASM verification and artifact
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          cache-write: "false"
          main-cache-only: "true"

      - name: Derive WASM validation key
        id: wasm-key
        run: |
          echo "value=nook-trusted-wasm-validation-v2-${{ hashFiles('.dockerignore', '.github/workflows/pr.yml', '.github/workflows/pr-validation-handoff.yml', '.github/actions/nook-docker-setup/**', 'Taskfile.yml', 'nook-app/Taskfile.yml', 'nook-app/.task/ci.yml', 'nook-app/docker/**', 'nook-app/docker-bake.hcl', 'nook-app/nook-core/**', 'nook-app/nook-auth2/**', 'nook-app/nook-wasm/**', 'nook-app/Cargo.toml', 'nook-app/Cargo.lock', 'nook-app/.cargo/**', 'nook-app/.config/**') }}" >> "$GITHUB_OUTPUT"

      - name: Locate trusted WASM handoff
        id: trusted-wasm
        uses: actions/github-script@v9
        env:
          ARTIFACT_NAME: ${{ steps.wasm-key.outputs.value }}
        with:
          retries: 3
          script: |
            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              ...context.repo,
              name: process.env.ARTIFACT_NAME,
              per_page: 100,
            })
            for (const artifact of artifacts.sort((a, b) => b.id - a.id)) {
              if (artifact.expired || !artifact.workflow_run?.id) continue
              const { data: run } = await github.rest.actions.getWorkflowRun({
                ...context.repo,
                run_id: artifact.workflow_run.id,
              })
              const workflowPath = run.path?.replace(/@[^@]+$/, '')
              if (
                run.name === 'PR validation handoff' &&
                workflowPath === '.github/workflows/pr-validation-handoff.yml' &&
                run.head_branch === context.payload.repository.default_branch &&
                run.status === 'completed' &&
                run.conclusion === 'success' &&
                run.event === 'workflow_run'
              ) {
                core.setOutput('found', 'true')
                core.setOutput('artifact-id', String(artifact.id))
                core.setOutput('run-id', String(run.id))
                return
              }
            }
            core.setOutput('found', 'false')

      - name: Download trusted WASM handoff
        if: steps.trusted-wasm.outputs.found == 'true'
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ steps.trusted-wasm.outputs.artifact-id }}
          path: ${{ runner.temp }}/nook-ci-artifacts/joined/nook-wasm
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.trusted-wasm.outputs.run-id }}

      - name: Validate trusted WASM handoff
        if: steps.trusted-wasm.outputs.found == 'true'
        env:
          EXPECTED_KEY: ${{ steps.wasm-key.outputs.value }}
        run: |
          set -euo pipefail
          dir="${RUNNER_TEMP}/nook-ci-artifacts/joined/nook-wasm"
          jq -e --arg key "$EXPECTED_KEY" \
            '.schema_version == 1 and
             .kind == "wasm" and
             .input_key == $key and
             .source_workflow == ".github/workflows/pr.yml" and
             .producer_jobs_verified == true' \
            "$dir/nook-validation-manifest.json" >/dev/null
          for file in package.json nook_wasm.js nook_wasm.d.ts nook_wasm_bg.wasm nook_wasm_bg.wasm.d.ts; do
            test -s "$dir/$file"
          done

      - name: WASM clippy, build, and Node tests
        if: steps.trusted-wasm.outputs.found != 'true'
        run: task ci:pr:wasm CI_ARTIFACT_DIR=${{ runner.temp }}/nook-ci-artifacts/joined
        env:
          CI: true
          WASM_BUILD_MODE: dev

      - name: Upload verified WASM handoff
        uses: actions/upload-artifact@v7
        with:
          name: pr-wasm-${{ github.run_id }}
          path: ${{ runner.temp }}/nook-ci-artifacts/joined/nook-wasm
          retention-days: 1
          if-no-files-found: error
          overwrite: true

      - name: Preserve cache telemetry
        if: always()
        uses: ./.github/actions/nook-cache-telemetry

  verify:
    name: Verify and preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Test Linear UI demo publishing helper
        run: node --test .github/scripts/linear-ui-demo.test.cjs

      - name: Test Main build statistics collector
        run: node --test .github/scripts/main-build-stats.test.cjs

      - name: Test cache telemetry collector
        run: node --test .github/scripts/cache-telemetry.test.cjs

      - name: Enforce the UI demo contract
        id: ui-demo-contract
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_SHA" --depth=1
          bash .github/scripts/ui-demo-contract.sh "$BASE_SHA"

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          cache-write: "false"
          main-cache-only: "true"

      # Checkout, contract tests, and Docker setup run in parallel with the producer jobs. Only the
      # first step that consumes WASM waits, and it accepts the stable artifact name only after this
      # run attempt's producer has completed successfully.
      - name: Wait for verified WASM handoff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: pr-wasm-${{ github.run_id }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 360); do
            wasm_job="$(
              gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/attempts/$GITHUB_RUN_ATTEMPT/jobs" \
                --jq '[.jobs[] | select(.name == "WASM verification and artifact")] | first // {}'
            )"
            wasm_job_id="$(jq -r '.id // empty' <<< "$wasm_job")"
            wasm_status="$(jq -r '.status // "queued"' <<< "$wasm_job")"
            wasm_conclusion="$(jq -r '.conclusion // ""' <<< "$wasm_job")"
            if [ -n "$wasm_job_id" ] \
              && [ "$wasm_status" = "completed" ] \
              && [ "$wasm_conclusion" != "success" ]; then
              echo "::error::WASM verification completed with $wasm_conclusion"
              exit 1
            fi

            # A failed-job rerun may omit the already-successful producer. Reuse the run-stable,
            # exact-head artifact only when there is no current producer, or after it succeeds.
            if [ -z "$wasm_job_id" ] \
              || { [ "$wasm_status" = "completed" ] && [ "$wasm_conclusion" = "success" ]; }; then
              if gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts" \
                --paginate \
                --jq '.artifacts[].name' \
                | grep -Fxq "$ARTIFACT_NAME"; then
                destination="${RUNNER_TEMP}/nook-ci-artifacts/joined/nook-wasm"
                rm -rf "$destination"
                mkdir -p "$destination"
                gh run download "$GITHUB_RUN_ID" \
                  --name "$ARTIFACT_NAME" \
                  --dir "$destination"
                test -s "$destination/nook_wasm.js"
                exit 0
              fi
              if [ -z "$wasm_job_id" ]; then
                echo "::error::This failed-job rerun has no WASM producer and the run-stable artifact is unavailable"
                exit 1
              fi
            fi

            echo "Waiting for verified WASM artifact (attempt $attempt/360; wasm=$wasm_status${wasm_conclusion:+/$wasm_conclusion})"
            sleep 5
          done
          echo "::error::Verified WASM artifact was not published within 30 minutes"
          exit 1

      # Coverage reporting consumes the native job's small artifact later and never blocks the web
      # build on Rust completion. Browser e2e consumes this same verified WASM package in parallel.
      - name: Svelte checks, JS unit tests, lint, and preview build (no browser e2e)
        run: |
          set -euo pipefail
          task ci:pr:web CI_ARTIFACT_DIR=${{ runner.temp }}/nook-ci-artifacts/joined \
            VITE_BASE=/ \
            VITE_SITE_URL=https://pr-${{ github.event.pull_request.number }}.nokey-sh.pages.dev \
            VITE_PUBLIC_APP_URL=https://pr-${{ github.event.pull_request.number }}.nook-1n8.pages.dev \
            VITE_SIMPLE_APP_URL=https://pr-${{ github.event.pull_request.number }}.nokey-simple.pages.dev \
            VITE_SENTINEL_APP_URL=https://pr-${{ github.event.pull_request.number }}.nokey-sentinel.pages.dev \
            WASM_BUILD_MODE=dev
        env:
          CI: true
          NOOK_SIMPLE_VAULT_URL: https://pr-${{ github.event.pull_request.number }}.nokey-simple.pages.dev/
          NOOK_EXTENSION_CHANNEL: pr-${{ github.event.pull_request.number }}
          NOOK_EXTENSION_COMMIT: ${{ github.event.pull_request.head.sha }}
          NOOK_EXTENSION_SITE_URL: https://pr-${{ github.event.pull_request.number }}.nokey-sh.pages.dev/

      - name: Record headless UI demo
        id: record-ui-demo
        if: steps.ui-demo-contract.outputs.required == 'true'
        run: |
          set -euo pipefail
          task ci:pr:ui-demo \
            CI_ARTIFACT_DIR=${{ runner.temp }}/nook-ci-artifacts/joined \
            UI_DEMO_OUTPUT_DIR=${{ runner.temp }}/nook-ui-demo \
            UI_DEMO_SPECS="${{ steps.ui-demo-contract.outputs.specs }}" \
            VITE_BASE=/ \
            VITE_SITE_URL=https://pr-${{ github.event.pull_request.number }}.nokey-sh.pages.dev \
            VITE_PUBLIC_APP_URL=https://pr-${{ github.event.pull_request.number }}.nook-1n8.pages.dev \
            VITE_SIMPLE_APP_URL=https://pr-${{ github.event.pull_request.number }}.nokey-simple.pages.dev \
            VITE_SENTINEL_APP_URL=https://pr-${{ github.event.pull_request.number }}.nokey-sentinel.pages.dev \
            WASM_BUILD_MODE=dev
        env:
          CI: true
          NOOK_SIMPLE_VAULT_URL: https://pr-${{ github.event.pull_request.number }}.nokey-simple.pages.dev/
          NOOK_EXTENSION_CHANNEL: pr-${{ github.event.pull_request.number }}
          NOOK_EXTENSION_COMMIT: ${{ github.event.pull_request.head.sha }}
          NOOK_EXTENSION_SITE_URL: https://pr-${{ github.event.pull_request.number }}.nokey-sh.pages.dev/

      - name: Upload UI demo video
        if: always() && steps.ui-demo-contract.outputs.required == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ui-demo-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: ${{ runner.temp }}/nook-ui-demo
          retention-days: 90
          if-no-files-found: warn
          overwrite: true

      - name: Link UI demo from the pull request
        if: always() && steps.ui-demo-contract.outputs.required == 'true'
        uses: actions/github-script@v9
        env:
          DEMO_OUTCOME: ${{ steps.record-ui-demo.outcome }}
          DEMO_SPECS: ${{ steps.ui-demo-contract.outputs.specs }}
        with:
          retries: 3
          script: |
            const marker = '<!-- nook-ui-demo -->'
            const artifactName = `ui-demo-pr-${context.issue.number}-${context.payload.pull_request.head.sha}`
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body = [
              marker,
              '### UI demo',
              '',
              `- Result: **${process.env.DEMO_OUTCOME}**`,
              `- Video artifact: [${artifactName}](${runUrl}#artifacts)`,
              '- Linear archive: publishing from the trusted post-workflow',
              `- Demo spec: \`${process.env.DEMO_SPECS}\``,
              '',
              'The demo runs in headless Chromium. Playwright assertions are authoritative; the video is a review aid for humans and AI.',
            ].join('\n')
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            })
            const existing = comments.find((comment) => comment.body?.startsWith(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

      - name: Download Rust coverage handoff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARTIFACT_NAME: pr-rust-${{ github.run_id }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 360); do
            native_job="$(
              gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/attempts/$GITHUB_RUN_ATTEMPT/jobs" \
                --jq '[.jobs[] | select(.name == "Native Rust verification")] | first // {}'
            )"
            native_job_id="$(jq -r '.id // empty' <<< "$native_job")"
            native_status="$(jq -r '.status // "queued"' <<< "$native_job")"
            native_conclusion="$(jq -r '.conclusion // ""' <<< "$native_job")"
            if [ -n "$native_job_id" ] \
              && [ "$native_status" = "completed" ] \
              && [ "$native_conclusion" != "success" ]; then
              echo "::error::Native Rust verification completed with $native_conclusion"
              exit 1
            fi

            # Preserve current-attempt ordering when the producer is scheduled. If GitHub omits it
            # from a failed-job rerun, fall back to the prior successful exact-head artifact.
            if [ -z "$native_job_id" ] \
              || { [ "$native_status" = "completed" ] && [ "$native_conclusion" = "success" ]; }; then
              if gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts" \
                --paginate \
                --jq '.artifacts[].name' \
                | grep -Fxq "$ARTIFACT_NAME"; then
                rm -rf coverage/current
                mkdir -p coverage/current
                gh run download "$GITHUB_RUN_ID" \
                  --name "$ARTIFACT_NAME" \
                  --dir coverage/current
                test -s coverage/current/summary.json
                chmod +x coverage/current/tools/nook-preflight
                test -x coverage/current/tools/nook-preflight
                exit 0
              fi
              if [ -z "$native_job_id" ]; then
                echo "::error::This failed-job rerun has no native producer and the run-stable artifact is unavailable"
                exit 1
              fi
            fi

            echo "Waiting for native coverage artifact (attempt $attempt/360; native=$native_status${native_conclusion:+/$native_conclusion})"
            sleep 5
          done
          echo "::error::Native Rust coverage artifact was not published within 30 minutes"
          exit 1

      - name: Deploy unified internal test harness
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
          CF_PAGES_BRANCH: pr-${{ github.event.pull_request.number }}
        run: |
          # Deploy reuses the image prepared by the preceding gate (dist is in-image, no bind
          # mount or second setup). Capture the preview URL from the container's stdout marker.
          # Do NOT let `bash -e` abort on the command substitution: on a deploy failure we must still
          # print the container output (it holds the real error) before failing the step.
          set +e
          out="$(task ci:pr:deploy-preview VITE_BASE=/ WASM_BUILD_MODE=dev 2>&1)"
          status=$?
          set -e
          echo "$out"
          if [ "$status" -ne 0 ]; then
            echo "::error::Cloudflare preview deploy failed (exit $status)"
            exit "$status"
          fi
          # Strip ANSI codes before matching the marker (defensive; the container already sanitizes).
          clean="$(printf '%s' "$out" | sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g')"
          url="$(printf '%s' "$clean" | grep -oE 'NOOK_PREVIEW_URL=https://[^ ]+' | sed 's/NOOK_PREVIEW_URL=//' | tail -1)"
          echo "preview_url=$url" >> "$GITHUB_OUTPUT"

      - name: Deploy and verify isolated Pages previews
        id: deploy-isolated
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
          CF_PAGES_BRANCH: pr-${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number }}"
          site_url="https://pr-$pr.nokey-sh.pages.dev"
          simple_url="https://pr-$pr.nokey-simple.pages.dev"
          sentinel_url="https://pr-$pr.nokey-sentinel.pages.dev"

          deploy() {
            project="$1"
            dist="$2"
            label="$3"
            set +e
            out="$(CF_PAGES_PROJECT_NAME="$project" CF_PAGES_PRODUCTION_BRANCH=main CF_PAGES_DIST_DIR="$dist" task ci:pr:deploy-preview VITE_BASE=/ WASM_BUILD_MODE=dev 2>&1)"
            status=$?
            set -e
            echo "$out"
            if [ "$status" -ne 0 ]; then
              echo "::error::$label preview deploy failed (exit $status)"
              exit "$status"
            fi
          }

          deploy nokey-sh nook-app/nook-web/nook-web-app/dist/site Site
          deploy nokey-simple nook-app/nook-web/nook-vault-simple/dist Simple
          deploy nokey-sentinel nook-app/nook-web/nook-vault-sentinel/dist Sentinel

          body="$(mktemp)"
          headers="$(mktemp)"
          trap 'rm -f "$body" "$headers"' EXIT
          verified=false
          for attempt in $(seq 1 24); do
            site_status="$(curl --connect-timeout 3 --max-time 8 -sS -o "$body" -w '%{http_code}' "$site_url/" || true)"
            retired_status="$(curl --connect-timeout 3 --max-time 8 -sS -D "$headers" -o /dev/null -w '%{http_code}' "$site_url/simple/" || true)"
            site_ok=false
            if [ "$site_status" = "200" ] \
              && grep -Fq '<title>Nook — Keys, not accounts</title>' "$body" \
              && grep -Fq "$simple_url/" "$body" \
              && grep -Fq "$sentinel_url/" "$body" \
              && [ "$retired_status" = "404" ] \
              && tr -d '\r' < "$headers" | grep -Eiq '^cache-control:.*no-store'; then
              site_ok=true
            fi

            simple_status="$(curl --connect-timeout 3 --max-time 8 -sS -D "$headers" -o "$body" -w '%{http_code}' "$simple_url/" || true)"
            simple_extension="$(curl --connect-timeout 3 --max-time 8 -sS -o /dev/null -w '%{http_code}' "$simple_url/extension-connect" || true)"
            simple_ok=false
            if [ "$simple_status" = "200" ] \
              && grep -Fq '<meta name="nook-app-kind" content="simple"' "$body" \
              && tr -d '\r' < "$headers" | grep -Eiq '^content-security-policy:' \
              && tr -d '\r' < "$headers" | grep -Eiq '^x-content-type-options:[[:space:]]*nosniff' \
              && [ "$simple_extension" = "200" ]; then
              simple_ok=true
            fi

            sentinel_status="$(curl --connect-timeout 3 --max-time 8 -sS -D "$headers" -o "$body" -w '%{http_code}' "$sentinel_url/" || true)"
            sentinel_extension="$(curl --connect-timeout 3 --max-time 8 -sS -o /dev/null -w '%{http_code}' "$sentinel_url/extension-connect" || true)"
            sentinel_ok=false
            if [ "$sentinel_status" = "200" ] \
              && grep -Fq '<meta name="nook-app-kind" content="sentinel"' "$body" \
              && tr -d '\r' < "$headers" | grep -Eiq '^content-security-policy:' \
              && tr -d '\r' < "$headers" | grep -Eiq '^x-content-type-options:[[:space:]]*nosniff' \
              && [ "$sentinel_extension" = "404" ]; then
              sentinel_ok=true
            fi

            if [ "$site_ok" = true ] && [ "$simple_ok" = true ] && [ "$sentinel_ok" = true ]; then
              verified=true
              break
            fi
            echo "Waiting for isolated aliases (attempt $attempt/24; site=$site_status/$retired_status, simple=$simple_status/$simple_extension, sentinel=$sentinel_status/$sentinel_extension)"
            sleep 5
          done
          if [ "$verified" != true ]; then
            echo "::error::Isolated Pages aliases did not expose the expected site, Simple, and Sentinel boundaries"
            exit 1
          fi
          extension_verified=false
          last_extension_output=''
          for attempt in $(seq 1 12); do
            set +e
            last_extension_output="$(
              EXTENSION_METADATA_URL="$site_url/downloads/extension.json" \
              EXTENSION_CACHE_BUST="${{ github.event.pull_request.head.sha }}-$attempt" \
              EXPECTED_EXTENSION_CHANNEL="pr-$pr" \
              EXPECTED_EXTENSION_COMMIT="${{ github.event.pull_request.head.sha }}" \
              EXPECTED_EXTENSION_SITE_URL="$site_url/" \
              EXPECTED_SIMPLE_VAULT_URL="$simple_url/" \
              EXPECTED_SENTINEL_VAULT_URL="$sentinel_url/" \
                bash nook-app/nook-web/nook-web-extension/scripts/verify-deployment.sh 2>&1
            )"
            extension_status=$?
            set -e
            if [ "$extension_status" -eq 0 ]; then
              printf '%s\n' "$last_extension_output"
              extension_verified=true
              break
            fi
            echo "Waiting for exact-head extension metadata (attempt $attempt/12)"
            sleep 5
          done
          if [ "$extension_verified" != true ]; then
            printf '%s\n' "$last_extension_output" >&2
            echo "::error::Extension metadata did not converge to the exact PR head"
            exit 1
          fi
          echo "site_url=$site_url" >> "$GITHUB_OUTPUT"
          echo "simple_url=$simple_url" >> "$GITHUB_OUTPUT"
          echo "sentinel_url=$sentinel_url" >> "$GITHUB_OUTPUT"
          echo "extension_url=$site_url/downloads/nook-passwords-pr-$pr.zip" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: steps.deploy.outcome == 'success' && steps.deploy-isolated.outcome == 'success'
        uses: actions/github-script@v9
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
          SITE_PREVIEW_URL: ${{ steps.deploy-isolated.outputs.site_url }}
          SIMPLE_PREVIEW_URL: ${{ steps.deploy-isolated.outputs.simple_url }}
          SENTINEL_PREVIEW_URL: ${{ steps.deploy-isolated.outputs.sentinel_url }}
          EXTENSION_PREVIEW_URL: ${{ steps.deploy-isolated.outputs.extension_url }}
        with:
          retries: 3
          script: |
            const sleep = (milliseconds) => new Promise((resolve) => setTimeout(resolve, milliseconds))
            const withBackoff = async (label, request) => {
              let lastError
              for (let attempt = 1; attempt <= 5; attempt += 1) {
                try {
                  return await request()
                } catch (error) {
                  lastError = error
                  if (attempt === 5) break
                  const delaySeconds = attempt * 15
                  core.warning(`${label} failed on attempt ${attempt}; retrying in ${delaySeconds}s`)
                  await sleep(delaySeconds * 1000)
                }
              }
              throw lastError
            }
            const marker = '### Preview deployed'
            const root = process.env.PREVIEW_URL.replace(/\/$/, '')
            const site = process.env.SITE_PREVIEW_URL.replace(/\/$/, '')
            const simple = process.env.SIMPLE_PREVIEW_URL.replace(/\/$/, '')
            const sentinel = process.env.SENTINEL_PREVIEW_URL.replace(/\/$/, '')
            const extension = process.env.EXTENSION_PREVIEW_URL
            const body = `${marker}\n\n- Unified internal test harness: ${root}/\n- Site: ${site}/\n- Simple Vault: ${simple}/\n- Sentinel Vault: ${sentinel}/\n- Browser extension: ${extension}`
            const commentQuery = await withBackoff('Listing preview comments', () => github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    id
                    comments(last: 100) {
                      nodes { id body }
                    }
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: context.payload.pull_request.number,
            }))
            const pullRequest = commentQuery.repository.pullRequest
            const existing = pullRequest.comments.nodes.find((comment) => comment.body?.startsWith(marker))
            if (existing) {
              await withBackoff('Updating the preview comment', () => github.graphql(`
                mutation($id: ID!, $body: String!) {
                  updateIssueComment(input: { id: $id, body: $body }) {
                    issueComment { id }
                  }
                }
              `, { id: existing.id, body }))
            } else {
              await withBackoff('Creating the preview comment', () => github.graphql(`
                mutation($subjectId: ID!, $body: String!) {
                  addComment(input: { subjectId: $subjectId, body: $body }) {
                    commentEdge { node { id } }
                  }
                }
              `, { subjectId: pullRequest.id, body }))
            }

      - name: Record github-pages deployment
        if: steps.deploy.outcome == 'success' && steps.deploy-isolated.outcome == 'success'
        uses: actions/github-script@v9
        env:
          PREVIEW_URL: ${{ steps.deploy-isolated.outputs.site_url }}
          UNIFIED_PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
          SIMPLE_PREVIEW_URL: ${{ steps.deploy-isolated.outputs.simple_url }}
          SENTINEL_PREVIEW_URL: ${{ steps.deploy-isolated.outputs.sentinel_url }}
          EXTENSION_PREVIEW_URL: ${{ steps.deploy-isolated.outputs.extension_url }}
        with:
          retries: 3
          script: |
            const previewUrl = process.env.PREVIEW_URL
            if (!previewUrl) {
              throw new Error('Cloudflare preview deploy succeeded but did not emit preview_url')
            }

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: 'github-pages',
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
              description: `PR #${context.payload.pull_request.number} preview`,
              payload: {
                pull_request: context.payload.pull_request.number,
                preview_url: previewUrl,
                unified_preview_url: process.env.UNIFIED_PREVIEW_URL,
                simple_preview_url: process.env.SIMPLE_PREVIEW_URL,
                sentinel_preview_url: process.env.SENTINEL_PREVIEW_URL,
                extension_preview_url: process.env.EXTENSION_PREVIEW_URL,
              },
            })

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment: 'github-pages',
              environment_url: previewUrl,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Cloudflare Pages preview deployed',
              auto_inactive: false,
            })

      - name: Detect nook-core/auth coverage input changes
        id: coverage-inputs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch origin "$BASE_SHA" "$HEAD_SHA" --no-tags --prune --depth=1000
          coverage/current/tools/nook-preflight coverage-inputs \
            --repository "$GITHUB_WORKSPACE" \
            --base "$BASE_SHA" \
            --head "$HEAD_SHA" \
            --github-output "$GITHUB_OUTPUT"

      - name: Resolve base coverage artifact
        if: steps.coverage-inputs.outputs.base_coverage_required == 'true'
        id: base-coverage-run
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        with:
          retries: 3
          script: |
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'main.yml',
              head_sha: process.env.BASE_SHA,
              event: 'push',
              status: 'success',
              per_page: 100,
            })
            const run = data.workflow_runs.find((candidate) =>
              candidate.head_sha === process.env.BASE_SHA && candidate.conclusion === 'success'
            )
            if (run) {
              core.info(`Using base coverage from Main run ${run.id}`)
              core.setOutput('run-id', String(run.id))
            } else {
              core.warning(`No successful Main run found for base ${process.env.BASE_SHA}`)
              core.setOutput('run-id', '')
            }

      - name: Download base coverage artifact
        if: >-
          steps.coverage-inputs.outputs.base_coverage_required == 'true' &&
          steps.base-coverage-run.outputs.run-id != ''
        id: download-base-coverage
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: nook-core-auth-coverage-${{ github.event.pull_request.base.sha }}
          path: coverage/base
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.base-coverage-run.outputs.run-id }}

      - name: Validate base coverage artifact
        if: always() && steps.coverage-inputs.outputs.base_coverage_required == 'true'
        id: base-coverage-artifact
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          coverage/current/tools/nook-preflight validate-coverage-artifact \
            --directory coverage/base \
            --commit "$BASE_SHA" \
            --github-output "$GITHUB_OUTPUT"

      - name: Export base nook-core/auth coverage fallback
        if: steps.coverage-inputs.outputs.base_coverage_required == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ "${{ steps.base-coverage-artifact.outputs.valid }}" = "true" ]; then
            exit 0
          fi
          rm -rf coverage/base
          git worktree prune
          rm -rf ../nook-base-coverage
          git worktree add --detach ../nook-base-coverage "$BASE_SHA"
          cleanup() {
            git worktree remove --force ../nook-base-coverage >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          # Use this branch's already-verified coverage export plumbing with the base source. Copy
          # the Bake graph as one unit: package targets reference cache variables and split bases
          # declared by the root files, so mixing new package HCL with the old combined graph fails
          # before BuildKit can reach the coverage target. Rust source remains at BASE_SHA.
          for file in \
            nook-app/docker-bake.hcl \
            nook-app/docker/base.docker-bake.hcl \
            nook-app/docker/base.Dockerfile \
            nook-app/docker/sccache-report.sh \
            nook-app/nook-core/Dockerfile \
            nook-app/nook-core/docker-bake.hcl \
            nook-app/nook-wasm/docker-bake.hcl \
            nook-app/docker/toolchain.docker-bake.hcl \
            nook-app/nook-web/nook-web-app/docker-bake.hcl; do
            cp "$file" "../nook-base-coverage/$file"
          done
          base_coverage_out="$PWD/coverage/base"
          task docker:coverage:export \
            REPO_ROOT="$PWD/../nook-base-coverage" \
            COVERAGE_OUT_DIR="$base_coverage_out" \
            WASM_BUILD_MODE=dev

      - name: Reuse current coverage as base
        if: steps.coverage-inputs.outputs.base_coverage_required == 'false'
        run: |
          set -euo pipefail
          rm -rf coverage/base
          mkdir -p coverage/base
          cp -a coverage/current/. coverage/base/

      - name: Summarize nook-core/auth coverage
        id: coverage
        run: |
          set -euo pipefail
          coverage/current/tools/nook-preflight coverage-report \
            --current coverage/current \
            --base coverage/base \
            --github-output "$GITHUB_OUTPUT" \
            --github-summary "$GITHUB_STEP_SUMMARY" \
            --markdown coverage/nook-core-summary.md

      - name: Upload nook-core/auth coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: nook-core-coverage
          path: |
            coverage/current
            coverage/base
            coverage/nook-core-summary.md

      - name: Comment nook-core/auth coverage on PR
        uses: actions/github-script@v9
        env:
          CURRENT: ${{ steps.coverage.outputs.current }}
          BASE: ${{ steps.coverage.outputs.base }}
          DELTA: ${{ steps.coverage.outputs.delta }}
          FLOOR: ${{ steps.coverage.outputs.floor }}
          STATUS: ${{ steps.coverage.outputs.status }}
        with:
          retries: 3
          script: |
            const sleep = (milliseconds) => new Promise((resolve) => setTimeout(resolve, milliseconds))
            const withBackoff = async (label, request) => {
              let lastError
              for (let attempt = 1; attempt <= 5; attempt += 1) {
                try {
                  return await request()
                } catch (error) {
                  lastError = error
                  if (attempt === 5) break
                  const delaySeconds = attempt * 15
                  core.warning(`${label} failed on attempt ${attempt}; retrying in ${delaySeconds}s`)
                  await sleep(delaySeconds * 1000)
                }
              }
              throw lastError
            }
            const marker = '<!-- nook-core-coverage -->'
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const verdict = process.env.STATUS === 'passed' ? 'PASS' : 'FAIL'
            const body = [
              marker,
              '### nook-core + nook-auth2 coverage',
              '',
              `${verdict}: line coverage ${process.env.STATUS}: ${process.env.CURRENT}% (floor ${process.env.FLOOR}%)`,
              '',
              '| Metric | Lines |',
              '| --- | ---: |',
              `| PR branch | ${process.env.CURRENT}% |`,
              `| Base branch | ${process.env.BASE}% |`,
              `| Delta | ${process.env.DELTA}% |`,
              `| Required floor | ${process.env.FLOOR}% |`,
              '',
              `Artifact: [nook-core-coverage](${runUrl})`,
            ].join('\n')

            const commentQuery = await withBackoff('Listing coverage comments', () => github.graphql(`
              query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    id
                    comments(last: 100) {
                      nodes { id body }
                    }
                  }
                }
              }
            `, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              number: context.payload.pull_request.number,
            }))
            const pullRequest = commentQuery.repository.pullRequest
            const existing = pullRequest.comments.nodes.find((comment) => comment.body?.includes(marker))
            if (existing) {
              await withBackoff('Updating the coverage comment', () => github.graphql(`
                mutation($id: ID!, $body: String!) {
                  updateIssueComment(input: { id: $id, body: $body }) {
                    issueComment { id }
                  }
                }
              `, { id: existing.id, body }))
            } else {
              await withBackoff('Creating the coverage comment', () => github.graphql(`
                mutation($subjectId: ID!, $body: String!) {
                  addComment(input: { subjectId: $subjectId, body: $body }) {
                    commentEdge { node { id } }
                  }
                }
              `, { subjectId: pullRequest.id, body }))
            }

      - name: Preserve cache telemetry
        if: always()
        uses: ./.github/actions/nook-cache-telemetry

  full-e2e:
    name: Full browser e2e (main fix)
    if: >-
      github.event.action != 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'ci:full-e2e')
    needs: wasm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          cache-write: "false"
          main-cache-only: "true"

      - name: Download verified WASM handoff
        uses: actions/download-artifact@v8
        with:
          name: pr-wasm-${{ github.run_id }}
          path: ${{ runner.temp }}/nook-ci-artifacts/joined/nook-wasm

      - name: Local-provider web e2e from verified WASM
        run: >-
          task ci:pr:e2e:web:artifacts
          CI_ARTIFACT_DIR=${{ runner.temp }}/nook-ci-artifacts/joined
          VITE_BASE=/
          VITE_SITE_URL=https://pr-${{ github.event.pull_request.number }}.nokey-sh.pages.dev
          VITE_PUBLIC_APP_URL=https://pr-${{ github.event.pull_request.number }}.nook-1n8.pages.dev
          VITE_SIMPLE_APP_URL=https://pr-${{ github.event.pull_request.number }}.nokey-simple.pages.dev
          VITE_SENTINEL_APP_URL=https://pr-${{ github.event.pull_request.number }}.nokey-sentinel.pages.dev
          VITE_VAULT_SYNC_INTERVAL_MS=500
          WASM_BUILD_MODE=dev
        env:
          CI: true
          GIT_COMMIT_ID: ${{ github.event.pull_request.head.sha }}
          NOOK_SIMPLE_VAULT_URL: https://pr-${{ github.event.pull_request.number }}.nokey-simple.pages.dev/
          NOOK_EXTENSION_E2E_SIMPLE_VAULT_URL: http://127.0.0.1:5174/
          NOOK_EXTENSION_CHANNEL: pr-${{ github.event.pull_request.number }}
          NOOK_EXTENSION_COMMIT: ${{ github.event.pull_request.head.sha }}
          NOOK_EXTENSION_SITE_URL: https://pr-${{ github.event.pull_request.number }}.nokey-sh.pages.dev/

      - name: Preserve cache telemetry
        if: always()
        uses: ./.github/actions/nook-cache-telemetry

  full-extension-e2e:
    name: Full extension e2e (main fix)
    if: >-
      github.event.action != 'closed' &&
      contains(github.event.pull_request.labels.*.name, 'ci:full-e2e')
    needs: wasm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          cache-write: "false"
          main-cache-only: "true"

      - name: Download verified WASM handoff
        uses: actions/download-artifact@v8
        with:
          name: pr-wasm-${{ github.run_id }}
          path: ${{ runner.temp }}/nook-ci-artifacts/joined/nook-wasm

      - name: Extension e2e from verified WASM
        run: >-
          task ci:pr:e2e:extension:artifacts
          CI_ARTIFACT_DIR=${{ runner.temp }}/nook-ci-artifacts/joined
          VITE_BASE=/
          VITE_SITE_URL=https://pr-${{ github.event.pull_request.number }}.nokey-sh.pages.dev
          VITE_PUBLIC_APP_URL=https://pr-${{ github.event.pull_request.number }}.nook-1n8.pages.dev
          VITE_SIMPLE_APP_URL=https://pr-${{ github.event.pull_request.number }}.nokey-simple.pages.dev
          VITE_SENTINEL_APP_URL=https://pr-${{ github.event.pull_request.number }}.nokey-sentinel.pages.dev
          VITE_VAULT_SYNC_INTERVAL_MS=500
          WASM_BUILD_MODE=dev
        env:
          CI: true
          GIT_COMMIT_ID: ${{ github.event.pull_request.head.sha }}
          NOOK_SIMPLE_VAULT_URL: https://pr-${{ github.event.pull_request.number }}.nokey-simple.pages.dev/
          NOOK_EXTENSION_E2E_SIMPLE_VAULT_URL: http://127.0.0.1:5174/
          NOOK_EXTENSION_CHANNEL: pr-${{ github.event.pull_request.number }}
          NOOK_EXTENSION_COMMIT: ${{ github.event.pull_request.head.sha }}
          NOOK_EXTENSION_SITE_URL: https://pr-${{ github.event.pull_request.number }}.nokey-sh.pages.dev/

      - name: Preserve cache telemetry
        if: always()
        uses: ./.github/actions/nook-cache-telemetry
