# Pull requests: pull toolchain cache, verify/build/e2e in one container, deploy preview.
# Toolchain publish runs on main only (ci:main:publish). PR and main CI run full local-provider e2e;
# nightly runs sync-live.
# Superseded runs (new push or PR close) are cancelled via concurrency below.

name: PR

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  deployments: write
  packages: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify and preview
    if: github.event.action != 'closed'
    runs-on: nook
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Docker setup
        uses: ./.github/actions/nook-docker-setup
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify and build preview
        run: task ci:pr VITE_BASE=/
        env:
          CI: true

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
          CF_PAGES_BRANCH: pr-${{ github.event.pull_request.number }}
        run: |
          # Deploy runs inside the app container (dist is in-image, no bind mount). Capture the
          # preview URL from the container's stdout marker and hand it to the comment step.
          # Do NOT let `bash -e` abort on the command substitution: on a deploy failure we must still
          # print the container output (it holds the real error) before failing the step.
          set +e
          out="$(task ci:pr:deploy-preview VITE_BASE=/ 2>&1)"
          status=$?
          set -e
          echo "$out"
          if [ "$status" -ne 0 ]; then
            echo "::error::Cloudflare preview deploy failed (exit $status)"
            exit "$status"
          fi
          # Strip ANSI codes before matching the marker (defensive; the container already sanitizes).
          clean="$(printf '%s' "$out" | sed -E 's/\x1b\[[0-9;]*[a-zA-Z]//g')"
          url="$(printf '%s' "$clean" | grep -oE 'NOOK_PREVIEW_URL=https://[^ ]+' | sed 's/NOOK_PREVIEW_URL=//' | tail -1)"
          echo "preview_url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: steps.deploy.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        run: task ci:pr:comment-preview

      - name: Record github-pages deployment
        if: steps.deploy.outcome == 'success'
        uses: actions/github-script@v9
        env:
          PREVIEW_URL: ${{ steps.deploy.outputs.preview_url }}
        with:
          script: |
            const previewUrl = process.env.PREVIEW_URL
            if (!previewUrl) {
              throw new Error('Cloudflare preview deploy succeeded but did not emit preview_url')
            }

            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
              environment: 'github-pages',
              auto_merge: false,
              required_contexts: [],
              transient_environment: true,
              production_environment: false,
              description: `PR #${context.payload.pull_request.number} preview`,
              payload: {
                pull_request: context.payload.pull_request.number,
                preview_url: previewUrl,
              },
            })

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: 'success',
              environment: 'github-pages',
              environment_url: previewUrl,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Cloudflare Pages preview deployed',
              auto_inactive: false,
            })

      - name: Export PR nook-core coverage
        run: task docker:extract:coverage COVERAGE_OUT_DIR=coverage/current
        env:
          CI: true

      - name: Export base nook-core coverage
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch origin "+$BASE_REF:refs/remotes/origin/$BASE_REF" --depth=1
          git worktree prune
          rm -rf ../nook-base-coverage
          git worktree add --detach ../nook-base-coverage "origin/$BASE_REF"
          cleanup() {
            git worktree remove --force ../nook-base-coverage >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          # Measure base source coverage in the base worktree's own layout. The PR image above
          # already verifies this branch's current Dockerfile/task plumbing.
          (
            cd ../nook-base-coverage
            task setup VITE_BASE=/
          )
          base_coverage_out="$PWD/coverage/base"
          (
            cd ../nook-base-coverage
            task docker:extract:coverage COVERAGE_OUT_DIR="$base_coverage_out"
          )

      - name: Summarize nook-core coverage
        id: coverage
        run: |
          set -euo pipefail
          read_lines_percent() {
            awk '/^TOTAL[[:space:]]/ { gsub("%", "", $10); print $10; found=1 } END { if (!found) exit 1 }' "$1"
          }
          current="$(read_lines_percent coverage/current/summary.txt)"
          base="$(read_lines_percent coverage/base/summary.txt)"
          floor="$(awk -F: '/"lines_percent"/ { gsub(/[, ]/, "", $2); print $2; exit }' coverage/current/coverage-floor.json)"
          delta="$(awk -v current="$current" -v base="$base" 'BEGIN { printf "%+.2f", current - base }')"
          if awk -v current="$current" -v floor="$floor" 'BEGIN { exit current + 0 >= floor + 0 ? 0 : 1 }'; then
            status="passed"
          else
            status="failed"
          fi

          {
            echo "current=$current"
            echo "base=$base"
            echo "delta=$delta"
            echo "floor=$floor"
            echo "status=$status"
          } >> "$GITHUB_OUTPUT"

          mkdir -p coverage
          {
            echo "### nook-core coverage"
            echo
            echo "| Metric | Lines |"
            echo "| --- | ---: |"
            echo "| PR branch | ${current}% |"
            echo "| Base branch | ${base}% |"
            echo "| Delta | ${delta}% |"
            echo "| Required floor | ${floor}% |"
            echo
            echo "Artifact: \`nook-core-coverage\`"
          } > coverage/nook-core-summary.md
          cat coverage/nook-core-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload nook-core coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: nook-core-coverage
          path: |
            coverage/current
            coverage/base
            coverage/nook-core-summary.md

      - name: Comment nook-core coverage on PR
        uses: actions/github-script@v9
        env:
          CURRENT: ${{ steps.coverage.outputs.current }}
          BASE: ${{ steps.coverage.outputs.base }}
          DELTA: ${{ steps.coverage.outputs.delta }}
          FLOOR: ${{ steps.coverage.outputs.floor }}
          STATUS: ${{ steps.coverage.outputs.status }}
        with:
          script: |
            const marker = '<!-- nook-core-coverage -->'
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const verdict = process.env.STATUS === 'passed' ? 'PASS' : 'FAIL'
            const body = [
              marker,
              '### nook-core coverage',
              '',
              `${verdict}: line coverage ${process.env.STATUS}: ${process.env.CURRENT}% (floor ${process.env.FLOOR}%)`,
              '',
              '| Metric | Lines |',
              '| --- | ---: |',
              `| PR branch | ${process.env.CURRENT}% |`,
              `| Base branch | ${process.env.BASE}% |`,
              `| Delta | ${process.env.DELTA}% |`,
              `| Required floor | ${process.env.FLOOR}% |`,
              '',
              `Artifact: [nook-core-coverage](${runUrl})`,
            ].join('\n')

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            })
            const existing = comments.find((comment) => comment.body?.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
