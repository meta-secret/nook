# Tiny smoke for agentic-ai/ci-agent exit behavior.
# Triggered by issues labeled `ci-agent-smoke` (or opened with that label),
# and by workflow_dispatch. Must live on the default branch to receive issue events.

name: CI agent smoke

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-agent-smoke
  cancel-in-progress: true

jobs:
  smoke:
    name: Exit and unit smoke
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && (
        contains(join(github.event.issue.labels.*.name, ','), 'ci-agent-smoke') ||
        contains(github.event.label.name, 'ci-agent-smoke')
      ))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: agentic-ai/ci-agent/package-lock.json

      - name: Install and unit-test ci-agent
        working-directory: agentic-ai/ci-agent
        run: |
          npm ci
          npm test

      - name: Verify exitCiAgent kills open handles
        working-directory: agentic-ai/ci-agent
        run: |
          set -euo pipefail
          cat > /tmp/ci-agent-exit-smoke.mjs <<'EOF'
          import { spawn } from 'node:child_process'

          const script = `
          import { exitCiAgent } from './dist/main/exit.js'
          setInterval(() => {}, 1000)
          console.log('smoke: about to exitCiAgent(0)')
          exitCiAgent(0)
          console.log('smoke: UNREACHABLE')
          `

          const child = spawn(process.execPath, ['--input-type=module', '-e', script], {
            cwd: process.cwd(),
            stdio: ['ignore', 'pipe', 'pipe'],
          })

          let out = ''
          child.stdout.on('data', (d) => { out += d })
          child.stderr.on('data', (d) => { out += d })

          const started = Date.now()
          const result = await new Promise((resolve) => {
            const timer = setTimeout(() => {
              child.kill('SIGKILL')
              resolve({ hung: true, code: null, ms: Date.now() - started, out })
            }, 5000)
            child.on('exit', (code, signal) => {
              clearTimeout(timer)
              resolve({ hung: false, code, signal, ms: Date.now() - started, out })
            })
          })

          console.log(JSON.stringify(result, null, 2))
          if (result.hung || result.code !== 0) {
            console.error('FAIL: exitCiAgent did not terminate cleanly')
            process.exit(1)
          }
          console.log('PASS: exitCiAgent terminated despite open handles')
          EOF
          node /tmp/ci-agent-exit-smoke.mjs

      - name: Comment smoke result on issue
        if: github.event_name == 'issues' && always()
        uses: actions/github-script@v9
        with:
          script: |
            const marker = '<!-- ci-agent-smoke -->'
            const conclusion = '${{ job.status }}'
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const body = [
              marker,
              '### CI agent smoke',
              '',
              `Job status: **${conclusion}**`,
              '',
              `- Unit tests + \`exitCiAgent\` open-handle smoke`,
              `- Runner: \`ubuntu-latest\``,
              '',
              `[View run](${runUrl})`,
            ].join('\n')
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            })
