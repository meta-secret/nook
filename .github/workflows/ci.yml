# CI: build + check, Playwright e2e (local dev server), GitHub Pages deploy.
#
# Playwright does not hit the Pages preview — it starts `vite dev` on localhost.
# PR previews deploy to GitHub Pages (preview URL commented on the PR) so developers
# can open a live build without running locally.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Cache Env
        run: |
          echo "CACHE_IMAGE=$(echo "ghcr.io/${{ github.repository }}-cache" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build toolchain image and install dependencies
        run: task setup
        env:
          CACHE_FROM: type=registry,ref=${{ env.CACHE_IMAGE }}:latest
          CACHE_TO: type=registry,ref=${{ env.CACHE_IMAGE }}:latest,mode=max

      - name: Check
        run: task check

      - name: Set Vite base path
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "VITE_BASE=/${{ github.event.repository.name }}/" >> $GITHUB_ENV
          else
            echo "VITE_BASE=/" >> $GITHUB_ENV
          fi

      - name: Build web for GitHub Pages
        run: task web:build VITE_BASE="${{ env.VITE_BASE }}"

      - name: Upload Pages artifact
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: actions/upload-pages-artifact@v3
        with:
          path: nook-web/dist

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Cache Env
        run: |
          echo "CACHE_IMAGE=$(echo "ghcr.io/${{ github.repository }}-cache" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build toolchain and install dependencies
        run: task setup
        env:
          CACHE_FROM: type=registry,ref=${{ env.CACHE_IMAGE }}:latest
          CACHE_TO: type=registry,ref=${{ env.CACHE_IMAGE }}:latest,mode=max

      - name: Run Playwright e2e
        run: task web:test:e2e
        env:
          CI: true
          NOOK_GITHUB_PAT: ${{ secrets.NOOK_GITHUB_PAT }}

  deploy:
    name: Deploy GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-preview:
    name: Deploy preview
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy preview
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          preview: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Comment preview URL on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_URL: ${{ steps.deployment.outputs.page_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bun run .github/scripts/comment-preview-url.ts
