# CI: build + check, Playwright e2e (local dev server), GitHub Pages deploy.
#
# Playwright does not hit the preview — it starts `vite dev` on localhost.
# PR previews deploy to Cloudflare Pages (one subdomain per PR, e.g.
# https://pr-123.nook.pages.dev) because GitHub Pages previews resolve to the
# production custom domain (nokey.sh) and cannot serve /nook/pr123 paths.
#
# deploy-preview runs in parallel with build/e2e (no needs:) and uses
# continue-on-error so a preview is still attempted when tests fail.
#
# Concurrency + cancel-workflow-action: a new push to the same PR (or merge)
# cancels superseded in-progress runs so CI does not stack redundant work.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write
  pull-requests: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cancel-on-close:
    name: Cancel PR runs on close
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Cancel in-progress and queued runs for this branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const statuses = ['in_progress', 'queued', 'waiting', 'pending'];
            const runIds = new Set();

            for (const status of statuses) {
              let page = 1;
              while (true) {
                const { data } = await github.rest.actions.listWorkflowRuns({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'ci.yml',
                  branch,
                  status,
                  per_page: 100,
                  page,
                });

                for (const run of data.workflow_runs) {
                  if (run.id !== context.runId) {
                    runIds.add(run.id);
                  }
                }

                if (data.workflow_runs.length < 100) break;
                page += 1;
              }
            }

            await Promise.all(
              [...runIds].map((run_id) =>
                github.rest.actions.cancelWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id,
                }),
              ),
            );

  build:
    name: Build and test
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Cancel superseded workflow runs
        if: github.event_name == 'pull_request'
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Cache Env
        run: |
          echo "CACHE_IMAGE=$(echo "ghcr.io/${{ github.repository }}-cache" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build toolchain image and install dependencies
        run: task setup
        env:
          CACHE_FROM: type=registry,ref=${{ env.CACHE_IMAGE }}:latest
          CACHE_TO: type=registry,ref=${{ env.CACHE_IMAGE }}:latest,mode=max

      - name: Check
        run: task check

      - name: Set Vite base path
        run: |
          # Production (nokey.sh) and Cloudflare PR previews both serve from /.
          echo "VITE_BASE=/" >> $GITHUB_ENV

      - name: Build web for GitHub Pages
        run: task web:build VITE_BASE="${{ env.VITE_BASE }}"

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: nook-web/dist

  e2e:
    name: E2E tests
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Cancel superseded workflow runs
        if: github.event_name == 'pull_request'
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Cache Env
        run: |
          echo "CACHE_IMAGE=$(echo "ghcr.io/${{ github.repository }}-cache" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build toolchain and install dependencies
        run: task setup
        env:
          CACHE_FROM: type=registry,ref=${{ env.CACHE_IMAGE }}:latest
          CACHE_TO: type=registry,ref=${{ env.CACHE_IMAGE }}:latest,mode=max

      - name: Run Playwright e2e
        run: task web:test:e2e
        env:
          CI: true
          NOOK_GITHUB_PAT: ${{ secrets.NOOK_GITHUB_PAT }}
          # One repo per workflow run — all suites share it; vault YAML reset between suites.
          NOOK_GITHUB_E2E_REPO: nook-e2e-${{ github.run_id }}
          # Slow polling to minimize PAT rate-limit usage (~3s between GitHub API polls).
          NOOK_GITHUB_POLL_MS: '3000'
          NOOK_GITHUB_SYNC_TIMEOUT_MS: '15000'
          NOOK_GITHUB_CONNECT_TIMEOUT_MS: '30000'

  deploy:
    name: Deploy GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-preview:
    name: Deploy preview
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: write
      pull-requests: write
      actions: write
    steps:
      - name: Cancel superseded workflow runs
        uses: styfle/cancel-workflow-action@0.12.1
        with:
          access_token: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Cache Env
        run: |
          echo "CACHE_IMAGE=$(echo "ghcr.io/${{ github.repository }}-cache" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build toolchain and web app for preview
        run: |
          task setup
          task web:build VITE_BASE=/
        env:
          CACHE_FROM: type=registry,ref=${{ env.CACHE_IMAGE }}:latest
          CACHE_TO: type=registry,ref=${{ env.CACHE_IMAGE }}:latest,mode=max

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          bunx wrangler@4 pages project create nook --production-branch=main 2>/dev/null || true
          deploy_output="$(
            bunx wrangler@4 pages deploy nook-web/dist \
              --project-name=nook \
              --branch="pr-${{ github.event.pull_request.number }}" 2>&1
          )"
          echo "$deploy_output"
          deployment_url="$(
            echo "$deploy_output" \
              | grep -oE 'Deployment alias URL: https://[^ ]+' \
              | sed 's/Deployment alias URL: //' \
              | tail -1
          )"
          if [ -z "$deployment_url" ]; then
            echo "Could not parse Cloudflare deployment alias URL" >&2
            exit 1
          fi
          echo "deployment-url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: steps.deploy.outputs.deployment-url != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bun run .github/scripts/comment-preview-url.ts
