name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Cache Env
        run: |
          echo "CACHE_IMAGE=$(echo "ghcr.io/${{ github.repository }}-cache" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build toolchain image and install dependencies
        run: task setup
        env:
          CACHE_FROM: type=registry,ref=${{ env.CACHE_IMAGE }}:latest
          CACHE_TO: type=registry,ref=${{ env.CACHE_IMAGE }}:latest,mode=max

      - name: Check
        run: task check

      - name: Build web for GitHub Pages
        run: task web:build VITE_BASE="/"

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: nook-web/dist

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Cache Env
        run: |
          echo "CACHE_IMAGE=$(echo "ghcr.io/${{ github.repository }}-cache" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build WASM and install web dependencies
        run: |
          task setup
          task wasm:build
          rm -rf nook-web/node_modules
          cd nook-web && bun install
        env:
          CACHE_FROM: type=registry,ref=${{ env.CACHE_IMAGE }}:latest
          CACHE_TO: type=registry,ref=${{ env.CACHE_IMAGE }}:latest,mode=max

      - name: Install Playwright browsers
        run: cd nook-web && bunx playwright install --with-deps chromium

      - name: Run Playwright e2e
        run: cd nook-web && bun run test:e2e
        env:
          NOOK_GITHUB_PAT: ${{ secrets.NOOK_GITHUB_PAT }}

      - name: Clean up e2e GitHub repos
        if: always()
        run: cd nook-web && bun run test:e2e:cleanup
        env:
          NOOK_GITHUB_PAT: ${{ secrets.NOOK_GITHUB_PAT }}

  deploy:
    name: Deploy GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
