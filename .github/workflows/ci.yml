# CI: build + check, Playwright e2e (local dev server), GitHub Pages deploy.
#
# Playwright does not hit the preview — it starts `vite dev` on localhost.
# PR previews deploy to Cloudflare Pages (one subdomain per PR, e.g.
# https://pr-123.nook.pages.dev) because GitHub Pages previews resolve to the
# production custom domain (nokey.sh) and cannot serve /nook/pr123 paths.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Cache Env
        run: |
          echo "CACHE_IMAGE=$(echo "ghcr.io/${{ github.repository }}-cache" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build toolchain image and install dependencies
        run: task setup
        env:
          CACHE_FROM: type=registry,ref=${{ env.CACHE_IMAGE }}:latest
          CACHE_TO: type=registry,ref=${{ env.CACHE_IMAGE }}:latest,mode=max

      - name: Check
        run: task check

      - name: Set Vite base path
        run: |
          # Production (nokey.sh) and Cloudflare PR previews both serve from /.
          echo "VITE_BASE=/" >> $GITHUB_ENV

      - name: Build web for GitHub Pages
        run: task web:build VITE_BASE="${{ env.VITE_BASE }}"

      - name: Upload preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: nook-web-dist
          path: nook-web/dist

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: nook-web/dist

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Task
        uses: arduino/setup-task@v2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Cache Env
        run: |
          echo "CACHE_IMAGE=$(echo "ghcr.io/${{ github.repository }}-cache" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build toolchain and install dependencies
        run: task setup
        env:
          CACHE_FROM: type=registry,ref=${{ env.CACHE_IMAGE }}:latest
          CACHE_TO: type=registry,ref=${{ env.CACHE_IMAGE }}:latest,mode=max

      - name: Run Playwright e2e
        run: task web:test:e2e
        env:
          CI: true
          NOOK_GITHUB_PAT: ${{ secrets.NOOK_GITHUB_PAT }}
          NOOK_GITHUB_E2E_REPO: nook-e2e-${{ github.run_id }}
          NOOK_GITHUB_POLL_MS: '5000'
          NOOK_GITHUB_SYNC_TIMEOUT_MS: '30000'
          NOOK_GITHUB_CONNECT_TIMEOUT_MS: '90000'

  deploy:
    name: Deploy GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-preview:
    name: Deploy preview
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download preview artifact
        uses: actions/download-artifact@v4
        with:
          name: nook-web-dist
          path: nook-web/dist

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Deploy to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUD_FLARE_PAGES_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUD_FLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          bunx wrangler@4 pages project create nook --production-branch=main 2>/dev/null || true
          deploy_output="$(
            bunx wrangler@4 pages deploy nook-web/dist \
              --project-name=nook \
              --branch="pr-${{ github.event.pull_request.number }}" 2>&1
          )"
          echo "$deploy_output"
          deployment_url="$(
            echo "$deploy_output" \
              | grep -oE 'Deployment alias URL: https://[^ ]+' \
              | sed 's/Deployment alias URL: //' \
              | tail -1
          )"
          if [ -z "$deployment_url" ]; then
            echo "Could not parse Cloudflare deployment alias URL" >&2
            exit 1
          fi
          echo "deployment-url=$deployment_url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_URL: ${{ steps.deploy.outputs.deployment-url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bun run .github/scripts/comment-preview-url.ts
