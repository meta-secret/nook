version: '3'

vars:
  DOCKER: '{{default "docker" .DOCKER}}'
  DOCKER_IMAGE:
    sh: |
      if [ -n "${DOCKER_IMAGE:-}" ]; then
        printf '%s' "${DOCKER_IMAGE}"
      elif [ -f .nook/docker-image ]; then
        cat .nook/docker-image
      else
        printf '%s' "nook-build:local"
      fi
  TOOLCHAIN_REGISTRY: '{{default "ghcr.io/meta-secret/nook/toolchain" .TOOLCHAIN_REGISTRY}}'
  # dev (default): skip setup when nook-build:local exists. ci: pull :latest or registry bake (see toolchain-setup.sh).
  NOOK_ENV: '{{default "dev" .NOOK_ENV}}'
  VITE_BASE: '{{default "/" .VITE_BASE}}'
  VITE_VAULT_SYNC_INTERVAL_MS: '{{default "" .VITE_VAULT_SYNC_INTERVAL_MS}}'

includes:
  docker:
    taskfile: .task/docker.yml
    flatten: true
  ci:
    taskfile: .task/ci.yml
    flatten: true
  agentic-ai:
    taskfile: .task/agentic-ai.yml
    flatten: true
  core:
    taskfile: .task/core.yml
    flatten: true
  wasm:
    taskfile: .task/wasm.yml
    flatten: true
  web:
    taskfile: .task/web.yml
    flatten: true

tasks:
  default:
    desc: Build every project.
    cmds:
      - task: build

  setup:
    desc: Build or pull linux/amd64 toolchain (dev loads local; ci pulls :latest or registry bake).
    env:
      TOOLCHAIN_REGISTRY: '{{.TOOLCHAIN_REGISTRY}}'
      NOOK_ENV: '{{.NOOK_ENV}}'
    cmds:
      - bash .github/scripts/toolchain-setup.sh {{.ROOT_DIR}}
