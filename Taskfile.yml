version: '3'

vars:
  DOCKER: '{{default "docker" .DOCKER}}'
  DOCKER_IMAGE: '{{default "nook-build:local" .DOCKER_IMAGE}}'
  TOOLCHAIN_REGISTRY: '{{default "ghcr.io/meta-secret/nook/toolchain" .TOOLCHAIN_REGISTRY}}'
  # dev (default): skip setup when nook-build:local exists. ci: always build (set in CI via GITHUB_ENV).
  NOOK_ENV: '{{default "dev" .NOOK_ENV}}'
  VITE_BASE: '{{default "/" .VITE_BASE}}'
  VITE_VAULT_SYNC_INTERVAL_MS: '{{default "" .VITE_VAULT_SYNC_INTERVAL_MS}}'

tasks:
  default:
    desc: Build every project.
    cmds:
      - task: build

  setup:
    desc: Build linux/amd64 toolchain (dev skips when image exists; ci always builds with GHCR cache).
    env:
      TOOLCHAIN_REGISTRY: '{{.TOOLCHAIN_REGISTRY}}'
      NOOK_ENV: '{{.NOOK_ENV}}'
    cmds:
      - >-
        sh -c 'IMAGE="{{.DOCKER_IMAGE}}"; REG="{{.TOOLCHAIN_REGISTRY}}"; ENV="{{.NOOK_ENV}}";
        if [ "$ENV" = "dev" ] && {{.DOCKER}} image inspect "$IMAGE" >/dev/null 2>&1; then
          echo "==> Toolchain image present; skipping setup (NOOK_ENV=dev).";
          exit 0;
        fi;
        echo "==> Building toolchain (NOOK_ENV=$ENV) ...";
        TOOLCHAIN_REGISTRY="$REG" {{.DOCKER}} buildx bake -f docker-bake.hcl toolchain'

  ci:pr:
    desc: PR CI — prepare once, then verify and web build in parallel (separate containers).
    deps:
      - setup
    cmds:
      - task: ci:pr:prepare
      - task: ci:pr:parallel

  ci:pr:publish:
    desc: PR CI verify, then push toolchain to GHCR on success (buildx registry push).
    cmds:
      - task: ci:pr
      - task: docker:push:ci

  ci:main:prepare:
    desc: Toolchain setup, format check, and wasm build (shared artifacts for parallel tracks).
    deps:
      - setup
    cmds:
      - task: ci:pr:prepare

  ci:main:
    desc: Main branch CI — prepare once, then verify ‖ web build ‖ e2e in parallel containers.
    cmds:
      - task: ci:main:prepare
      - task: ci:main:finish

  ci:main:finish:
    desc: Verify ‖ web build ‖ e2e (local ‖ github) — each track in its own Docker container.
    deps:
      - ci:main:parallel
      - ci:main:e2e:parallel

  ci:main:e2e:parallel:
    desc: Playwright local and GitHub projects in parallel (isolated containers, no host :5173).
    deps:
      - web:test:e2e:local:parallel
      - web:test:e2e:github:parallel

  ci:main:build:
    desc: Format, wasm, and parallel verify/web build only (no e2e).
    cmds:
      - task: ci:main:prepare
      - task: ci:main:parallel

  ci:main:parallel:
    desc: Lint/test and production web build in parallel after ci:pr:prepare.
    deps:
      - ci:verify:parallel
      - web:build:parallel

  ci:main:publish:
    desc: Main CI verify/build/e2e, then push toolchain to GHCR on success.
    cmds:
      - task: ci:main
      - task: docker:push:ci

  ci:pr:deploy-preview:
    desc: Deploy nook-web/dist to Cloudflare Pages (CI; runs on host after docker build).
    cmds:
      - task: _deploy-preview

  ci:pr:comment-preview:
    desc: Comment or update Cloudflare preview URL on the PR (CI; runs on host).
    cmds:
      - task: _comment-preview

  docker:push:ci:
    desc: Push toolchain image when TOOLCHAIN_REGISTRY is set (after green ci:pr).
    env:
      PUSH_TOOLCHAIN: "1"
    cmds:
      - task: docker:push

  ci:pr:prepare:
    desc: Format check and wasm build in one container (shared artifacts for parallel tracks).
    cmds:
      - task: docker:task
        vars: { TASK: _ci:pr:prepare }

  ci:pr:parallel:
    desc: Lint, test, and production web build in parallel after ci:pr:prepare.
    deps:
      - ci:verify:parallel
      - web:build:parallel

  ci:verify:parallel:
    desc: Lint and test in Docker without rebuilding wasm.
    cmds:
      - task: docker:task
        vars: { TASK: _verify:parallel }

  web:build:parallel:
    desc: Production web build in Docker without rebuilding wasm.
    cmds:
      - task: docker:task
        vars: { TASK: _web:build:parallel }

  ci:verify:
    desc: Format, lint, and test in Docker (no web production build).
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _verify }

  build:
    desc: Build Rust crates, wasm package, and web app in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _build }

  test:
    desc: Run all test suites in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _test }

  lint:
    desc: Run all linters in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _lint }

  check:
    desc: Run formatting, linting, tests, and builds in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _check }

  format:
    desc: Format all projects in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _format }

  format:check:
    desc: Check formatting for all projects in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _format:check }

  rust:build:
    desc: Build the Rust workspace in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _rust:build }

  rust:test:
    desc: Test the Rust workspace in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _rust:test }

  rust:lint:
    desc: Lint the Rust workspace in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _rust:lint }

  wasm:build:
    desc: Build nook-wasm for the web app in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _wasm:build }

  web:install:
    desc: Install web dependencies in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _web:install }

  web:build:
    desc: Build the Svelte app in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _web:build }

  web:check:
    desc: Run Svelte and TypeScript checks in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _web:check }

  web:test:
    desc: Run web unit tests in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _web:test }

  web:test:e2e:
    desc: Run full Playwright e2e suite in Docker (requires NOOK_GITHUB_PAT for GitHub suites).
    deps:
      - setup
    cmds:
      - task: docker:e2e:run
        vars: { TASK: _web:test:e2e }

  web:test:e2e:parallel:
    desc: Run local ‖ GitHub Playwright projects in parallel Docker containers (ci:main).
    cmds:
      - task: ci:main:e2e:parallel

  web:test:e2e:local:
    desc: Run local-only Playwright e2e in Docker (no GitHub PAT required).
    deps:
      - setup
    cmds:
      - task: docker:e2e:run
        vars: { TASK: _web:test:e2e:local }

  web:test:e2e:local:parallel:
    desc: Local Playwright project in Docker when wasm is already built (no host port publish).
    cmds:
      - task: docker:e2e:run
        vars: { TASK: _web:test:e2e:local:parallel }

  web:test:e2e:github:
    desc: Run GitHub vault Playwright e2e in Docker.
    deps:
      - setup
    cmds:
      - task: docker:e2e:run
        vars: { TASK: _web:test:e2e:github }

  web:test:e2e:github:parallel:
    desc: GitHub Playwright project in Docker when wasm is already built (set NOOK_GITHUB_E2E_REPO per run).
    cmds:
      - task: docker:e2e:run
        vars: { TASK: _web:test:e2e:github:parallel }

  web:test:e2e:multi-device:
    desc: Run multi-device Playwright e2e in Docker.
    deps:
      - setup
    cmds:
      - task: docker:e2e:run
        vars: { TASK: _web:test:e2e:multi-device }

  web:lint:
    desc: Lint the web app in Docker.
    deps:
      - setup
    cmds:
      - task: docker:task
        vars: { TASK: _web:lint }

  web:dev:
    desc: Start the Svelte dev server in Docker.
    deps:
      - setup
    cmds:
      - task: docker:web:dev

  docker:build:
    desc: Alias for setup (build linux/amd64 toolchain image).
    cmds:
      - task: setup

  docker:push:
    desc: Push :latest via buildx registry output (dedupes with buildcache; after green CI).
    env:
      TOOLCHAIN_REGISTRY: '{{.TOOLCHAIN_REGISTRY}}'
    cmds:
      - >-
        sh -c 'test -n "${PUSH_TOOLCHAIN:-}" && test -n "${TOOLCHAIN_REGISTRY:-}" || exit 0;
        TOOLCHAIN_REGISTRY="${TOOLCHAIN_REGISTRY}" {{.DOCKER}} buildx bake -f docker-bake.hcl toolchain-push'

  docker:task:
    internal: true
    env:
      VITE_BASE: '{{.VITE_BASE}}'
      VITE_VAULT_SYNC_INTERVAL_MS: '{{.VITE_VAULT_SYNC_INTERVAL_MS}}'
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        --ipc=host
        -e VITE_BASE="{{.VITE_BASE}}"
        -e VITE_VAULT_SYNC_INTERVAL_MS="{{.VITE_VAULT_SYNC_INTERVAL_MS}}"
        -e NOOK_GITHUB_PAT
        -e CI
        -e NOOK_GITHUB_E2E_REPO
        -e NOOK_GITHUB_POLL_MS
        -e NOOK_GITHUB_SYNC_TIMEOUT_MS
        -e NOOK_GITHUB_CONNECT_TIMEOUT_MS
        -e CLOUDFLARE_API_TOKEN
        -e CLOUDFLARE_ACCOUNT_ID
        -e CF_PAGES_BRANCH
        -e GITHUB_TOKEN
        -e GITHUB_REPOSITORY
        -e PR_NUMBER
        -e PREVIEW_URL
        -v "{{.ROOT_DIR}}:/workspace"
        -v /workspace/nook-web/node_modules
        -w /workspace
        {{.DOCKER_IMAGE}}
        task {{.TASK}}

  docker:e2e:run:
    desc: Run Playwright in Docker — Vite dev server stays on 127.0.0.1:5173 inside the container (no -p publish).
    internal: true
    env:
      VITE_BASE: '{{.VITE_BASE}}'
      VITE_VAULT_SYNC_INTERVAL_MS: '{{.VITE_VAULT_SYNC_INTERVAL_MS}}'
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        --ipc=host
        -e VITE_BASE="{{.VITE_BASE}}"
        -e VITE_VAULT_SYNC_INTERVAL_MS="{{.VITE_VAULT_SYNC_INTERVAL_MS}}"
        -e NOOK_GITHUB_PAT
        -e CI
        -e NOOK_GITHUB_E2E_REPO
        -e NOOK_GITHUB_POLL_MS
        -e NOOK_GITHUB_SYNC_TIMEOUT_MS
        -e NOOK_GITHUB_CONNECT_TIMEOUT_MS
        -v "{{.ROOT_DIR}}:/workspace"
        -v /workspace/nook-web/node_modules
        -w /workspace
        {{.DOCKER_IMAGE}}
        task {{.TASK}}

  docker:web:dev:
    internal: true
    cmds:
      - >-
        {{.DOCKER}} run --rm
        --platform linux/amd64
        -e VITE_BASE="{{.VITE_BASE}}"
        -p 5173:5173
        -v "{{.ROOT_DIR}}:/workspace"
        -v /workspace/nook-web/node_modules
        -w /workspace
        {{.DOCKER_IMAGE}}
        sh -c "cd nook-web && bun install && task _web:dev"

  _build:
    desc: Build Rust crates, wasm package, and web app.
    cmds:
      - task: _rust:build
      - task: _web:build

  _test:
    desc: Run all test suites.
    cmds:
      - task: _rust:test
      - task: _web:check
      - task: _web:test

  _lint:
    desc: Run all linters.
    cmds:
      - task: _rust:lint
      - task: _web:lint

  _check:
    desc: Run formatting, linting, tests, and builds.
    cmds:
      - task: _format:check
      - task: _lint
      - task: _test
      - task: _build

  _verify:
    desc: Format, lint, and test without production web build.
    cmds:
      - task: _format:check
      - task: _lint
      - task: _test

  _ci:pr:prepare:
    desc: Shared PR prep — format and wasm before parallel verify/build containers.
    cmds:
      - task: _format:check
      - task: _wasm:build

  _deploy-preview:
    desc: Deploy nook-web/dist to Cloudflare Pages; writes URL to .cloudflare-preview-url.
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        test -n "${CLOUDFLARE_API_TOKEN:-}" && test -n "${CLOUDFLARE_ACCOUNT_ID:-}" && test -n "${CF_PAGES_BRANCH:-}";
        if [ ! -d nook-web/dist ]; then
          echo "error: nook-web/dist not found — run the web build before deploy" >&2;
          exit 1;
        fi;
        bunx wrangler@4 pages project create nook --production-branch=main >/dev/null 2>&1 || true;
        set +e;
        deploy_output="$(
          bunx wrangler@4 pages deploy nook-web/dist \
            --project-name=nook \
            --branch="${CF_PAGES_BRANCH}" \
            --commit-dirty=true 2>&1
        )";
        deploy_status=$?;
        set -e;
        echo "$deploy_output";
        if [ "$deploy_status" -ne 0 ]; then
          log_dir="${HOME:-/root}/.config/.wrangler/logs";
          if [ -d "$log_dir" ]; then
            latest_log="$(ls -t "$log_dir"/wrangler-*.log 2>/dev/null | head -1 || true)";
            if [ -n "$latest_log" ]; then
              echo "wrangler log ($latest_log):" >&2;
              cat "$latest_log" >&2;
            fi;
          fi;
          exit "$deploy_status";
        fi;
        deployment_url="$(
          echo "$deploy_output" \
            | grep -oE "Deployment alias URL: https://[^ ]+" \
            | sed "s/Deployment alias URL: //" \
            | tail -1
        )";
        if [ -z "$deployment_url" ]; then
          deployment_url="$(
            echo "$deploy_output" \
              | grep -oE "https://[a-zA-Z0-9.-]+\.pages\.dev[^ ]*" \
              | tail -1
          )";
        fi;
        if [ -z "$deployment_url" ]; then
          echo "Could not parse Cloudflare deployment URL from wrangler output" >&2;
          exit 1;
        fi;
        echo "$deployment_url" > .cloudflare-preview-url'

  _comment-preview:
    desc: Comment or update Cloudflare preview URL on the PR.
    cmds:
      - >-
        bash -c 'set -euo pipefail;
        export PREVIEW_URL="${PREVIEW_URL:-$(cat .cloudflare-preview-url)}";
        bun run .github/scripts/comment-preview-url.ts'

  _verify:parallel:
    desc: Lint and test when wasm is already built (ci:pr parallel track).
    cmds:
      - task: _lint:parallel
      - task: _test:parallel

  _lint:parallel:
    desc: Web linters only — Rust clippy already runs in the toolchain docker build warm-up.
    cmds:
      - task: _web:lint:parallel

  _test:parallel:
    desc: Rust and web tests when wasm is already built (ci:pr parallel track).
    cmds:
      - task: _rust:test:parallel
      - task: _web:check:parallel
      - task: _web:test:parallel

  _rust:test:parallel:
    desc: Run nook-core tests when deps are already built (ci:pr parallel track).
    cmds:
      - task: _rust:test:run

  _rust:test:run:
    internal: true
    desc: Run nook-core tests via cargo-nextest (ci profile).
    cmds:
      - cargo nextest run -p nook-core --profile ci

  _format:
    desc: Format all projects.
    cmds:
      - cargo fmt --all
      - cd nook-web && bun run format

  _format:check:
    desc: Check formatting for all projects.
    cmds:
      - cargo fmt --all -- --check
      - cd nook-web && bun run format:check

  _rust:build:
    desc: Build the native Rust crate (wasm is built via _wasm:build).
    cmds:
      - cargo build -p nook-core

  _rust:test:
    desc: Test nook-core (wasm is covered by web e2e).
    cmds:
      - task: _rust:test:run

  _rust:lint:
    desc: Lint nook-core on host and nook-wasm for wasm32.
    cmds:
      - cargo clippy -p nook-core --all-targets -- -D warnings
      - cargo clippy --release --target wasm32-unknown-unknown -p nook-wasm -- -D warnings

  _wasm:build:
    desc: Build nook-wasm for the web app when sources changed (skips if image-seeded pkg is current).
    cmds:
      - task: _wasm:build:run

  _wasm:build:run:
    internal: true
    cmds:
      - >-
        sh -c 'out=nook-web/src/lib/nook-wasm/nook_wasm_bg.wasm;
        need=0;
        if [ ! -f "$out" ]; then need=1;
        elif find nook-wasm/src nook-core/src -newer "$out" -print -quit | grep -q .; then need=1;
        fi;
        if [ "$need" -eq 1 ]; then
          wasm-pack build nook-wasm --target web --out-dir ../nook-web/src/lib/nook-wasm --out-name nook_wasm;
        fi'

  _web:install:
    desc: Sync web dependencies after package.json or bun.lock changes.
    cmds:
      - cd nook-web && bun install --frozen-lockfile

  _web:build:
    desc: Build the Svelte app.
    deps:
      - _wasm:build
    env:
      VITE_BASE: '{{.VITE_BASE}}'
    cmds:
      - cd nook-web && bun run build

  _web:build:parallel:
    desc: Build the Svelte app when wasm is already built (ci:pr parallel track).
    env:
      VITE_BASE: '{{.VITE_BASE}}'
      VITE_VAULT_SYNC_INTERVAL_MS: '{{.VITE_VAULT_SYNC_INTERVAL_MS}}'
      VITE_E2E_EXPOSE_VAULT: 'true'
    cmds:
      - cd nook-web && bun run build

  _web:check:parallel:
    desc: Run Svelte and TypeScript checks when wasm is already built.
    cmds:
      - cd nook-web && bun run check

  _web:test:parallel:
    desc: Run web unit tests when wasm is already built.
    cmds:
      - cd nook-web && bun run test

  _web:lint:parallel:
    desc: Lint the web app when wasm is already built.
    cmds:
      - cd nook-web && bun run lint

  _web:check:
    desc: Run Svelte and TypeScript checks.
    deps:
      - _wasm:build
    cmds:
      - cd nook-web && bun run check

  _web:test:
    desc: Run web unit tests.
    deps:
      - _wasm:build
    cmds:
      - cd nook-web && bun run test

  _web:test:e2e:
    desc: Run full Playwright e2e suite.
    deps:
      - _wasm:build
    cmds:
      - cd nook-web && bun run test:e2e
      - defer: cd nook-web && bun run test:e2e:cleanup

  _web:test:e2e:parallel:
    desc: Run local then GitHub Playwright projects in one process (local dev only).
    cmds:
      - cd nook-web && bun run test:e2e
      - defer: cd nook-web && bun run test:e2e:cleanup

  _web:test:e2e:local:parallel:
    desc: Local Playwright project when wasm is already built (ci:main parallel track).
    cmds:
      - echo "==> Playwright local project (CI=${CI:-}, dist=$([ -d nook-web/dist ] && echo yes || echo no))"
      - cd nook-web && bun run test:e2e:local

  _web:test:e2e:github:parallel:
    desc: GitHub Playwright project when wasm is already built (ci:main parallel track).
    cmds:
      - echo "==> Playwright GitHub project (CI=${CI:-}, repo=${NOOK_GITHUB_E2E_REPO:-unset})"
      - cd nook-web && bun run test:e2e:github
      - defer: cd nook-web && bun run test:e2e:cleanup

  _web:test:e2e:local:
    desc: Run local-only Playwright e2e specs.
    deps:
      - _wasm:build
    env:
      VITE_E2E_EXPOSE_VAULT: 'true'
      VITE_VAULT_SYNC_INTERVAL_MS: '1000'
    cmds:
      - cd nook-web && bun run build
      - cd nook-web && bun run test:e2e:local

  _web:test:e2e:github:
    desc: Run GitHub vault Playwright e2e specs.
    deps:
      - _wasm:build
    env:
      VITE_E2E_EXPOSE_VAULT: 'true'
      VITE_VAULT_SYNC_INTERVAL_MS: '1000'
    cmds:
      - cd nook-web && bun run build
      - cd nook-web && bun run test:e2e:github
      - defer: cd nook-web && bun run test:e2e:cleanup

  _web:test:e2e:multi-device:
    desc: Run multi-device Playwright e2e specs.
    deps:
      - _wasm:build
    cmds:
      - cd nook-web && bun run test:e2e:multi-device
      - defer: cd nook-web && bun run test:e2e:cleanup

  _web:lint:
    desc: Lint the web app.
    deps:
      - _wasm:build
    cmds:
      - cd nook-web && bun run lint

  _web:dev:
    desc: Start the Svelte dev server.
    deps:
      - _wasm:build
    env:
      VITE_BASE: '{{.VITE_BASE}}'
    cmds:
      - cd nook-web && bun run dev -- --host 0.0.0.0
